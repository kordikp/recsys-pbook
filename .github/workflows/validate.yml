name: Validate Content

on:
  pull_request:
    paths:
      - 'content/**'
      - 'games/**'
      - 'images/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate content files
        run: node .github/scripts/validate-content.js
