<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" viewBox="0 0 680 280">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#7C3AED">Don't Get Stuck in a Filter Bubble!</text>

  <!-- LEFT SIDE: Stuck in a bubble -->
  <g transform="translate(30, 40)">
    <!-- Bubble -->
    <circle cx="120" cy="110" r="95" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6 4"/>
    <circle cx="120" cy="110" r="95" fill="none" stroke="#BFDBFE" stroke-width="8" opacity="0.3"/>

    <!-- Person inside bubble -->
    <circle cx="120" cy="95" r="20" fill="#FBBF24"/>
    <circle cx="113" cy="91" r="3" fill="#1F2937"/>
    <circle cx="127" cy="91" r="3" fill="#1F2937"/>
    <!-- Worried mouth -->
    <path d="M112 103 Q120 98 128 103" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>

    <!-- All same gaming icons inside bubble -->
    <rect x="55" y="45" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="69" y="59" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="95" y="35" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="109" y="49" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="140" y="42" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="154" y="56" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="60" y="140" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="74" y="154" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="105" y="135" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="119" y="149" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="145" y="140" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="159" y="154" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="55" y="170" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="69" y="184" text-anchor="middle" font-size="8" fill="white">&#127918;</text>

    <rect x="140" y="170" width="28" height="20" rx="4" fill="#3B82F6"/>
    <text x="154" y="184" text-anchor="middle" font-size="8" fill="white">&#127918;</text>
  </g>

  <text x="150" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#EF4444">Stuck in a Bubble</text>
  <text x="150" y="273" text-anchor="middle" font-size="11" fill="#EF4444">Only gaming, nothing else!</text>

  <!-- CENTER: POP! -->
  <g transform="translate(290, 90)">
    <!-- Explosion/pop effect -->
    <polygon points="50,0 58,30 90,20 65,42 95,60 60,55 50,85 40,55 5,60 35,42 10,20 42,30" fill="#F59E0B" opacity="0.2"/>
    <polygon points="50,10 56,32 80,24 62,42 85,56 58,52 50,75 42,52 15,56 38,42 20,24 44,32" fill="#F59E0B" opacity="0.3"/>
    <text x="50" y="50" text-anchor="middle" font-size="24" font-weight="bold" fill="#EF4444">POP!</text>
    <!-- Sparkle particles -->
    <circle cx="20" cy="15" r="3" fill="#FBBF24"/>
    <circle cx="80" cy="10" r="2.5" fill="#EC4899"/>
    <circle cx="85" cy="70" r="3" fill="#10B981"/>
    <circle cx="15" cy="65" r="2.5" fill="#3B82F6"/>
    <circle cx="50" cy="5" r="2" fill="#7C3AED"/>
    <circle cx="90" cy="40" r="2" fill="#F59E0B"/>
    <circle cx="10" cy="40" r="2" fill="#EF4444"/>
  </g>

  <!-- RIGHT SIDE: Bubble popped! -->
  <g transform="translate(400, 40)">
    <!-- Broken bubble remnants -->
    <path d="M120 15 Q175 10 200 50" fill="none" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>
    <path d="M40 15 Q-10 10 -15 50" fill="none" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>

    <!-- Happy person -->
    <circle cx="120" cy="80" r="22" fill="#FBBF24"/>
    <circle cx="112" cy="76" r="3" fill="#1F2937"/>
    <circle cx="128" cy="76" r="3" fill="#1F2937"/>
    <!-- Big smile -->
    <path d="M110 88 Q120 98 130 88" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
    <!-- Raised arms -->
    <line x1="98" y1="80" x2="80" y2="60" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>
    <line x1="142" y1="80" x2="160" y2="60" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>

    <!-- Diverse content icons spread around -->
    <rect x="20" y="30" width="32" height="24" rx="5" fill="#3B82F6"/>
    <text x="36" y="46" text-anchor="middle" font-size="9" fill="white">&#127918;</text>

    <rect x="180" y="25" width="32" height="24" rx="5" fill="#10B981"/>
    <text x="196" y="41" text-anchor="middle" font-size="9" fill="white">&#128300;</text>

    <rect x="15" y="120" width="32" height="24" rx="5" fill="#F59E0B"/>
    <text x="31" y="136" text-anchor="middle" font-size="9" fill="white">&#127859;</text>

    <rect x="190" y="110" width="32" height="24" rx="5" fill="#EC4899"/>
    <text x="206" y="126" text-anchor="middle" font-size="9" fill="white">&#127925;</text>

    <rect x="60" y="145" width="32" height="24" rx="5" fill="#7C3AED"/>
    <text x="76" y="161" text-anchor="middle" font-size="9" fill="white">&#127912;</text>

    <rect x="145" y="150" width="32" height="24" rx="5" fill="#EF4444"/>
    <text x="161" y="166" text-anchor="middle" font-size="9" fill="white">&#9917;</text>
  </g>

  <text x="520" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#10B981">Bubble Popped!</text>
  <text x="520" y="273" text-anchor="middle" font-size="11" fill="#10B981">So much to explore!</text>

  <!-- Fun sparkle decorations -->
  <text x="15" y="32" font-size="10" fill="#FBBF24">&#10024;</text>
  <text x="660" y="32" font-size="10" fill="#FBBF24">&#10024;</text>
</svg>