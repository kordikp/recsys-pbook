<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes bracketAppear {
      0%, 40% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes scoreAppear {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .left-panel { opacity: 0; animation: fadeIn 0.6s ease-out 0.3s forwards; }
    .right-panel { opacity: 0; animation: fadeIn 0.8s ease-out 2s forwards; }
    .red-highlight { opacity: 0; animation: fadeIn 1.5s ease-out 1.2s forwards; }
    .green-highlight { opacity: 0; animation: fadeIn 1.5s ease-out 3s forwards; }
    .score-label { opacity: 0; animation: scoreAppear 0.4s ease-out 0.8s forwards; }
    .bracket { opacity: 0; animation: bracketAppear 1s ease-out 1.5s forwards; }
    .vs-label { opacity: 0; animation: fadeIn 0.5s ease-out 1.8s forwards; }
    .slate-score { opacity: 0; animation: scoreAppear 0.4s ease-out 2.5s forwards; }
  </style>

  <!-- Title -->
  <text x="275" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Slate vs Individual Optimization</text>

  <!-- LEFT SIDE: Individual Scoring -->
  <g class="left-panel">
    <text x="125" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#0b1225">Individual</text>
    <text x="125" y="73" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Score each item independently</text>

    <!-- Item 1 (Action movie) -->
    <rect x="30" y="88" width="140" height="30" rx="5" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1.5" />
    <text x="45" y="107" font-size="10" fill="#0b1225">Action Movie A</text>
    <text class="score-label" x="155" y="107" text-anchor="end" font-size="9" fill="#0c8383" font-weight="bold">0.92</text>

    <!-- Item 2 (Action movie - similar!) -->
    <rect x="30" y="124" width="140" height="30" rx="5" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1.5" />
    <text x="45" y="143" font-size="10" fill="#0b1225">Action Movie B</text>
    <text class="score-label" x="155" y="143" text-anchor="end" font-size="9" fill="#0c8383" font-weight="bold">0.90</text>

    <!-- Item 3 (Action movie - similar!) -->
    <rect x="30" y="160" width="140" height="30" rx="5" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1.5" />
    <text x="45" y="179" font-size="10" fill="#0b1225">Action Movie C</text>
    <text class="score-label" x="155" y="179" text-anchor="end" font-size="9" fill="#0c8383" font-weight="bold">0.88</text>

    <!-- Item 4 (Drama) -->
    <rect x="30" y="196" width="140" height="30" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="1" opacity="0.5" />
    <text x="45" y="215" font-size="10" fill="#0b1225" opacity="0.5">Drama D</text>
    <text class="score-label" x="155" y="215" text-anchor="end" font-size="9" fill="#0b1225" opacity="0.5">0.75</text>

    <!-- Item 5 (Comedy) -->
    <rect x="30" y="232" width="140" height="30" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="1" opacity="0.5" />
    <text x="45" y="251" font-size="10" fill="#0b1225" opacity="0.5">Comedy E</text>
    <text class="score-label" x="155" y="251" text-anchor="end" font-size="9" fill="#0b1225" opacity="0.5">0.70</text>
  </g>

  <!-- Red highlights for redundancy -->
  <g class="red-highlight">
    <rect x="28" y="86" width="144" height="108" rx="6" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="188" y="130" font-size="9" fill="#ef4444" font-weight="bold">Redundant!</text>
    <text x="188" y="143" font-size="8" fill="#ef4444">All same genre</text>
  </g>

  <!-- Similarity bracket -->
  <g class="bracket">
    <path d="M175,90 L180,90 L180,190 L175,190" fill="none" stroke="#ef4444" stroke-width="1.5" />
  </g>

  <!-- VS -->
  <text class="vs-label" x="275" y="165" text-anchor="middle" font-size="18" font-weight="bold" fill="#0b1225" opacity="0.3">vs</text>

  <!-- RIGHT SIDE: Slate Scoring -->
  <g class="right-panel">
    <text x="420" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#0b1225">Slate</text>
    <text x="420" y="73" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Score items as a SET</text>

    <!-- Item 1 (Action movie - kept) -->
    <rect x="325" y="88" width="140" height="30" rx="5" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="340" y="107" font-size="10" fill="#0b1225">Action Movie A</text>
    <text x="450" y="107" text-anchor="end" font-size="9" fill="#3bc4a1" font-weight="bold">0.92</text>

    <!-- Item 2 (Drama - promoted!) -->
    <rect x="325" y="124" width="140" height="30" rx="5" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="340" y="143" font-size="10" fill="#0b1225">Drama D</text>
    <text x="450" y="143" text-anchor="end" font-size="9" fill="#3bc4a1" font-weight="bold">0.75</text>

    <!-- Item 3 (Comedy - promoted!) -->
    <rect x="325" y="160" width="140" height="30" rx="5" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="340" y="179" font-size="10" fill="#0b1225">Comedy E</text>
    <text x="450" y="179" text-anchor="end" font-size="9" fill="#3bc4a1" font-weight="bold">0.70</text>

    <!-- Item 4 (Documentary - new!) -->
    <rect x="325" y="196" width="140" height="30" rx="5" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="340" y="215" font-size="10" fill="#0b1225">Documentary F</text>
    <text x="450" y="215" text-anchor="end" font-size="9" fill="#3bc4a1" font-weight="bold">0.65</text>

    <!-- Item 5 (Thriller) -->
    <rect x="325" y="232" width="140" height="30" rx="5" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="340" y="251" font-size="10" fill="#0b1225">Thriller G</text>
    <text x="450" y="251" text-anchor="end" font-size="9" fill="#3bc4a1" font-weight="bold">0.60</text>
  </g>

  <!-- Green highlights for diversity -->
  <g class="green-highlight">
    <rect x="323" y="86" width="144" height="180" rx="6" fill="none" stroke="#3bc4a1" stroke-width="2" />
    <text x="490" y="150" font-size="9" fill="#3bc4a1" font-weight="bold">Diverse!</text>
    <text x="490" y="163" font-size="8" fill="#3bc4a1">5 genres</text>
  </g>

  <!-- Bottom summary -->
  <g class="green-highlight">
    <text x="125" y="285" text-anchor="middle" font-size="9" fill="#ef4444">Slate utility: lower</text>
    <text x="420" y="285" text-anchor="middle" font-size="9" fill="#3bc4a1" font-weight="bold">Slate utility: higher</text>
  </g>
</svg>