<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,6 L4,0 L8,6" fill="#0c8383"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f4"/>
      <stop offset="100%" stop-color="#e8e8e6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" rx="12" fill="#f5f5f4"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#0b1225">Recommender System Tech Stack</text>
  <text x="300" y="52" text-anchor="middle" font-size="11" fill="#6b7280">Layered architecture from data ingestion to orchestration</text>

  <!-- Layer 4 (top): Orchestration -->
  <g transform="translate(60, 72)">
    <rect x="0" y="0" width="480" height="72" rx="10" fill="#0c8383" fill-opacity="0.1" stroke="#0c8383" stroke-width="2"/>
    <text x="240" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c8383">Orchestration</text>
    <g transform="translate(30, 30)">
      <rect x="0" y="0" width="120" height="32" rx="6" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" font-size="11" fill="#0b1225">ML Pipeline</text>
    </g>
    <g transform="translate(175, 30)">
      <rect x="0" y="0" width="120" height="32" rx="6" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" font-size="11" fill="#0b1225">A/B Testing</text>
    </g>
    <g transform="translate(320, 30)">
      <rect x="0" y="0" width="130" height="32" rx="6" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-size="11" fill="#0b1225">Monitoring</text>
    </g>
  </g>

  <!-- Arrow between Layer 4 and Layer 3 -->
  <line x1="300" y1="167" x2="300" y2="152" stroke="#0c8383" stroke-width="2" marker-end="url(#arrowUp)"/>

  <!-- Layer 3: Serving -->
  <g transform="translate(60, 175)">
    <rect x="0" y="0" width="480" height="72" rx="10" fill="#3bc4a1" fill-opacity="0.12" stroke="#3bc4a1" stroke-width="2"/>
    <text x="240" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c8383">Serving</text>
    <g transform="translate(20, 30)">
      <rect x="0" y="0" width="130" height="32" rx="6" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-size="11" fill="#0b1225">Model Serving</text>
    </g>
    <g transform="translate(175, 30)">
      <rect x="0" y="0" width="120" height="32" rx="6" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" font-size="11" fill="#0b1225">ANN Index</text>
    </g>
    <g transform="translate(320, 30)">
      <rect x="0" y="0" width="140" height="32" rx="6" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1"/>
      <text x="70" y="20" text-anchor="middle" font-size="11" fill="#0b1225">Feature Lookup</text>
    </g>
  </g>

  <!-- Arrow between Layer 3 and Layer 2 -->
  <line x1="300" y1="270" x2="300" y2="255" stroke="#0c8383" stroke-width="2" marker-end="url(#arrowUp)"/>

  <!-- Layer 2: Training -->
  <g transform="translate(60, 278)">
    <rect x="0" y="0" width="480" height="72" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
    <text x="240" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">Training</text>
    <g transform="translate(60, 30)">
      <rect x="0" y="0" width="150" height="32" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
      <text x="75" y="20" text-anchor="middle" font-size="11" fill="#0b1225">Offline Training</text>
    </g>
    <g transform="translate(260, 30)">
      <rect x="0" y="0" width="170" height="32" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
      <text x="85" y="20" text-anchor="middle" font-size="11" fill="#0b1225">Experiment Tracking</text>
    </g>
  </g>

  <!-- Arrow between Layer 2 and Layer 1 -->
  <line x1="300" y1="373" x2="300" y2="358" stroke="#0c8383" stroke-width="2" marker-end="url(#arrowUp)"/>

  <!-- Layer 1 (bottom): Data Layer -->
  <g transform="translate(60, 381)">
    <rect x="0" y="0" width="480" height="58" rx="10" fill="#0b1225" fill-opacity="0.06" stroke="#0b1225" stroke-width="2" stroke-opacity="0.3"/>
    <text x="240" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#0b1225">Data Layer</text>
    <g transform="translate(20, 26)">
      <rect x="0" y="0" width="120" height="26" rx="5" fill="#0b1225" fill-opacity="0.08" stroke="#0b1225" stroke-width="1" stroke-opacity="0.25"/>
      <text x="60" y="17" text-anchor="middle" font-size="10" fill="#0b1225">Kafka</text>
    </g>
    <g transform="translate(170, 26)">
      <rect x="0" y="0" width="140" height="26" rx="5" fill="#0b1225" fill-opacity="0.08" stroke="#0b1225" stroke-width="1" stroke-opacity="0.25"/>
      <text x="70" y="17" text-anchor="middle" font-size="10" fill="#0b1225">Feature Store</text>
    </g>
    <g transform="translate(340, 26)">
      <rect x="0" y="0" width="130" height="26" rx="5" fill="#0b1225" fill-opacity="0.08" stroke="#0b1225" stroke-width="1" stroke-opacity="0.25"/>
      <text x="65" y="17" text-anchor="middle" font-size="10" fill="#0b1225">Data Warehouse</text>
    </g>
  </g>

  <!-- Side labels -->
  <text x="20" y="112" text-anchor="middle" font-size="9" fill="#6b7280" transform="rotate(-90, 20, 112)">TOP</text>
  <text x="20" y="410" text-anchor="middle" font-size="9" fill="#6b7280" transform="rotate(-90, 20, 410)">BASE</text>
  <line x1="35" y1="85" x2="35" y2="430" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
</svg>