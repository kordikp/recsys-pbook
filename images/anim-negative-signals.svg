<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes barGrow1 {
      from { stroke-dashoffset: 120; }
      to { stroke-dashoffset: 114; }
    }
    @keyframes barGrow2 {
      from { stroke-dashoffset: 120; }
      to { stroke-dashoffset: 84; }
    }
    @keyframes barGrow3 {
      from { stroke-dashoffset: 120; }
      to { stroke-dashoffset: 12; }
    }
    @keyframes barGrow4 {
      from { stroke-dashoffset: 120; }
      to { stroke-dashoffset: 0; }
    }
    .title { opacity: 0; animation: fadeIn 0.5s ease-out 0.1s forwards; }
    .player-icon { opacity: 0; animation: fadeIn 0.5s ease-out 0.3s forwards; }

    .row1 { opacity: 0; animation: fadeIn 0.5s ease-out 0.8s forwards; }
    .signal1 { opacity: 0; animation: fadeIn 0.4s ease-out 1.4s forwards; }
    .bar1 {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: barGrow1 0.5s ease-out 1.0s forwards;
    }

    .row2 { opacity: 0; animation: fadeIn 0.5s ease-out 2.0s forwards; }
    .signal2 { opacity: 0; animation: fadeIn 0.4s ease-out 2.6s forwards; }
    .bar2 {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: barGrow2 0.8s ease-out 2.2s forwards;
    }

    .row3 { opacity: 0; animation: fadeIn 0.5s ease-out 3.2s forwards; }
    .signal3 { opacity: 0; animation: fadeIn 0.4s ease-out 3.8s forwards; }
    .bar3 {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: barGrow3 1.0s ease-out 3.4s forwards;
    }

    .row4 { opacity: 0; animation: fadeIn 0.5s ease-out 4.4s forwards; }
    .signal4 { opacity: 0; animation: fadeIn 0.4s ease-out 5.0s forwards; }
    .bar4 {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: barGrow4 1.0s ease-out 4.6s forwards;
    }
  </style>

  <!-- Title -->
  <text class="title" x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b1225">Signal Interpretation</text>

  <!-- Video player icon -->
  <g class="player-icon">
    <rect x="20" y="42" width="56" height="38" rx="5" fill="#0b1225" />
    <polygon points="40,52 56,61 40,70" fill="#f5f5f4" />
    <text x="48" y="92" text-anchor="middle" font-size="8" fill="#0b1225" opacity="0.6">User action</text>
  </g>

  <!-- Headers -->
  <g class="player-icon">
    <text x="240" y="56" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Watch progress</text>
    <text x="410" y="56" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Signal</text>
  </g>

  <!-- Row 1: Skip <5s -->
  <g class="row1">
    <text x="100" y="110" font-size="11" fill="#0b1225" font-weight="600">Skip &lt;5s</text>
    <text x="100" y="124" font-size="8" fill="#0b1225" opacity="0.5">Immediate rejection</text>
    <!-- Progress bar background -->
    <rect x="195" y="100" width="120" height="10" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.3" />
    <!-- Progress fill using stroke-dashoffset -->
    <line class="bar1" x1="200" y1="105" x2="310" y2="105" stroke="#ef4444" stroke-width="8" stroke-linecap="round" />
  </g>
  <g class="signal1">
    <text x="400" y="114" text-anchor="middle" font-size="22" fill="#ef4444" font-weight="bold">&#x2717;</text>
    <text x="430" y="114" font-size="9" fill="#ef4444" font-weight="600">Strong reject</text>
  </g>

  <!-- Row 2: Watch 30s, skip -->
  <g class="row2">
    <text x="100" y="162" font-size="11" fill="#0b1225" font-weight="600">Watch 30s, skip</text>
    <text x="100" y="176" font-size="8" fill="#0b1225" opacity="0.5">Sampled, not interested</text>
    <rect x="195" y="152" width="120" height="10" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.3" />
    <line class="bar2" x1="200" y1="157" x2="310" y2="157" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" />
  </g>
  <g class="signal2">
    <text x="398" y="168" text-anchor="middle" font-size="22" fill="#f59e0b" font-weight="bold">?</text>
    <text x="426" y="166" font-size="9" fill="#f59e0b" font-weight="600">Ambiguous</text>
  </g>

  <!-- Row 3: Watch 90% -->
  <g class="row3">
    <text x="100" y="214" font-size="11" fill="#0b1225" font-weight="600">Watch 90%</text>
    <text x="100" y="228" font-size="8" fill="#0b1225" opacity="0.5">Engaged viewing</text>
    <rect x="195" y="204" width="120" height="10" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.3" />
    <line class="bar3" x1="200" y1="209" x2="310" y2="209" stroke="#3bc4a1" stroke-width="8" stroke-linecap="round" />
  </g>
  <g class="signal3">
    <text x="400" y="218" text-anchor="middle" font-size="22" fill="#3bc4a1" font-weight="bold">&#x2713;</text>
    <text x="430" y="218" font-size="9" fill="#3bc4a1" font-weight="600">Engaged</text>
  </g>

  <!-- Row 4: Watch 100% + share -->
  <g class="row4">
    <text x="100" y="266" font-size="11" fill="#0b1225" font-weight="600">100% + share</text>
    <text x="100" y="280" font-size="8" fill="#0b1225" opacity="0.5">Full watch + social action</text>
    <rect x="195" y="256" width="120" height="10" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.3" />
    <line class="bar4" x1="200" y1="261" x2="310" y2="261" stroke="#0c8383" stroke-width="8" stroke-linecap="round" />
  </g>
  <g class="signal4">
    <text x="396" y="270" text-anchor="middle" font-size="22" fill="#0c8383" font-weight="bold">&#x2713;&#x2713;</text>
    <text x="440" y="270" font-size="9" fill="#0c8383" font-weight="600">Loved it</text>
  </g>
</svg>