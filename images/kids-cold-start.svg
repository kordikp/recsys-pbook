<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#7C3AED">The Cold Start Problem</text>

  <!-- LEFT PANEL: Day 1 -->
  <rect x="20" y="34" width="280" height="172" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="160" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#EF4444">Day 1 &#8212; New Account</text>

  <!-- Confused robot -->
  <g transform="translate(90, 65)">
    <rect x="0" y="20" width="44" height="40" rx="8" fill="#9CA3AF"/>
    <rect x="5" y="0" width="34" height="28" rx="6" fill="#9CA3AF"/>
    <line x1="22" y1="0" x2="22" y2="-8" stroke="#9CA3AF" stroke-width="2"/>
    <circle cx="22" cy="-11" r="4" fill="#FCA5A5"/>
    <!-- Confused eyes: X shapes -->
    <line x1="12" y1="10" x2="18" y2="16" stroke="#EF4444" stroke-width="2"/>
    <line x1="18" y1="10" x2="12" y2="16" stroke="#EF4444" stroke-width="2"/>
    <line x1="26" y1="10" x2="32" y2="16" stroke="#EF4444" stroke-width="2"/>
    <line x1="32" y1="10" x2="26" y2="16" stroke="#EF4444" stroke-width="2"/>
    <!-- Confused mouth -->
    <path d="M12 24 Q17 22 22 24 Q27 26 32 24" fill="none" stroke="#EF4444" stroke-width="1.5"/>
    <!-- Speech bubble with ??? -->
    <rect x="50" y="-8" width="60" height="28" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1"/>
    <polygon points="50,8 44,12 50,16" fill="white" stroke="#D1D5DB" stroke-width="1"/>
    <text x="80" y="12" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">???</text>
  </g>

  <!-- Random scattered items -->
  <g transform="translate(40, 130)">
    <rect x="0" y="10" width="28" height="20" rx="4" fill="#FBBF24" transform="rotate(-15,14,20)" opacity="0.5"/>
    <rect x="50" y="0" width="28" height="20" rx="4" fill="#3B82F6" transform="rotate(10,64,10)" opacity="0.5"/>
    <rect x="100" y="15" width="28" height="20" rx="4" fill="#EC4899" transform="rotate(-5,114,25)" opacity="0.5"/>
    <rect x="150" y="5" width="28" height="20" rx="4" fill="#10B981" transform="rotate(20,164,15)" opacity="0.5"/>
    <rect x="190" y="18" width="28" height="20" rx="4" fill="#7C3AED" transform="rotate(-8,204,28)" opacity="0.5"/>
    <text x="120" y="55" text-anchor="middle" font-size="9" fill="#9CA3AF">Random stuff... no idea what you like!</text>
  </g>

  <!-- CENTER ARROW -->
  <g transform="translate(310, 100)">
    <polygon points="0,15 20,0 20,8 60,8 60,22 20,22 20,30" fill="#F59E0B"/>
    <text x="30" y="50" text-anchor="middle" font-size="8" fill="#F59E0B" font-weight="bold">Just a few</text>
    <text x="30" y="60" text-anchor="middle" font-size="8" fill="#F59E0B" font-weight="bold">clicks later...</text>
  </g>

  <!-- RIGHT PANEL: Day 3 -->
  <rect x="380" y="34" width="280" height="172" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="520" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#10B981">Day 3 &#8212; After Some Clicks</text>

  <!-- Happy robot -->
  <g transform="translate(450, 65)">
    <rect x="0" y="20" width="44" height="40" rx="8" fill="#10B981"/>
    <rect x="5" y="0" width="34" height="28" rx="6" fill="#10B981"/>
    <line x1="22" y1="0" x2="22" y2="-8" stroke="#10B981" stroke-width="2"/>
    <circle cx="22" cy="-11" r="4" fill="#FBBF24"/>
    <!-- Happy eyes -->
    <circle cx="14" cy="12" r="4" fill="white"/>
    <circle cx="30" cy="12" r="4" fill="white"/>
    <circle cx="14" cy="12" r="2" fill="#065F46"/>
    <circle cx="30" cy="12" r="2" fill="#065F46"/>
    <!-- Big smile -->
    <path d="M12 22 Q22 30 32 22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Speech bubble with check -->
    <rect x="50" y="-8" width="52" height="28" rx="8" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <polygon points="50,8 44,12 50,16" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <text x="76" y="13" text-anchor="middle" font-size="16" fill="#10B981">&#10003;</text>
  </g>

  <!-- Organized personalized items -->
  <g transform="translate(400, 130)">
    <rect x="0" y="0" width="52" height="36" rx="6" fill="#3B82F6"/>
    <text x="26" y="16" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Gaming</text>
    <text x="26" y="28" text-anchor="middle" font-size="11" fill="white">&#127918;</text>

    <rect x="60" y="0" width="52" height="36" rx="6" fill="#EC4899"/>
    <text x="86" y="16" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Music</text>
    <text x="86" y="28" text-anchor="middle" font-size="11" fill="white">&#127925;</text>

    <rect x="120" y="0" width="52" height="36" rx="6" fill="#10B981"/>
    <text x="146" y="16" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Science</text>
    <text x="146" y="28" text-anchor="middle" font-size="11" fill="white">&#128300;</text>

    <rect x="180" y="0" width="52" height="36" rx="6" fill="#7C3AED"/>
    <text x="206" y="16" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Crafts</text>
    <text x="206" y="28" text-anchor="middle" font-size="11" fill="white">&#9986;&#65039;</text>

    <text x="130" y="55" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Picked just for you!</text>
  </g>
</svg>