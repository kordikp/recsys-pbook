<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#7C3AED">The 3 Jobs of Every Recommender</text>

  <!-- Box 1: DISCOVER (blue) -->
  <rect x="30" y="42" width="190" height="155" rx="16" fill="#3B82F6"/>
  <rect x="30" y="42" width="190" height="155" rx="16" fill="url(#blueGrad)" opacity="0.3"/>
  <!-- Telescope icon -->
  <circle cx="125" cy="82" r="22" fill="#2563EB"/>
  <line x1="110" y1="96" x2="92" y2="112" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="130" cy="78" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="137" y1="72" x2="148" y2="64" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <text x="125" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="white">DISCOVER</text>
  <text x="125" y="142" text-anchor="middle" font-size="10" fill="#DBEAFE">Find new things</text>
  <text x="125" y="156" text-anchor="middle" font-size="10" fill="#DBEAFE">you didn't know</text>
  <text x="125" y="170" text-anchor="middle" font-size="10" fill="#DBEAFE">existed</text>
  <text x="125" y="190" text-anchor="middle" font-size="16" fill="white">&#128301;</text>

  <!-- Box 2: FIND (green) -->
  <rect x="265" y="42" width="190" height="155" rx="16" fill="#10B981"/>
  <!-- Magnifying glass icon -->
  <circle cx="360" cy="82" r="22" fill="#059669"/>
  <circle cx="355" cy="78" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="362" y1="85" x2="374" y2="96" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <text x="360" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="white">FIND</text>
  <text x="360" y="142" text-anchor="middle" font-size="10" fill="#D1FAE5">Get to what</text>
  <text x="360" y="156" text-anchor="middle" font-size="10" fill="#D1FAE5">you want</text>
  <text x="360" y="170" text-anchor="middle" font-size="10" fill="#D1FAE5">faster</text>
  <text x="360" y="190" text-anchor="middle" font-size="16" fill="white">&#128269;</text>

  <!-- Box 3: KEEP (purple) -->
  <rect x="500" y="42" width="150" height="155" rx="16" fill="#7C3AED"/>
  <!-- Heart icon -->
  <circle cx="575" cy="82" r="22" fill="#6D28D9"/>
  <path d="M565 80 C565 73 575 68 575 78 C575 68 585 73 585 80 C585 88 575 94 575 94 C575 94 565 88 565 80Z" fill="white"/>
  <text x="575" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="white">KEEP</text>
  <text x="575" y="142" text-anchor="middle" font-size="10" fill="#EDE9FE">Stay interested</text>
  <text x="575" y="156" text-anchor="middle" font-size="10" fill="#EDE9FE">and come</text>
  <text x="575" y="170" text-anchor="middle" font-size="10" fill="#EDE9FE">back</text>
  <text x="575" y="190" text-anchor="middle" font-size="16" fill="white">&#10084;&#65039;</text>

  <!-- Number badges -->
  <circle cx="50" cy="55" r="12" fill="white"/><text x="50" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#3B82F6">1</text>
  <circle cx="285" cy="55" r="12" fill="white"/><text x="285" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#10B981">2</text>
  <circle cx="520" cy="55" r="12" fill="white"/><text x="520" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#7C3AED">3</text>
</svg>