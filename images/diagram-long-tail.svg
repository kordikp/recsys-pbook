<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="300" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">The Long-Tail Distribution</text>
  <text x="300" y="40" text-anchor="middle" font-size="11" fill="#78716C">Most interactions concentrate on a few popular items</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="70" y1="50" x2="70" y2="220" stroke="#0b1225" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="70" y1="220" x2="560" y2="220" stroke="#0b1225" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="30" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#0b1225" transform="rotate(-90, 30, 135)">Interactions</text>

  <!-- X axis label -->
  <text x="315" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#0b1225">Items (ranked by popularity)</text>

  <!-- Y axis ticks -->
  <line x1="65" y1="70" x2="70" y2="70" stroke="#0b1225" stroke-width="1"/>
  <line x1="65" y1="120" x2="70" y2="120" stroke="#0b1225" stroke-width="1"/>
  <line x1="65" y1="170" x2="70" y2="170" stroke="#0b1225" stroke-width="1"/>

  <!-- Head boundary line (20% mark) -->
  <line x1="168" y1="50" x2="168" y2="225" stroke="#0b1225" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="168" y="237" text-anchor="middle" font-size="8" fill="#78716C">20%</text>

  <!-- Define clip paths for head and tail shading -->
  <defs>
    <!-- The long-tail curve path -->
    <clipPath id="headClip">
      <rect x="70" y="50" width="98" height="170"/>
    </clipPath>
    <clipPath id="tailClip">
      <rect x="168" y="50" width="392" height="170"/>
    </clipPath>
  </defs>

  <!-- Head shading (teal) -->
  <path d="M70,220 L70,62 C85,62 95,65 105,72 C120,82 135,105 148,135 C158,158 163,180 168,200 L168,220 Z"
        fill="#0c8383" fill-opacity="0.25"/>

  <!-- Tail shading (amber) -->
  <path d="M168,220 L168,200 C175,207 190,212 220,215 C260,217 320,218 400,219 C450,219 520,219.5 560,219.8 L560,220 Z"
        fill="#f59e0b" fill-opacity="0.2"/>

  <!-- Main curve -->
  <path d="M70,62 C85,62 95,65 105,72 C120,82 135,105 148,135 C158,158 163,180 168,200 C175,207 190,212 220,215 C260,217 320,218 400,219 C450,219 520,219.5 560,219.8"
        fill="none" stroke="#0b1225" stroke-width="2.5"/>

  <!-- Head label -->
  <g transform="translate(82, 56)">
    <rect x="0" y="0" width="75" height="38" rx="5" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1"/>
    <text x="37" y="14" text-anchor="middle" font-size="8" font-weight="bold" fill="#0c8383">Head</text>
    <text x="37" y="25" text-anchor="middle" font-size="7" fill="#0c8383">20% of items</text>
    <text x="37" y="35" text-anchor="middle" font-size="7" fill="#0c8383">80% of interactions</text>
  </g>

  <!-- Tail label -->
  <g transform="translate(330, 170)">
    <rect x="0" y="0" width="90" height="38" rx="5" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="45" y="14" text-anchor="middle" font-size="8" font-weight="bold" fill="#f59e0b">Long Tail</text>
    <text x="45" y="25" text-anchor="middle" font-size="7" fill="#f59e0b">80% of items</text>
    <text x="45" y="35" text-anchor="middle" font-size="7" fill="#f59e0b">20% of interactions</text>
  </g>

  <!-- Arrow pointing to tail with insight -->
  <g transform="translate(430, 145)">
    <!-- Arrow line curving down to tail -->
    <path d="M55,0 Q35,20 20,35 Q10,45 0,55" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <polygon points="-3,52 0,60 3,52" fill="#ef4444" transform="rotate(-15, 0, 55)"/>
  </g>

  <g transform="translate(440, 115)">
    <rect x="0" y="0" width="140" height="36" rx="5" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1"/>
    <text x="70" y="14" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">Hidden value</text>
    <text x="70" y="26" text-anchor="middle" font-size="7" fill="#0b1225">Niche items with highest</text>
    <text x="70" y="35" text-anchor="middle" font-size="7" fill="#0b1225">per-user satisfaction</text>
  </g>

  <!-- Bottom insight -->
  <rect x="85" y="260" width="430" height="30" rx="6" fill="#0b1225"/>
  <text x="300" y="280" text-anchor="middle" font-size="10" fill="#A8A29E">Good recommenders help users discover the tail, not just echo the head.</text>
</svg>