<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="system-ui,sans-serif">
  <style>
    .node { opacity: 0; animation: appear 0.4s ease forwards; }
    .n1 { animation-delay: 0s; }
    .n2 { animation-delay: 0.6s; }
    .n3 { animation-delay: 1.2s; }
    .n4 { animation-delay: 1.8s; }
    .flow-arrow { stroke-dasharray: 8 4; animation: dash 1.5s linear infinite; }
    @keyframes appear { to { opacity: 1; } }
    @keyframes dash { to { stroke-dashoffset: -24; } }
    .danger-pulse { animation: dangerPulse 2s ease-in-out infinite; animation-delay: 3s; }
    @keyframes dangerPulse { 0%,100% { stroke: #ef4444; stroke-width: 2; } 50% { stroke: #ef4444; stroke-width: 4; } }
  </style>

  <rect width="500" height="400" fill="#f5f5f4" rx="12"/>
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0b1225">The Recommendation Feedback Loop</text>

  <!-- Node 1: Model -->
  <g class="node n1">
    <rect x="175" y="55" width="150" height="50" rx="10" fill="#0c8383"/>
    <text x="250" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="white">Model Trains</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M325 80 Q380 80 380 140" class="flow-arrow" stroke="#0c8383" stroke-width="2" fill="none" marker-end="url(#arrow-teal)"/>

  <!-- Node 2: Recommend -->
  <g class="node n2">
    <rect x="305" y="140" width="150" height="50" rx="10" fill="#3bc4a1"/>
    <text x="380" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="white">Recommends Items</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M380 190 Q380 250 325 250" class="flow-arrow" stroke="#3bc4a1" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- Node 3: User Interacts -->
  <g class="node n3">
    <rect x="175" y="225" width="150" height="50" rx="10" fill="#f59e0b"/>
    <text x="250" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="white">Users Interact</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M175 250 Q120 250 120 190" class="flow-arrow" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrow-amber)"/>

  <!-- Node 4: Data Collected -->
  <g class="node n4">
    <rect x="45" y="140" width="150" height="50" rx="10" fill="#0b1225"/>
    <text x="120" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="white">Data Collected</text>
  </g>

  <!-- Arrow 4→1 (closing the loop) -->
  <path d="M120 140 Q120 80 175 80" class="flow-arrow" stroke="#0b1225" stroke-width="2" fill="none" marker-end="url(#arrow-dark)"/>

  <!-- Danger zone: bias amplification -->
  <g class="node n4">
    <circle cx="250" cy="165" r="55" fill="none" class="danger-pulse" stroke="#ef4444" stroke-width="2"/>
    <text x="250" y="165" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">BIAS</text>
    <text x="250" y="178" text-anchor="middle" font-size="9" fill="#ef4444">AMPLIFIES</text>
  </g>

  <!-- Explanatory text -->
  <g class="node n4">
    <text x="250" y="320" text-anchor="middle" font-size="11" fill="#0b1225" font-weight="600">Each cycle reinforces existing patterns</text>
    <text x="250" y="338" text-anchor="middle" font-size="10" fill="#666">Popular items get more data → better predictions → more recommendations</text>
    <text x="250" y="354" text-anchor="middle" font-size="10" fill="#666">New items get no data → poor predictions → never recommended</text>
    <text x="250" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Breaking the loop requires deliberate exploration</text>
  </g>

  <defs>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0c8383"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3bc4a1"/></marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
    <marker id="arrow-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0b1225"/></marker>
  </defs>
</svg>