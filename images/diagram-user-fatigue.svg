<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" width="550" height="300" font-family="system-ui, sans-serif">
  <rect width="550" height="300" rx="8" fill="#f5f5f4"/>

  <text x="275" y="24" text-anchor="middle" fill="#0b1225" font-size="13" font-weight="700">User Fatigue Timeline</text>

  <!-- Axes -->
  <line x1="65" y1="45" x2="65" y2="240" stroke="#0b1225" stroke-width="1"/>
  <line x1="65" y1="240" x2="510" y2="240" stroke="#0b1225" stroke-width="1"/>

  <!-- Y axis -->
  <text x="20" y="145" text-anchor="middle" fill="#0b1225" font-size="10" font-weight="500" transform="rotate(-90, 20, 145)">Engagement</text>
  <text x="58" y="55" text-anchor="end" fill="#999" font-size="7">High</text>
  <text x="58" y="240" text-anchor="end" fill="#999" font-size="7">Low</text>

  <!-- X axis -->
  <text x="287" y="267" text-anchor="middle" fill="#0b1225" font-size="10" font-weight="500">Time / Repeated Exposure</text>

  <!-- Grid lines -->
  <line x1="65" y1="80" x2="510" y2="80" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="65" y1="120" x2="510" y2="120" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="65" y1="160" x2="510" y2="160" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="65" y1="200" x2="510" y2="200" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- Zone backgrounds -->
  <!-- Discovery zone (green) -->
  <rect x="65" y="45" width="135" height="195" fill="#3bc4a1" opacity="0.04"/>
  <!-- Peak zone (teal) -->
  <rect x="200" y="45" width="120" height="195" fill="#0c8383" opacity="0.04"/>
  <!-- Fatigue zone (red fading) -->
  <rect x="320" y="45" width="190" height="195" fill="#ef4444" opacity="0.03"/>

  <!-- Zone dividers -->
  <line x1="200" y1="45" x2="200" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="320" y1="45" x2="320" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Zone labels -->
  <text x="132" y="250" text-anchor="middle" fill="#3bc4a1" font-size="9" font-weight="600">Discovery</text>
  <text x="260" y="250" text-anchor="middle" fill="#0c8383" font-size="9" font-weight="600">Peak Engagement</text>
  <text x="415" y="250" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">Fatigue</text>

  <!-- The fatigue curve -->
  <!-- Rising part -->
  <path d="M65,220 Q100,210 130,170 Q160,110 200,75 Q240,60 270,62 Q300,65 320,72"
    fill="none" stroke="#0c8383" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Declining part -->
  <path d="M320,72 Q350,85 380,120 Q410,160 440,190 Q470,210 510,225"
    fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="none"/>

  <!-- Fill under curve for visual -->
  <path d="M65,220 Q100,210 130,170 Q160,110 200,75 Q240,60 270,62 Q300,65 320,72 Q350,85 380,120 Q410,160 440,190 Q470,210 510,225 L510,240 L65,240 Z"
    fill="url(#fatigueFill)" opacity="0.15"/>

  <defs>
    <linearGradient id="fatigueFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3bc4a1"/>
      <stop offset="40%" stop-color="#0c8383"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Sweet spot marker -->
  <circle cx="265" cy="62" r="4" fill="white" stroke="#0c8383" stroke-width="2"/>
  <text x="265" y="53" text-anchor="middle" fill="#0c8383" font-size="8" font-weight="600">Sweet spot</text>

  <!-- Intervention arrow -->
  <defs>
    <marker id="arrIntervention" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#3bc4a1"/>
    </marker>
  </defs>

  <!-- Intervention annotation at the transition point -->
  <line x1="380" y1="75" x2="380" y2="115" stroke="#3bc4a1" stroke-width="1.5" marker-end="url(#arrIntervention)" stroke-dasharray="3,2"/>
  <rect x="340" y="60" width="110" height="16" rx="4" fill="#3bc4a1" opacity="0.1" stroke="#3bc4a1" stroke-width="0.5"/>
  <text x="395" y="71" text-anchor="middle" fill="#3bc4a1" font-size="8" font-weight="600">Inject diversity here</text>

  <!-- Examples of what happens -->
  <text x="110" y="195" text-anchor="middle" fill="#3bc4a1" font-size="7" opacity="0.8">User discovers</text>
  <text x="110" y="205" text-anchor="middle" fill="#3bc4a1" font-size="7" opacity="0.8">new content</text>

  <text x="450" y="175" text-anchor="middle" fill="#ef4444" font-size="7" opacity="0.8">Same items</text>
  <text x="450" y="185" text-anchor="middle" fill="#ef4444" font-size="7" opacity="0.8">repeated</text>

  <!-- Bottom insight -->
  <rect x="100" y="278" width="350" height="16" rx="4" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="275" y="290" text-anchor="middle" fill="#999" font-size="8">Increasing diversity before fatigue sets in improves long-term engagement</text>
</svg>