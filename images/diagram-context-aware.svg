<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#0c8383"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" rx="12" fill="#f5f5f4"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Context-Aware Recommendations</text>

  <!-- Central user -->
  <circle cx="300" cy="142" r="30" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="2"/>
  <text x="300" y="136" text-anchor="middle" font-size="22">&#x1F464;</text>
  <text x="300" y="152" text-anchor="middle" font-size="8" font-weight="bold" fill="#0c8383">Same User</text>

  <!-- ===== Context 1: Morning commute (top-left) ===== -->
  <g transform="translate(42, 42)">
    <rect x="0" y="0" width="155" height="72" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Mobile icon -->
    <rect x="12" y="10" width="18" height="28" rx="3" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1"/>
    <rect x="18" y="32" width="6" height="2" rx="1" fill="#0c8383"/>
    <text x="42" y="22" font-size="10" font-weight="bold" fill="#0b1225">Morning Commute</text>
    <text x="42" y="34" font-size="8" fill="#6b7280">Short content, news</text>
    <text x="42" y="45" font-size="8" fill="#6b7280">Podcasts, quick reads</text>
    <rect x="42" y="52" width="60" height="13" rx="3" fill="#0c8383" fill-opacity="0.1"/>
    <text x="72" y="61" text-anchor="middle" font-size="7" fill="#0c8383">&#x23F1; &lt; 10 min</text>
  </g>
  <!-- Connector line from context 1 to center -->
  <line x1="197" y1="96" x2="274" y2="128" stroke="#0c8383" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ===== Context 2: Office (top-right) ===== -->
  <g transform="translate(403, 42)">
    <rect x="0" y="0" width="155" height="72" rx="8" fill="#ffffff" stroke="#3bc4a1" stroke-width="1.5"/>
    <!-- Desktop icon -->
    <rect x="12" y="10" width="22" height="16" rx="2" fill="#3bc4a1" fill-opacity="0.15" stroke="#3bc4a1" stroke-width="1"/>
    <line x1="23" y1="26" x2="23" y2="33" stroke="#3bc4a1" stroke-width="1.5"/>
    <line x1="15" y1="33" x2="31" y2="33" stroke="#3bc4a1" stroke-width="1.5"/>
    <text x="46" y="22" font-size="10" font-weight="bold" fill="#0b1225">Office</text>
    <text x="46" y="34" font-size="8" fill="#6b7280">Productivity tools, docs</text>
    <text x="46" y="45" font-size="8" fill="#6b7280">Professional content</text>
    <rect x="46" y="52" width="60" height="13" rx="3" fill="#3bc4a1" fill-opacity="0.1"/>
    <text x="76" y="61" text-anchor="middle" font-size="7" fill="#3bc4a1">&#x1F4BC; work mode</text>
  </g>
  <!-- Connector line from context 2 to center -->
  <line x1="403" y1="96" x2="326" y2="128" stroke="#3bc4a1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ===== Context 3: Gym (bottom-left) ===== -->
  <g transform="translate(42, 186)">
    <rect x="0" y="0" width="155" height="72" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- Activity icon -->
    <circle cx="23" cy="22" r="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="23" y="26" text-anchor="middle" font-size="12">&#x1F3CB;</text>
    <text x="46" y="18" font-size="10" font-weight="bold" fill="#0b1225">Gym</text>
    <text x="46" y="30" font-size="8" fill="#6b7280">Energetic music</text>
    <text x="46" y="41" font-size="8" fill="#6b7280">Workout videos</text>
    <rect x="46" y="48" width="60" height="13" rx="3" fill="#f59e0b" fill-opacity="0.1"/>
    <text x="76" y="57" text-anchor="middle" font-size="7" fill="#b45309">&#x26A1; high energy</text>
  </g>
  <!-- Connector line from context 3 to center -->
  <line x1="197" y1="204" x2="274" y2="158" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ===== Context 4: Evening couch (bottom-right) ===== -->
  <g transform="translate(403, 186)">
    <rect x="0" y="0" width="155" height="72" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <!-- TV icon -->
    <rect x="10" y="10" width="26" height="18" rx="3" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <line x1="16" y1="16" x2="30" y2="16" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="23" y1="28" x2="23" y2="33" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="16" y1="33" x2="30" y2="33" stroke="#ef4444" stroke-width="1"/>
    <text x="46" y="18" font-size="10" font-weight="bold" fill="#0b1225">Evening Couch</text>
    <text x="46" y="30" font-size="8" fill="#6b7280">Movies, long reads</text>
    <text x="46" y="41" font-size="8" fill="#6b7280">Relaxation content</text>
    <rect x="46" y="48" width="60" height="13" rx="3" fill="#ef4444" fill-opacity="0.1"/>
    <text x="76" y="57" text-anchor="middle" font-size="7" fill="#ef4444">&#x1F6CB; lean back</text>
  </g>
  <!-- Connector line from context 4 to center -->
  <line x1="403" y1="204" x2="326" y2="158" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Bottom message -->
  <rect x="155" y="275" width="290" height="18" rx="9" fill="#0c8383" fill-opacity="0.1"/>
  <text x="300" y="288" text-anchor="middle" font-size="9" font-weight="bold" fill="#0c8383">Same user, 4 different recommendation strategies</text>
</svg>