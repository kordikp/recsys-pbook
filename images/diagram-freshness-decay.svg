<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" font-family="system-ui, sans-serif">
  <rect width="500" height="300" rx="8" fill="#f5f5f4"/>

  <text x="250" y="24" text-anchor="middle" fill="#0b1225" font-size="13" font-weight="700">Freshness Decay by Domain</text>

  <!-- Axes -->
  <line x1="60" y1="45" x2="60" y2="240" stroke="#0b1225" stroke-width="1"/>
  <line x1="60" y1="240" x2="470" y2="240" stroke="#0b1225" stroke-width="1"/>

  <!-- Y axis label -->
  <text x="18" y="145" text-anchor="middle" fill="#0b1225" font-size="10" font-weight="500" transform="rotate(-90, 18, 145)">Relevance Weight</text>

  <!-- Y axis ticks -->
  <text x="55" y="55" text-anchor="end" fill="#999" font-size="8">1.0</text>
  <text x="55" y="100" text-anchor="end" fill="#999" font-size="8">0.75</text>
  <text x="55" y="145" text-anchor="end" fill="#999" font-size="8">0.50</text>
  <text x="55" y="192" text-anchor="end" fill="#999" font-size="8">0.25</text>
  <text x="55" y="243" text-anchor="end" fill="#999" font-size="8">0.0</text>

  <!-- Grid lines -->
  <line x1="60" y1="52" x2="470" y2="52" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="60" y1="97" x2="470" y2="97" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="60" y1="142" x2="470" y2="142" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="60" y1="189" x2="470" y2="189" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- X axis label -->
  <text x="265" y="268" text-anchor="middle" fill="#0b1225" font-size="10" font-weight="500">Time Since Publication</text>

  <!-- X axis ticks -->
  <text x="100" y="255" text-anchor="middle" fill="#999" font-size="7">1h</text>
  <text x="150" y="255" text-anchor="middle" fill="#999" font-size="7">6h</text>
  <text x="200" y="255" text-anchor="middle" fill="#999" font-size="7">1d</text>
  <text x="260" y="255" text-anchor="middle" fill="#999" font-size="7">1w</text>
  <text x="330" y="255" text-anchor="middle" fill="#999" font-size="7">1m</text>
  <text x="400" y="255" text-anchor="middle" fill="#999" font-size="7">1y</text>
  <text x="455" y="255" text-anchor="middle" fill="#999" font-size="7">5y</text>

  <!-- News curve (steep, red) -->
  <path d="M60,52 Q80,55 100,100 Q120,170 150,220 Q180,235 250,238 L470,239"
    fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Social media curve (moderate, amber) -->
  <path d="M60,52 Q100,55 150,65 Q200,100 250,150 Q300,200 350,225 Q400,235 470,238"
    fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Movies curve (flat, teal) -->
  <path d="M60,52 Q150,55 250,62 Q350,72 400,80 Q450,90 470,95"
    fill="none" stroke="#0c8383" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Fill areas (subtle) -->
  <path d="M60,52 Q80,55 100,100 Q120,170 150,220 Q180,235 250,238 L470,239 L470,240 L60,240 Z"
    fill="#ef4444" opacity="0.05"/>
  <path d="M60,52 Q100,55 150,65 Q200,100 250,150 Q300,200 350,225 Q400,235 470,238 L470,240 L60,240 Z"
    fill="#f59e0b" opacity="0.05"/>
  <path d="M60,52 Q150,55 250,62 Q350,72 400,80 Q450,90 470,95 L470,240 L60,240 Z"
    fill="#0c8383" opacity="0.04"/>

  <!-- Legend -->
  <rect x="310" y="42" width="150" height="72" rx="4" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- News -->
  <line x1="320" y1="58" x2="340" y2="58" stroke="#ef4444" stroke-width="2.5"/>
  <text x="347" y="62" fill="#0b1225" font-size="9" font-weight="500">News</text>
  <text x="430" y="62" text-anchor="end" fill="#999" font-size="7">hours</text>

  <!-- Social media -->
  <line x1="320" y1="78" x2="340" y2="78" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="347" y="82" fill="#0b1225" font-size="9" font-weight="500">Social Media</text>
  <text x="430" y="82" text-anchor="end" fill="#999" font-size="7">days</text>

  <!-- Movies -->
  <line x1="320" y1="98" x2="340" y2="98" stroke="#0c8383" stroke-width="2.5"/>
  <text x="347" y="102" fill="#0b1225" font-size="9" font-weight="500">Movies</text>
  <text x="430" y="102" text-anchor="end" fill="#999" font-size="7">years</text>

  <!-- Annotations -->
  <circle cx="115" cy="130" r="3" fill="#ef4444"/>
  <line x1="118" y1="128" x2="145" y2="118" stroke="#ef4444" stroke-width="0.5"/>
  <text x="148" y="118" fill="#ef4444" font-size="7">Breaking news</text>
  <text x="148" y="126" fill="#ef4444" font-size="7">loses value fast</text>

  <circle cx="440" cy="86" r="3" fill="#0c8383"/>
  <line x1="437" y1="89" x2="410" y2="108" stroke="#0c8383" stroke-width="0.5"/>
  <text x="365" y="115" fill="#0c8383" font-size="7">Classics remain</text>
  <text x="365" y="123" fill="#0c8383" font-size="7">relevant for years</text>

  <!-- Bottom note -->
  <text x="250" y="290" text-anchor="middle" fill="#999" font-size="8">Decay function: w(t) = exp(-lambda * t) -- lambda varies by domain</text>
</svg>