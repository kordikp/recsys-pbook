<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Alternating Least Squares (ALS)</text>
  <text x="300" y="42" text-anchor="middle" font-size="11" fill="#78716C">Matrix factorization via alternating optimization</text>

  <!-- === Matrix Decomposition: X ~ U x V^T === -->

  <!-- Matrix X (sparse) -->
  <g transform="translate(30, 65)">
    <text x="40" y="-5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0b1225">X</text>
    <text x="40" y="108" text-anchor="middle" font-size="8" fill="#78716C">(users x items)</text>
    <rect x="0" y="0" width="80" height="96" rx="4" fill="#f5f5f4" stroke="#0b1225" stroke-width="1.2"/>
    <!-- Sparse entries -->
    <rect x="4" y="4" width="12" height="12" rx="2" fill="#0c8383" opacity="0.7"/>
    <rect x="36" y="4" width="12" height="12" rx="2" fill="#0c8383" opacity="0.5"/>
    <rect x="20" y="20" width="12" height="12" rx="2" fill="#0c8383" opacity="0.8"/>
    <rect x="64" y="20" width="12" height="12" rx="2" fill="#0c8383" opacity="0.4"/>
    <rect x="4" y="36" width="12" height="12" rx="2" fill="#0c8383" opacity="0.6"/>
    <rect x="52" y="36" width="12" height="12" rx="2" fill="#0c8383" opacity="0.9"/>
    <rect x="36" y="52" width="12" height="12" rx="2" fill="#0c8383" opacity="0.3"/>
    <rect x="64" y="52" width="12" height="12" rx="2" fill="#0c8383" opacity="0.7"/>
    <rect x="20" y="68" width="12" height="12" rx="2" fill="#0c8383" opacity="0.5"/>
    <rect x="52" y="68" width="12" height="12" rx="2" fill="#0c8383" opacity="0.8"/>
    <rect x="4" y="84" width="12" height="12" rx="2" fill="#0c8383" opacity="0.4"/>
    <rect x="64" y="84" width="12" height="12" rx="2" fill="#0c8383" opacity="0.6"/>
    <!-- Empty cells shown as light outlines -->
    <rect x="20" y="4" width="12" height="12" rx="2" fill="none" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="52" y="4" width="12" height="12" rx="2" fill="none" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="4" y="20" width="12" height="12" rx="2" fill="none" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="36" y="20" width="12" height="12" rx="2" fill="none" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="20" y="36" width="12" height="12" rx="2" fill="none" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="36" y="36" width="12" height="12" rx="2" fill="none" stroke="#E7E5E4" stroke-width="0.5"/>
  </g>

  <!-- Approx sign -->
  <text x="130" y="120" text-anchor="middle" font-size="20" fill="#0b1225">&#x2248;</text>

  <!-- Matrix U (dense, tall) -->
  <g transform="translate(155, 65)">
    <text x="22" y="-5" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c8383">U</text>
    <text x="22" y="108" text-anchor="middle" font-size="8" fill="#78716C">(users x k)</text>
    <rect x="0" y="0" width="44" height="96" rx="4" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Dense fill pattern -->
    <rect x="4" y="4" width="16" height="12" rx="2" fill="#0c8383" opacity="0.5"/>
    <rect x="24" y="4" width="16" height="12" rx="2" fill="#0c8383" opacity="0.7"/>
    <rect x="4" y="20" width="16" height="12" rx="2" fill="#0c8383" opacity="0.8"/>
    <rect x="24" y="20" width="16" height="12" rx="2" fill="#0c8383" opacity="0.4"/>
    <rect x="4" y="36" width="16" height="12" rx="2" fill="#0c8383" opacity="0.6"/>
    <rect x="24" y="36" width="16" height="12" rx="2" fill="#0c8383" opacity="0.9"/>
    <rect x="4" y="52" width="16" height="12" rx="2" fill="#0c8383" opacity="0.3"/>
    <rect x="24" y="52" width="16" height="12" rx="2" fill="#0c8383" opacity="0.7"/>
    <rect x="4" y="68" width="16" height="12" rx="2" fill="#0c8383" opacity="0.5"/>
    <rect x="24" y="68" width="16" height="12" rx="2" fill="#0c8383" opacity="0.8"/>
    <rect x="4" y="84" width="16" height="12" rx="2" fill="#0c8383" opacity="0.7"/>
    <rect x="24" y="84" width="16" height="12" rx="2" fill="#0c8383" opacity="0.4"/>
  </g>

  <!-- Multiply sign -->
  <text x="218" y="120" text-anchor="middle" font-size="16" fill="#0b1225">&#x00D7;</text>

  <!-- Matrix V^T (dense, wide) -->
  <g transform="translate(235, 65)">
    <text x="40" y="-5" text-anchor="middle" font-size="12" font-weight="bold" fill="#3bc4a1">V&#x1D40;</text>
    <text x="40" y="56" text-anchor="middle" font-size="8" fill="#78716C">(k x items)</text>
    <rect x="0" y="0" width="80" height="44" rx="4" fill="#3bc4a1" fill-opacity="0.15" stroke="#3bc4a1" stroke-width="1.5"/>
    <!-- Dense fill pattern -->
    <rect x="4" y="4" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.6"/>
    <rect x="20" y="4" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.8"/>
    <rect x="36" y="4" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.4"/>
    <rect x="52" y="4" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.7"/>
    <rect x="64" y="4" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.5"/>
    <rect x="4" y="24" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.7"/>
    <rect x="20" y="24" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.5"/>
    <rect x="36" y="24" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.9"/>
    <rect x="52" y="24" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.3"/>
    <rect x="64" y="24" width="12" height="16" rx="2" fill="#3bc4a1" opacity="0.8"/>
  </g>

  <!-- === Alternating Steps === -->

  <!-- Step 1 box -->
  <rect x="350" y="60" width="230" height="70" rx="10" fill="#0c8383" fill-opacity="0.08" stroke="#0c8383" stroke-width="1.5"/>
  <text x="465" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c8383">Step 1: Fix V, Solve for U</text>

  <!-- V fixed indicator -->
  <g transform="translate(375, 88)">
    <rect x="0" y="0" width="24" height="16" rx="3" fill="#3bc4a1" fill-opacity="0.3" stroke="#3bc4a1" stroke-width="1"/>
    <text x="12" y="12" text-anchor="middle" font-size="8" font-weight="bold" fill="#3bc4a1">V</text>
    <text x="30" y="12" font-size="8" fill="#78716C">fixed</text>
  </g>

  <!-- U update indicator -->
  <g transform="translate(440, 88)">
    <rect x="0" y="0" width="24" height="16" rx="3" fill="#0c8383" fill-opacity="0.3" stroke="#0c8383" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="12" y="12" text-anchor="middle" font-size="8" font-weight="bold" fill="#0c8383">U</text>
    <text x="30" y="12" font-size="8" fill="#0c8383" font-weight="600">&#x2192; update</text>
  </g>

  <!-- Curved arrow from Step 1 to Step 2 -->
  <path d="M580,130 Q590,155 580,175" fill="none" stroke="#0b1225" stroke-width="1.5"/>
  <polygon points="577,175 580,183 583,175" fill="#0b1225"/>

  <!-- Step 2 box -->
  <rect x="350" y="185" width="230" height="70" rx="10" fill="#3bc4a1" fill-opacity="0.08" stroke="#3bc4a1" stroke-width="1.5"/>
  <text x="465" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#3bc4a1">Step 2: Fix U, Solve for V</text>

  <!-- U fixed indicator -->
  <g transform="translate(375, 213)">
    <rect x="0" y="0" width="24" height="16" rx="3" fill="#0c8383" fill-opacity="0.3" stroke="#0c8383" stroke-width="1"/>
    <text x="12" y="12" text-anchor="middle" font-size="8" font-weight="bold" fill="#0c8383">U</text>
    <text x="30" y="12" font-size="8" fill="#78716C">fixed</text>
  </g>

  <!-- V update indicator -->
  <g transform="translate(440, 213)">
    <rect x="0" y="0" width="24" height="16" rx="3" fill="#3bc4a1" fill-opacity="0.3" stroke="#3bc4a1" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="12" y="12" text-anchor="middle" font-size="8" font-weight="bold" fill="#3bc4a1">V</text>
    <text x="30" y="12" font-size="8" fill="#3bc4a1" font-weight="600">&#x2192; update</text>
  </g>

  <!-- Circular arrow: Repeat until convergence -->
  <path d="M350,240 Q310,260 310,190 Q310,130 350,130" fill="none" stroke="#0b1225" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="350,126 350,134 342,130" fill="#0b1225"/>

  <!-- Repeat label -->
  <text x="280" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#0b1225" transform="rotate(-90, 280, 195)">Repeat until</text>
  <text x="293" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#0b1225" transform="rotate(-90, 293, 195)">convergence</text>

  <!-- === Bottom annotation === -->
  <rect x="80" y="290" width="440" height="44" rx="8" fill="#0b1225"/>
  <text x="300" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="white">Key Insight</text>
  <text x="300" y="326" text-anchor="middle" font-size="10" fill="#A8A29E">Each step is a ridge regression with a closed-form solution: U &#x2190; X V(V&#x1D40;V + &#x03BB;I)&#x207B;&#x00B9;</text>
</svg>