<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes overlapAppear {
      0%, 60% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes labelFadeIn {
      0%, 70% { opacity: 0; }
      100% { opacity: 1; }
    }
    /* Search circle fades out as overlap appears */
    @keyframes searchFade {
      0% { opacity: 1; }
      40% { opacity: 1; }
      100% { opacity: 0.35; }
    }
    /* Recs circle fades out as overlap appears */
    @keyframes recsFade {
      0% { opacity: 1; }
      40% { opacity: 1; }
      100% { opacity: 0.35; }
    }

    .search-circle { animation: searchFade 3s ease-in-out infinite; }
    .recs-circle { animation: recsFade 3s ease-in-out infinite; }
    .overlap-content { opacity: 0; animation: overlapAppear 4.5s ease-out 2.5s infinite; }
    .merge-label { opacity: 0; animation: labelFadeIn 1s ease-out 3s infinite; }
    .sub-label { opacity: 0; animation: labelFadeIn 2.4s ease-out 3.5s infinite; }
    .initial-fade { opacity: 0; animation: fadeIn 1.8s ease-out 0.3s infinite; }
  </style>


  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Search and Recommendation Convergence</text>

  <!-- Search circle (pre-positioned overlapping) -->
  <g class="search-circle">
    <circle cx="255" cy="135" r="85" fill="#0c8383" fill-opacity="0.2" stroke="#0c8383" stroke-width="2.5" />
    <g class="initial-fade">
      <!-- Magnifying glass icon -->
      <circle cx="225" cy="115" r="12" fill="none" stroke="#0c8383" stroke-width="2.5" />
      <line x1="233" y1="123" x2="242" y2="132" stroke="#0c8383" stroke-width="2.5" stroke-linecap="round" />
      <text x="225" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c8383">Search</text>
      <text x="225" y="166" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Query-driven</text>
      <text x="225" y="178" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Explicit intent</text>
    </g>
  </g>

  <!-- Recommendation circle (pre-positioned overlapping) -->
  <g class="recs-circle">
    <circle cx="345" cy="135" r="85" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="2.5" />
    <g class="initial-fade">
      <!-- User icon -->
      <circle cx="375" cy="108" r="8" fill="none" stroke="#3bc4a1" stroke-width="2" />
      <path d="M360,132 Q367,120 375,120 Q383,120 390,132" fill="none" stroke="#3bc4a1" stroke-width="2" />
      <text x="375" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#3bc4a1">Recommendation</text>
      <text x="375" y="166" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">User-driven</text>
      <text x="375" y="178" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Implicit signals</text>
    </g>
  </g>

  <!-- Overlap area content (appears after merge) -->
  <g class="overlap-content">
    <rect x="268" y="95" width="64" height="80" rx="6" fill="#0b1225" fill-opacity="0.08" />
  </g>

  <!-- Merge label -->
  <g class="merge-label">
    <text x="300" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#0b1225">Unified</text>
    <text x="300" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#0b1225">Retrieval</text>
  </g>

  <!-- Sub-labels in overlap -->
  <g class="sub-label">
    <text x="300" y="158" text-anchor="middle" font-size="8" fill="#0c8383" font-weight="600">Dense retrieval</text>
    <text x="300" y="170" text-anchor="middle" font-size="8" fill="#3bc4a1" font-weight="600">Sparse retrieval</text>

    <!-- Bottom annotation -->
    <text x="300" y="230" text-anchor="middle" font-size="10" fill="#0b1225" opacity="0.5">Modern systems blend query understanding with personalization</text>
  </g>
</svg>