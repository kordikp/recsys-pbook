<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1C1917">Collaborative Filtering: The Story</text>

  <!-- Panel 1 -->
  <g transform="translate(10, 38)">
    <rect x="0" y="0" width="160" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Alice (left) -->
    <circle cx="45" cy="55" r="14" fill="#2563EB" opacity="0.2" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="45" cy="48" r="6" fill="#2563EB" opacity="0.5"/>
    <line x1="45" y1="54" x2="45" y2="72" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="35" y1="62" x2="55" y2="62" stroke="#2563EB" stroke-width="1.5"/>
    <text x="45" y="90" text-anchor="middle" font-size="9" fill="#2563EB" font-weight="bold">Alice</text>

    <!-- Alice's thought bubble -->
    <ellipse cx="45" cy="25" rx="28" ry="14" fill="white" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="22" y="16" width="12" height="16" rx="2" fill="#2563EB" opacity="0.3"/>
    <rect x="37" y="16" width="12" height="16" rx="2" fill="#059669" opacity="0.3"/>
    <rect x="52" y="16" width="12" height="16" rx="2" fill="#D97706" opacity="0.3"/>

    <!-- Bob (right) -->
    <circle cx="115" cy="55" r="14" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="1.5"/>
    <circle cx="115" cy="48" r="6" fill="#059669" opacity="0.5"/>
    <line x1="115" y1="54" x2="115" y2="72" stroke="#059669" stroke-width="1.5"/>
    <line x1="105" y1="62" x2="125" y2="62" stroke="#059669" stroke-width="1.5"/>
    <text x="115" y="90" text-anchor="middle" font-size="9" fill="#059669" font-weight="bold">Bob</text>

    <!-- Bob's thought bubble -->
    <ellipse cx="115" cy="25" rx="28" ry="14" fill="white" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="92" y="16" width="12" height="16" rx="2" fill="#2563EB" opacity="0.3"/>
    <rect x="107" y="16" width="12" height="16" rx="2" fill="#059669" opacity="0.3"/>
    <rect x="122" y="16" width="12" height="16" rx="2" fill="#D97706" opacity="0.3"/>

    <!-- Same books indicator -->
    <text x="80" y="38" text-anchor="middle" font-size="10" fill="#D97706">=</text>

    <!-- Caption -->
    <text x="80" y="110" text-anchor="middle" font-size="9" fill="#1C1917">Alice and Bob discover</text>
    <text x="80" y="122" text-anchor="middle" font-size="9" fill="#1C1917">they love the same</text>
    <text x="80" y="134" text-anchor="middle" font-size="9" fill="#1C1917">three books.</text>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#2563EB"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">1</text>
  </g>

  <!-- Panel 2 -->
  <g transform="translate(180, 38)">
    <rect x="0" y="0" width="160" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Bob holding book -->
    <circle cx="60" cy="45" r="6" fill="#059669" opacity="0.5"/>
    <line x1="60" y1="51" x2="60" y2="72" stroke="#059669" stroke-width="1.5"/>
    <line x1="50" y1="60" x2="60" y2="60" stroke="#059669" stroke-width="1.5"/>
    <line x1="60" y1="60" x2="75" y2="52" stroke="#059669" stroke-width="1.5"/>
    <line x1="60" y1="72" x2="50" y2="88" stroke="#059669" stroke-width="1.5"/>
    <line x1="60" y1="72" x2="70" y2="88" stroke="#059669" stroke-width="1.5"/>

    <!-- Book in hand -->
    <rect x="72" y="42" width="18" height="22" rx="3" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="81" y="56" text-anchor="middle" font-size="7" fill="#7C3AED" font-weight="bold">NEW</text>

    <!-- Speech bubble -->
    <rect x="80" y="15" width="70" height="38" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1"/>
    <polygon points="80,40 72,50 85,40" fill="white" stroke="#E7E5E4" stroke-width="1"/>
    <polygon points="81,39 74,48 84,39" fill="white"/>
    <text x="115" y="30" text-anchor="middle" font-size="8" fill="#1C1917">Have you</text>
    <text x="115" y="42" text-anchor="middle" font-size="8" fill="#1C1917">read this one?</text>

    <!-- Caption -->
    <text x="80" y="110" text-anchor="middle" font-size="9" fill="#1C1917">Bob recommends a</text>
    <text x="80" y="122" text-anchor="middle" font-size="9" fill="#1C1917">book Alice hasn't</text>
    <text x="80" y="134" text-anchor="middle" font-size="9" fill="#1C1917">seen yet.</text>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#2563EB"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>
  </g>

  <!-- Panel 3 -->
  <g transform="translate(350, 38)">
    <rect x="0" y="0" width="160" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Alice reading happily -->
    <circle cx="80" cy="40" r="6" fill="#2563EB" opacity="0.5"/>
    <line x1="80" y1="46" x2="80" y2="68" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="70" y1="56" x2="80" y2="56" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="80" y1="56" x2="90" y2="56" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="80" y1="68" x2="70" y2="85" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="80" y1="68" x2="90" y2="85" stroke="#2563EB" stroke-width="1.5"/>

    <!-- Book being read -->
    <rect x="62" y="50" width="14" height="18" rx="2" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1"/>

    <!-- Hearts -->
    <text x="55" y="35" font-size="12" fill="#DC2626" opacity="0.7">&#x2665;</text>
    <text x="100" y="30" font-size="10" fill="#DC2626" opacity="0.5">&#x2665;</text>
    <text x="95" y="48" font-size="8" fill="#DC2626" opacity="0.4">&#x2665;</text>

    <!-- Smile -->
    <path d="M76,39 Q80,43 84,39" fill="none" stroke="#2563EB" stroke-width="1"/>

    <!-- Caption -->
    <text x="80" y="110" text-anchor="middle" font-size="9" fill="#1C1917">Alice loves it — their</text>
    <text x="80" y="122" text-anchor="middle" font-size="9" fill="#1C1917">tastes really</text>
    <text x="80" y="134" text-anchor="middle" font-size="9" fill="#1C1917">do align!</text>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#2563EB"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">3</text>
  </g>

  <!-- Panel 4 (wider, bottom) -->
  <g transform="translate(520, 38)">
    <rect x="0" y="0" width="150" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Many small dots representing users -->
    <g fill="#78716C" opacity="0.3">
      <circle cx="30" cy="30" r="2.5"/>
      <circle cx="50" cy="25" r="2.5"/>
      <circle cx="70" cy="35" r="2.5"/>
      <circle cx="90" cy="28" r="2.5"/>
      <circle cx="110" cy="32" r="2.5"/>
      <circle cx="130" cy="26" r="2.5"/>
      <circle cx="40" cy="48" r="2.5"/>
      <circle cx="60" cy="55" r="2.5"/>
      <circle cx="80" cy="45" r="2.5"/>
      <circle cx="100" cy="52" r="2.5"/>
      <circle cx="120" cy="42" r="2.5"/>
      <circle cx="35" cy="68" r="2.5"/>
      <circle cx="55" cy="72" r="2.5"/>
      <circle cx="75" cy="62" r="2.5"/>
      <circle cx="95" cy="70" r="2.5"/>
      <circle cx="115" cy="58" r="2.5"/>
      <circle cx="135" cy="65" r="2.5"/>
      <circle cx="25" cy="85" r="2.5"/>
      <circle cx="45" cy="80" r="2.5"/>
      <circle cx="65" cy="88" r="2.5"/>
      <circle cx="85" cy="78" r="2.5"/>
      <circle cx="105" cy="82" r="2.5"/>
      <circle cx="125" cy="75" r="2.5"/>
    </g>

    <!-- Connection lines between similar users -->
    <g stroke="#2563EB" stroke-width="0.5" opacity="0.25">
      <line x1="50" y1="25" x2="70" y2="35"/>
      <line x1="70" y1="35" x2="80" y2="45"/>
      <line x1="40" y1="48" x2="60" y2="55"/>
      <line x1="100" y1="52" x2="120" y2="42"/>
      <line x1="55" y1="72" x2="75" y2="62"/>
      <line x1="85" y1="78" x2="105" y2="82"/>
      <line x1="35" y1="68" x2="45" y2="80"/>
    </g>

    <!-- Highlighted similar pair -->
    <circle cx="60" cy="55" r="4" fill="#2563EB" opacity="0.5"/>
    <circle cx="80" cy="45" r="4" fill="#059669" opacity="0.5"/>
    <line x1="60" y1="55" x2="80" y2="45" stroke="#D97706" stroke-width="1.5"/>

    <!-- Caption -->
    <text x="75" y="110" text-anchor="middle" font-size="9" fill="#1C1917">Scale this to millions:</text>
    <text x="75" y="122" text-anchor="middle" font-size="9" fill="#1C1917" font-weight="bold">that's collaborative</text>
    <text x="75" y="134" text-anchor="middle" font-size="9" fill="#1C1917" font-weight="bold">filtering.</text>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#2563EB"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">4</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(40, 230)">
    <rect x="0" y="0" width="600" height="160" rx="10" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1"/>

    <text x="300" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#1C1917">How Collaborative Filtering Works</text>

    <!-- Step 1 -->
    <g transform="translate(30, 40)">
      <circle cx="15" cy="12" r="12" fill="#2563EB" fill-opacity="0.1" stroke="#2563EB" stroke-width="1"/>
      <text x="15" y="16" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">1</text>
      <text x="35" y="16" font-size="11" fill="#1C1917">Find users with similar interaction patterns</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(30, 70)">
      <circle cx="15" cy="12" r="12" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1"/>
      <text x="15" y="16" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">2</text>
      <text x="35" y="16" font-size="11" fill="#1C1917">See what those similar users liked (but you haven't seen)</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(30, 100)">
      <circle cx="15" cy="12" r="12" fill="#D97706" fill-opacity="0.1" stroke="#D97706" stroke-width="1"/>
      <text x="15" y="16" text-anchor="middle" font-size="11" fill="#D97706" font-weight="bold">3</text>
      <text x="35" y="16" font-size="11" fill="#1C1917">Recommend those items — they'll probably match your taste too</text>
    </g>

    <!-- Key insight -->
    <text x="300" y="145" text-anchor="middle" font-size="10" fill="#78716C" font-style="italic">No content analysis needed — just patterns of who liked what</text>
  </g>
</svg>