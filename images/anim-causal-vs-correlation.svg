<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 250" font-family="system-ui,sans-serif">
  <style>
    .side{opacity:0;animation:fadeIn .5s ease forwards}
    .left{animation-delay:.3s}.right{animation-delay:1.2s}
    @keyframes fadeIn{to{opacity:1}}
    .qmark{animation:pulse 1.5s ease-in-out infinite;animation-delay:.8s}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .causal-arrow{stroke-dasharray:100;stroke-dashoffset:100;animation:draw 1s ease forwards;animation-delay:1.5s}
    @keyframes draw{to{stroke-dashoffset:0}}
  </style>
  <rect width="550" height="250" fill="#f5f5f4" rx="12"/>
  <text x="275" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#0b1225">Correlation vs Causation in RecSys</text>
  <!-- Correlation -->
  <g class="side left">
    <rect x="20" y="45" width="240" height="130" rx="10" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="140" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">Correlation</text>
    <text x="80" y="105" text-anchor="middle" font-size="28" fill="#f59e0b">A↑</text>
    <text x="140" y="110" text-anchor="middle" font-size="24" fill="#ef4444" class="qmark">?</text>
    <text x="200" y="105" text-anchor="middle" font-size="28" fill="#f59e0b">B↑</text>
    <text x="140" y="145" text-anchor="middle" font-size="10" fill="#666">Both go up together</text>
    <text x="140" y="162" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="600">But did A cause B?</text>
  </g>
  <!-- Causation -->
  <g class="side right">
    <rect x="290" y="45" width="240" height="130" rx="10" fill="#0c8383" opacity="0.08" stroke="#0c8383" stroke-width="1.5"/>
    <text x="410" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#0c8383">Causation</text>
    <text x="350" y="110" text-anchor="middle" font-size="28" fill="#0c8383">A</text>
    <line x1="370" y1="105" x2="450" y2="105" stroke="#0c8383" stroke-width="3" class="causal-arrow" marker-end="url(#ah3)"/>
    <text x="470" y="110" text-anchor="middle" font-size="28" fill="#0c8383">B</text>
    <text x="410" y="145" text-anchor="middle" font-size="10" fill="#666">A directly causes B</text>
    <text x="410" y="162" text-anchor="middle" font-size="10" fill="#0c8383" font-weight="600">Proven intervention effect</text>
  </g>
  <g class="side right">
    <text x="275" y="210" text-anchor="middle" font-size="11" fill="#0b1225" font-weight="600">Did your recommendation cause the click?</text>
    <text x="275" y="230" text-anchor="middle" font-size="10" fill="#666">Or would the user have found it anyway?</text>
  </g>
  <defs><marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0c8383"/></marker></defs>
</svg>
