<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1C1917">The Sparse Interaction Matrix</text>
  <text x="340" y="50" text-anchor="middle" font-size="12" fill="#78716C">Collaborative filtering finds patterns in user-item interactions</text>

  <!-- Matrix grid -->
  <g transform="translate(120, 70)">
    <!-- Column headers -->
    <text x="60" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item A</text>
    <text x="115" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item B</text>
    <text x="170" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item C</text>
    <text x="225" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item D</text>
    <text x="280" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item E</text>
    <text x="335" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item F</text>
    <text x="390" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item G</text>
    <text x="445" y="12" text-anchor="middle" font-size="11" fill="#78716C">Item H</text>

    <!-- Row headers -->
    <text x="-8" y="42" text-anchor="end" font-size="11" fill="#78716C">User 1</text>
    <text x="-8" y="87" text-anchor="end" font-size="11" fill="#78716C">User 2</text>
    <text x="-8" y="132" text-anchor="end" font-size="11" fill="#1C1917" font-weight="bold">User 3</text>
    <text x="-8" y="177" text-anchor="end" font-size="11" fill="#78716C">User 4</text>
    <text x="-8" y="222" text-anchor="end" font-size="11" fill="#78716C">User 5</text>
    <text x="-8" y="267" text-anchor="end" font-size="11" fill="#78716C">User 6</text>

    <!-- Grid lines -->
    <g stroke="#E7E5E4" stroke-width="1">
      <!-- Horizontal -->
      <line x1="30" y1="20" x2="470" y2="20"/>
      <line x1="30" y1="65" x2="470" y2="65"/>
      <line x1="30" y1="110" x2="470" y2="110"/>
      <line x1="30" y1="155" x2="470" y2="155"/>
      <line x1="30" y1="200" x2="470" y2="200"/>
      <line x1="30" y1="245" x2="470" y2="245"/>
      <line x1="30" y1="290" x2="470" y2="290"/>
      <!-- Vertical -->
      <line x1="30" y1="20" x2="30" y2="290"/>
      <line x1="85" y1="20" x2="85" y2="290"/>
      <line x1="140" y1="20" x2="140" y2="290"/>
      <line x1="195" y1="20" x2="195" y2="290"/>
      <line x1="250" y1="20" x2="250" y2="290"/>
      <line x1="305" y1="20" x2="305" y2="290"/>
      <line x1="360" y1="20" x2="360" y2="290"/>
      <line x1="415" y1="20" x2="415" y2="290"/>
      <line x1="470" y1="20" x2="470" y2="290"/>
    </g>

    <!-- Highlight User 3 row -->
    <rect x="31" y="111" width="438" height="44" fill="#2563EB" opacity="0.08" rx="2"/>

    <!-- Highlight User 1 row (similar) -->
    <rect x="31" y="21" width="438" height="44" fill="#7C3AED" opacity="0.06" rx="2"/>
    <!-- Highlight User 5 row (similar) -->
    <rect x="31" y="201" width="438" height="44" fill="#7C3AED" opacity="0.06" rx="2"/>

    <!-- Interaction dots — Blue=view, Green=purchase, Amber=rating -->
    <!-- User 1 -->
    <circle cx="60" cy="42" r="8" fill="#2563EB" opacity="0.85"/>
    <circle cx="170" cy="42" r="8" fill="#059669" opacity="0.85"/>
    <circle cx="280" cy="42" r="8" fill="#D97706" opacity="0.85"/>
    <circle cx="390" cy="42" r="8" fill="#2563EB" opacity="0.85"/>

    <!-- User 2 -->
    <circle cx="115" cy="87" r="8" fill="#059669" opacity="0.85"/>
    <circle cx="335" cy="87" r="8" fill="#D97706" opacity="0.85"/>

    <!-- User 3 (current user) -->
    <circle cx="60" cy="132" r="8" fill="#2563EB" opacity="0.85"/>
    <circle cx="170" cy="132" r="8" fill="#059669" opacity="0.85"/>
    <circle cx="280" cy="132" r="8" fill="#D97706" opacity="0.85"/>

    <!-- User 4 -->
    <circle cx="225" cy="177" r="8" fill="#2563EB" opacity="0.85"/>
    <circle cx="445" cy="177" r="8" fill="#059669" opacity="0.85"/>

    <!-- User 5 -->
    <circle cx="60" cy="222" r="8" fill="#2563EB" opacity="0.85"/>
    <circle cx="170" cy="222" r="8" fill="#059669" opacity="0.85"/>
    <circle cx="280" cy="222" r="8" fill="#D97706" opacity="0.85"/>
    <circle cx="335" cy="222" r="8" fill="#2563EB" opacity="0.85"/>
    <circle cx="390" cy="222" r="8" fill="#059669" opacity="0.85"/>

    <!-- User 6 -->
    <circle cx="115" cy="267" r="8" fill="#D97706" opacity="0.85"/>
    <circle cx="225" cy="267" r="8" fill="#2563EB" opacity="0.85"/>
    <circle cx="445" cy="267" r="8" fill="#059669" opacity="0.85"/>

    <!-- Predicted cell for User 3, Item G -->
    <rect x="366" y="115" width="48" height="36" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="4,3" rx="4"/>
    <text x="390" y="136" text-anchor="middle" font-size="10" fill="#D97706" font-weight="bold">?</text>
  </g>

  <!-- Arrow pointing to predicted cell -->
  <path d="M545,195 C570,195 570,195 570,215 L570,238" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="570" y="188" text-anchor="middle" font-size="11" fill="#D97706" font-weight="bold">predicted</text>

  <!-- Similarity brackets -->
  <path d="M100,94 C85,94 85,132 85,155" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M100,225 C85,225 85,200 85,182" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="72" y="172" text-anchor="middle" font-size="9" fill="#7C3AED" transform="rotate(-90, 72, 172)">similar users</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g transform="translate(140, 385)">
    <circle cx="0" cy="0" r="6" fill="#2563EB" opacity="0.85"/>
    <text x="12" y="4" font-size="11" fill="#78716C">View</text>
    <circle cx="80" cy="0" r="6" fill="#059669" opacity="0.85"/>
    <text x="92" y="4" font-size="11" fill="#78716C">Purchase</text>
    <circle cx="180" cy="0" r="6" fill="#D97706" opacity="0.85"/>
    <text x="192" y="4" font-size="11" fill="#78716C">Rating</text>
    <rect x="270" y="-8" width="16" height="16" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="3,2" rx="2"/>
    <text x="292" y="4" font-size="11" fill="#78716C">Predicted</text>
  </g>

  <!-- Subtitle -->
  <text x="340" y="410" text-anchor="middle" font-size="11" fill="#78716C">Most cells are empty — CF predicts missing values by finding users with similar patterns</text>
</svg>