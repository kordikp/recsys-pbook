<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes layerSlideIn {
      from { transform: translateX(-40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes itemFlow {
      0% { transform: translateX(-30px); opacity: 0; }
      10% { transform: translateX(0); opacity: 1; }
      90% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(30px); opacity: 0; }
    }
    @keyframes xAppear {
      0%, 40% { opacity: 0; transform: scale(0); }
      60% { opacity: 1; transform: scale(1.3); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes checkAppear {
      0%, 60% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes flowDash {
      from { stroke-dashoffset: 16; }
      to { stroke-dashoffset: 0; }
    }
    .layer { opacity: 0; }
    .layer-1 { animation: layerSlideIn 0.6s ease-out 0.3s forwards; }
    .layer-2 { animation: layerSlideIn 0.6s ease-out 0.7s forwards; }
    .layer-3 { animation: layerSlideIn 0.6s ease-out 1.1s forwards; }

    .item-flow { opacity: 0; animation: itemFlow 4s ease-in-out 1.8s infinite; }
    .item-flow-2 { animation-delay: 2.5s; }
    .item-flow-3 { animation-delay: 3.2s; }

    .x-mark { opacity: 0; }
    .x1 { animation: xAppear 0.8s ease-out 2.5s forwards; }
    .x2 { animation: xAppear 0.8s ease-out 3.0s forwards; }
    .x3 { animation: xAppear 0.8s ease-out 3.5s forwards; }

    .pass-check { opacity: 0; animation: checkAppear 0.5s ease-out 4s forwards; }
    .flow-line { stroke-dasharray: 8,4; animation: flowDash 0.6s linear infinite; }
  </style>

  <!-- Title -->
  <text x="275" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Content Safety Layers</text>

  <!-- Input items (left) -->
  <text x="20" y="60" font-size="10" fill="#0b1225" opacity="0.6">Incoming</text>
  <text x="20" y="73" font-size="10" fill="#0b1225" opacity="0.6">Content</text>

  <!-- Flow arrows -->
  <line class="flow-line" x1="65" y1="95" x2="65" y2="270" stroke="#0b1225" stroke-width="1.5" />

  <!-- Layer 1: Content Moderation (red) -->
  <g class="layer layer-1">
    <rect x="85" y="65" width="380" height="55" rx="8" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="2" />
    <rect x="85" y="65" width="6" height="55" rx="3" fill="#ef4444" />
    <text x="110" y="86" font-size="12" font-weight="bold" fill="#ef4444">Layer 1: Content Moderation</text>
    <text x="110" y="104" font-size="10" fill="#0b1225" opacity="0.7">Classify &amp; remove harmful content (hate, CSAM, violence)</text>

    <!-- X mark for blocked item -->
    <g class="x-mark x1">
      <circle cx="500" cy="92" r="14" fill="#ef4444" opacity="0.15" />
      <text x="500" y="98" text-anchor="middle" font-size="18" fill="#ef4444" font-weight="bold">&#x2717;</text>
    </g>
  </g>

  <!-- Arrow down -->
  <line class="flow-line" x1="275" y1="122" x2="275" y2="140" stroke="#0b1225" stroke-width="1" />

  <!-- Layer 2: Recommendation Filtering (amber) -->
  <g class="layer layer-2">
    <rect x="85" y="140" width="380" height="55" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="2" />
    <rect x="85" y="140" width="6" height="55" rx="3" fill="#f59e0b" />
    <text x="110" y="161" font-size="12" font-weight="bold" fill="#f59e0b">Layer 2: Recommendation Filtering</text>
    <text x="110" y="179" font-size="10" fill="#0b1225" opacity="0.7">Don't recommend borderline content (clickbait, misinformation)</text>

    <!-- X mark for filtered item -->
    <g class="x-mark x2">
      <circle cx="500" cy="167" r="14" fill="#f59e0b" opacity="0.15" />
      <text x="500" y="173" text-anchor="middle" font-size="18" fill="#f59e0b" font-weight="bold">&#x2717;</text>
    </g>
  </g>

  <!-- Arrow down -->
  <line class="flow-line" x1="275" y1="197" x2="275" y2="215" stroke="#0b1225" stroke-width="1" />

  <!-- Layer 3: Contextual Safety (teal) -->
  <g class="layer layer-3">
    <rect x="85" y="215" width="380" height="55" rx="8" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="2" />
    <rect x="85" y="215" width="6" height="55" rx="3" fill="#0c8383" />
    <text x="110" y="236" font-size="12" font-weight="bold" fill="#0c8383">Layer 3: Contextual Safety</text>
    <text x="110" y="254" font-size="10" fill="#0b1225" opacity="0.7">Context-dependent filtering (age, region, sensitivity)</text>

    <!-- X mark for context-filtered item -->
    <g class="x-mark x3">
      <circle cx="500" cy="242" r="14" fill="#0c8383" opacity="0.15" />
      <text x="500" y="248" text-anchor="middle" font-size="18" fill="#0c8383" font-weight="bold">&#x2717;</text>
    </g>
  </g>

  <!-- Output: safe items pass through -->
  <g class="pass-check">
    <line x1="275" y1="272" x2="275" y2="292" stroke="#3bc4a1" stroke-width="2" />
    <text x="275" y="295" text-anchor="middle" font-size="20" fill="#3bc4a1">&#x2713;</text>
    <text x="330" y="295" font-size="10" fill="#3bc4a1" font-weight="600">Safe to recommend</text>
  </g>

  <!-- Item count indicators -->
  <g class="pass-check">
    <text x="520" y="92" text-anchor="middle" font-size="8" fill="#ef4444">~2%</text>
    <text x="520" y="167" text-anchor="middle" font-size="8" fill="#f59e0b">~5%</text>
    <text x="520" y="242" text-anchor="middle" font-size="8" fill="#0c8383">~3%</text>
  </g>
</svg>