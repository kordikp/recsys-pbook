<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes tokenAppear {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes lineGrow {
      from { stroke-dashoffset: 200; opacity: 0.2; }
      to { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes pulseStrong {
      0%, 100% { opacity: 0.6; stroke-width: 1; }
      50% { opacity: 1; stroke-width: 3; }
    }
    @keyframes pulseWeak {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.3; }
    }
    @keyframes outputAppear {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes weightFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .input-token { opacity: 0; animation: tokenAppear 0.4s ease-out forwards; }
    .t1 { animation-delay: 0.2s; }
    .t2 { animation-delay: 0.4s; }
    .t3 { animation-delay: 0.6s; }
    .t4 { animation-delay: 0.8s; }
    .t5 { animation-delay: 1.0s; }

    .attn-line { stroke-dasharray: 200; stroke-dashoffset: 200; opacity: 0.2; animation: lineGrow 0.6s ease-out forwards; }
    .al1 { animation-delay: 1.5s; }
    .al2 { animation-delay: 1.7s; }
    .al3 { animation-delay: 1.9s; }
    .al4 { animation-delay: 2.1s; }
    .al5 { animation-delay: 2.3s; }
    .al6 { animation-delay: 2.5s; }
    .al7 { animation-delay: 2.7s; }
    .al8 { animation-delay: 2.9s; }

    .strong-pulse { animation: pulseStrong 2s ease-in-out 3.5s infinite; }
    .weak-pulse { animation: pulseWeak 2s ease-in-out 3.5s infinite; }

    .output-token { opacity: 0; animation: outputAppear 0.5s ease-out forwards; }
    .o1 { animation-delay: 3.2s; }
    .o2 { animation-delay: 3.4s; }
    .o3 { animation-delay: 3.6s; }
    .o4 { animation-delay: 3.8s; }
    .o5 { animation-delay: 4.0s; }

    .weight-label { opacity: 0; animation: weightFade 0.4s ease-out forwards; }
    .w1 { animation-delay: 3.5s; }
    .w2 { animation-delay: 3.7s; }
  </style>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Self-Attention Mechanism</text>

  <!-- Input tokens (bottom) -->
  <g class="input-token t1">
    <circle cx="80" cy="290" r="28" fill="#0c8383" />
    <text x="80" y="295" text-anchor="middle" font-size="14" fill="#f5f5f4" font-weight="bold">i&#x2081;</text>
  </g>
  <g class="input-token t2">
    <circle cx="190" cy="290" r="28" fill="#0c8383" />
    <text x="190" y="295" text-anchor="middle" font-size="14" fill="#f5f5f4" font-weight="bold">i&#x2082;</text>
  </g>
  <g class="input-token t3">
    <circle cx="300" cy="290" r="28" fill="#0c8383" />
    <text x="300" y="295" text-anchor="middle" font-size="14" fill="#f5f5f4" font-weight="bold">i&#x2083;</text>
  </g>
  <g class="input-token t4">
    <circle cx="410" cy="290" r="28" fill="#0c8383" />
    <text x="410" y="295" text-anchor="middle" font-size="14" fill="#f5f5f4" font-weight="bold">i&#x2084;</text>
  </g>
  <g class="input-token t5">
    <circle cx="520" cy="290" r="28" fill="#0c8383" />
    <text x="520" y="295" text-anchor="middle" font-size="14" fill="#f5f5f4" font-weight="bold">i&#x2085;</text>
  </g>

  <!-- Input label -->
  <text x="300" y="338" text-anchor="middle" font-size="11" fill="#0b1225" opacity="0.5">Input Embeddings</text>

  <!-- Attention lines (from i3 to others, showing self-attention for token 3) -->
  <!-- Strong connections -->
  <line class="attn-line al1 strong-pulse" x1="300" y1="262" x2="80" y2="262" stroke="#f59e0b" stroke-width="3" />
  <line class="attn-line al2 weak-pulse" x1="300" y1="262" x2="190" y2="262" stroke="#f59e0b" stroke-width="1" />
  <line class="attn-line al3 strong-pulse" x1="300" y1="262" x2="300" y2="160" stroke="#f59e0b" stroke-width="4" />
  <line class="attn-line al4 weak-pulse" x1="300" y1="262" x2="410" y2="262" stroke="#f59e0b" stroke-width="1" />
  <line class="attn-line al5 strong-pulse" x1="300" y1="262" x2="520" y2="262" stroke="#f59e0b" stroke-width="2.5" />

  <!-- Additional cross connections (lighter) -->
  <line class="attn-line al6 weak-pulse" x1="80" y1="262" x2="190" y2="105" stroke="#0c8383" stroke-width="0.8" opacity="0.3" />
  <line class="attn-line al7 weak-pulse" x1="410" y1="262" x2="410" y2="105" stroke="#0c8383" stroke-width="0.8" opacity="0.3" />
  <line class="attn-line al8 weak-pulse" x1="520" y1="262" x2="520" y2="105" stroke="#0c8383" stroke-width="0.8" opacity="0.3" />

  <!-- Weight labels -->
  <text class="weight-label w1" x="165" y="250" font-size="9" fill="#f59e0b" font-weight="bold">0.35</text>
  <text class="weight-label w1" x="230" y="256" font-size="9" fill="#f59e0b" opacity="0.5">0.05</text>
  <text class="weight-label w1" x="305" y="210" font-size="9" fill="#f59e0b" font-weight="bold">0.30</text>
  <text class="weight-label w2" x="345" y="256" font-size="9" fill="#f59e0b" opacity="0.5">0.08</text>
  <text class="weight-label w2" x="425" y="250" font-size="9" fill="#f59e0b" font-weight="bold">0.22</text>

  <!-- Output tokens (top) -->
  <g class="output-token o1">
    <circle cx="80" cy="80" r="24" fill="#3bc4a1" />
    <text x="80" y="85" text-anchor="middle" font-size="13" fill="#0b1225" font-weight="bold">o&#x2081;</text>
  </g>
  <g class="output-token o2">
    <circle cx="190" cy="80" r="24" fill="#3bc4a1" />
    <text x="190" y="85" text-anchor="middle" font-size="13" fill="#0b1225" font-weight="bold">o&#x2082;</text>
  </g>
  <g class="output-token o3">
    <circle cx="300" cy="80" r="24" fill="#3bc4a1" />
    <text x="300" y="85" text-anchor="middle" font-size="13" fill="#0b1225" font-weight="bold">o&#x2083;</text>
  </g>
  <g class="output-token o4">
    <circle cx="410" cy="80" r="24" fill="#3bc4a1" />
    <text x="410" y="85" text-anchor="middle" font-size="13" fill="#0b1225" font-weight="bold">o&#x2084;</text>
  </g>
  <g class="output-token o5">
    <circle cx="520" cy="80" r="24" fill="#3bc4a1" />
    <text x="520" y="85" text-anchor="middle" font-size="13" fill="#0b1225" font-weight="bold">o&#x2085;</text>
  </g>

  <!-- Output label -->
  <text x="300" y="48" text-anchor="middle" font-size="11" fill="#0b1225" opacity="0.5">Contextual Output</text>

  <!-- Annotation -->
  <text x="300" y="178" text-anchor="middle" font-size="10" fill="#0b1225" opacity="0.6">Attention weights for i&#x2083; shown</text>
  <text x="300" y="192" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.4">Thicker line = higher attention weight</text>
</svg>