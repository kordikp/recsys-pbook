<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="680" height="440" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1C1917">Items in Embedding Space</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#78716C">Similar items cluster together; recommendations = finding nearest neighbors</text>

  <!-- Axes -->
  <g transform="translate(60, 70)">
    <!-- Axis lines -->
    <line x1="0" y1="310" x2="560" y2="310" stroke="#E7E5E4" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="310" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="280" y="340" text-anchor="middle" font-size="11" fill="#78716C">Dimension 1</text>
    <text x="-20" y="155" text-anchor="middle" font-size="11" fill="#78716C" transform="rotate(-90, -20, 155)">Dimension 2</text>

    <!-- Sci-Fi cluster (blue, upper-left) -->
    <g fill="#2563EB" opacity="0.7">
      <ellipse cx="130" cy="75" rx="85" ry="65" fill="#2563EB" fill-opacity="0.06" stroke="#2563EB" stroke-width="1" stroke-dasharray="4,3"/>
      <circle cx="100" cy="60" r="6"/>
      <circle cx="140" cy="50" r="6"/>
      <circle cx="120" cy="90" r="6"/>
      <circle cx="155" cy="75" r="6"/>
      <circle cx="90" cy="80" r="6"/>
      <circle cx="135" cy="105" r="6"/>
      <circle cx="165" cy="55" r="6"/>
      <circle cx="110" cy="45" r="6"/>
      <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563EB" opacity="1">Sci-Fi Movies</text>
    </g>

    <!-- Cooking cluster (green, right-middle) -->
    <g fill="#059669" opacity="0.7">
      <ellipse cx="420" cy="140" rx="80" ry="60" fill="#059669" fill-opacity="0.06" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>
      <circle cx="400" cy="125" r="6"/>
      <circle cx="430" cy="145" r="6"/>
      <circle cx="445" cy="120" r="6"/>
      <circle cx="410" cy="160" r="6"/>
      <circle cx="460" cy="150" r="6"/>
      <circle cx="390" cy="145" r="6"/>
      <circle cx="440" cy="170" r="6"/>
      <text x="420" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669" opacity="1">Cooking Shows</text>
    </g>

    <!-- Sports cluster (red, lower-center) -->
    <g fill="#DC2626" opacity="0.7">
      <ellipse cx="280" cy="245" rx="90" ry="50" fill="#DC2626" fill-opacity="0.06" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3"/>
      <circle cx="260" cy="235" r="6"/>
      <circle cx="290" cy="250" r="6"/>
      <circle cx="310" cy="230" r="6"/>
      <circle cx="245" cy="255" r="6"/>
      <circle cx="275" cy="270" r="6"/>
      <circle cx="320" cy="260" r="6"/>
      <circle cx="300" cy="215" r="6"/>
      <circle cx="255" cy="220" r="6"/>
      <text x="280" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#DC2626" opacity="1">Sports Content</text>
    </g>

    <!-- User preference (star) -->
    <polygon points="105,75 109,86 121,86 112,93 115,105 105,98 95,105 98,93 89,86 101,86" fill="#D97706" stroke="#D97706" stroke-width="1"/>

    <!-- Recommendation arrow from user to nearby sci-fi item -->
    <line x1="115" y1="85" x2="150" y2="98" stroke="#D97706" stroke-width="2" marker-end="url(#arrowOrange2)"/>

    <!-- User label -->
    <text x="75" y="72" font-size="10" fill="#D97706" font-weight="bold">Your taste</text>

    <!-- NEW item near sci-fi cluster -->
    <g transform="translate(175, 65)">
      <circle cx="0" cy="0" r="8" fill="#7C3AED" opacity="0.8"/>
      <rect x="8" y="-10" width="32" height="16" rx="4" fill="#7C3AED"/>
      <text x="24" y="-1" text-anchor="middle" font-size="8" fill="white" font-weight="bold">NEW</text>
    </g>

    <!-- Dashed line from NEW item to cluster -->
    <line x1="175" y1="65" x2="155" y2="75" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Arrow marker for orange -->
  <defs>
    <marker id="arrowOrange2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g transform="translate(80, 410)">
    <polygon points="0,0 3,7 10,7 5,11 7,18 0,14 -7,18 -5,11 -10,7 -3,7" fill="#D97706" transform="scale(0.6) translate(10,-8)"/>
    <text x="20" y="4" font-size="10" fill="#78716C">User preference</text>

    <line x1="130" y1="0" x2="160" y2="0" stroke="#D97706" stroke-width="2" marker-end="url(#arrowOrange2)"/>
    <text x="168" y="4" font-size="10" fill="#78716C">Recommendation direction</text>

    <circle cx="335" cy="0" r="5" fill="#7C3AED" opacity="0.8"/>
    <text x="345" y="4" font-size="10" fill="#78716C">New item (placed by content)</text>
  </g>

  <!-- Subtitle -->
  <text x="340" y="435" text-anchor="middle" font-size="11" fill="#78716C">New items can be placed in embedding space based on their content features alone</text>
</svg>