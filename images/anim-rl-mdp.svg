<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes dashFlow {
      from { stroke-dashoffset: 24; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes nodeGlow {
      0%, 100% { filter: drop-shadow(0 0 0px transparent); }
      50% { filter: drop-shadow(0 0 6px rgba(12,131,131,0.4)); }
    }
    @keyframes arrowFlow1 {
      0%, 100% { opacity: 0.4; }
      25% { opacity: 1; }
    }
    @keyframes arrowFlow2 {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes arrowFlow3 {
      0%, 100% { opacity: 0.4; }
      75% { opacity: 1; }
    }
    @keyframes arrowFlow4 {
      0%, 100% { opacity: 0.4; }
      100% { opacity: 1; }
    }
    .node { opacity: 0; }
    .node-1 { animation: fadeIn 1.5s ease-out 0.3s infinite; }
    .node-2 { animation: fadeIn 1.5s ease-out 0.6s infinite; }
    .node-3 { animation: fadeIn 1.5s ease-out 0.9s infinite; }
    .node-4 { animation: fadeIn 1.5s ease-out 1.2s infinite; }
    .flow-arrow {
      stroke-dasharray: 8,4;
      animation: dashFlow 0.8s linear infinite;
    }
    .flow-1 { animation: dashFlow 0.8s linear infinite, arrowFlow1 3.2s ease-in-out infinite; }
    .flow-2 { animation: dashFlow 0.8s linear infinite, arrowFlow2 3.2s ease-in-out infinite; }
    .flow-3 { animation: dashFlow 0.8s linear infinite, arrowFlow3 3.2s ease-in-out infinite; }
    .flow-4 { animation: dashFlow 0.8s linear infinite, arrowFlow4 3.2s ease-in-out infinite; }
    .glow-1 { animation: nodeGlow 3.2s ease-in-out infinite; animation-delay: 0s; }
    .glow-2 { animation: nodeGlow 3.2s ease-in-out infinite; animation-delay: 0.8s; }
    .glow-3 { animation: nodeGlow 3.2s ease-in-out infinite; animation-delay: 1.6s; }
    .glow-4 { animation: nodeGlow 3.2s ease-in-out infinite; animation-delay: 2.4s; }
  </style>

  <defs>
    <marker id="flowArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#0b1225" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">RL for Recommendations: MDP Loop</text>

  <!-- Flow arrows (curved paths connecting the nodes in a loop) -->
  <!-- State -> Action (top) -->
  <path class="flow-arrow flow-1" d="M195,95 Q300,40 405,95" fill="none" stroke="#0b1225" stroke-width="2" marker-end="url(#flowArrow)" />
  <!-- Action -> Reward (right) -->
  <path class="flow-arrow flow-2" d="M480,155 Q520,200 480,245" fill="none" stroke="#0b1225" stroke-width="2" marker-end="url(#flowArrow)" />
  <!-- Reward -> State' (bottom) -->
  <path class="flow-arrow flow-3" d="M405,275 Q300,320 195,275" fill="none" stroke="#0b1225" stroke-width="2" marker-end="url(#flowArrow)" />
  <!-- State' -> State (left) -->
  <path class="flow-arrow flow-4" d="M120,245 Q80,200 120,155" fill="none" stroke="#0b1225" stroke-width="2" marker-end="url(#flowArrow)" />

  <!-- Node 1: State (left) -->
  <g class="node node-1 glow-1">
    <rect x="90" y="110" width="140" height="50" rx="25" fill="#0c8383" />
    <text x="160" y="131" text-anchor="middle" font-size="10" fill="#f5f5f4" font-weight="600">State (s)</text>
    <text x="160" y="148" text-anchor="middle" font-size="9" fill="#f5f5f4" opacity="0.8">User Context</text>
  </g>

  <!-- Node 2: Action (right top) -->
  <g class="node node-2 glow-2">
    <rect x="370" y="110" width="140" height="50" rx="25" fill="#3bc4a1" />
    <text x="440" y="131" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">Action (a)</text>
    <text x="440" y="148" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.8">Recommend Item</text>
  </g>

  <!-- Node 3: Reward (right bottom) -->
  <g class="node node-3 glow-3">
    <rect x="370" y="240" width="140" height="50" rx="25" fill="#f59e0b" />
    <text x="440" y="261" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">Reward (r)</text>
    <text x="440" y="278" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.8">Engagement</text>
  </g>

  <!-- Node 4: State' (left bottom) -->
  <g class="node node-4 glow-4">
    <rect x="90" y="240" width="140" height="50" rx="25" fill="#0c8383" opacity="0.7" />
    <text x="160" y="261" text-anchor="middle" font-size="10" fill="#f5f5f4" font-weight="600">State' (s')</text>
    <text x="160" y="278" text-anchor="middle" font-size="9" fill="#f5f5f4" opacity="0.8">Updated Context</text>
  </g>

  <!-- Edge labels -->
  <text x="300" y="62" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Policy: &#x3c0;(a|s)</text>
  <text x="530" y="205" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Environment</text>
  <text x="300" y="310" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Transition: P(s'|s,a)</text>
  <text x="68" y="205" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Update</text>

  <!-- Center label -->
  <text x="300" y="192" text-anchor="middle" font-size="11" fill="#0b1225" font-weight="600">MDP</text>
  <text x="300" y="207" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Maximize cumulative reward</text>
</svg>