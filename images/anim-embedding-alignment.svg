<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes mergeLeft {
      0%   { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes mergeRight {
      0%   { opacity: 1; }
      100% { opacity: 1; }
    }
    /* Individual dot movements for alignment */
    @keyframes dot-tl1 { 0% { cx: 80; cy: 100; } 100% { cx: 220; cy: 115; } }
    @keyframes dot-tl2 { 0% { cx: 100; cy: 140; } 100% { cx: 240; cy: 145; } }
    @keyframes dot-tl3 { 0% { cx: 60; cy: 170; } 100% { cx: 215; cy: 170; } }
    @keyframes dot-tl4 { 0% { cx: 130; cy: 110; } 100% { cx: 260; cy: 125; } }
    @keyframes dot-tl5 { 0% { cx: 110; cy: 190; } 100% { cx: 245; cy: 185; } }
    @keyframes dot-tl6 { 0% { cx: 70; cy: 130; } 100% { cx: 225; cy: 135; } }
    @keyframes dot-tl7 { 0% { cx: 140; cy: 160; } 100% { cx: 265; cy: 160; } }
    @keyframes dot-tl8 { 0% { cx: 90; cy: 200; } 100% { cx: 235; cy: 195; } }

    @keyframes dot-br1 { 0% { cx: 470; cy: 110; } 100% { cx: 330; cy: 120; } }
    @keyframes dot-br2 { 0% { cx: 500; cy: 150; } 100% { cx: 350; cy: 150; } }
    @keyframes dot-br3 { 0% { cx: 460; cy: 180; } 100% { cx: 325; cy: 175; } }
    @keyframes dot-br4 { 0% { cx: 520; cy: 120; } 100% { cx: 365; cy: 130; } }
    @keyframes dot-br5 { 0% { cx: 490; cy: 190; } 100% { cx: 345; cy: 190; } }
    @keyframes dot-br6 { 0% { cx: 450; cy: 140; } 100% { cx: 315; cy: 140; } }
    @keyframes dot-br7 { 0% { cx: 510; cy: 170; } 100% { cx: 355; cy: 165; } }
    @keyframes dot-br8 { 0% { cx: 480; cy: 200; } 100% { cx: 340; cy: 200; } }

    .title { opacity: 0; animation: fadeIn 0.5s ease-out 0.1s forwards; }
    .space-label { opacity: 0; animation: fadeIn 0.5s ease-out 0.4s forwards; }

    /* Text space dots */
    .td1 { animation: dot-tl1 2s ease-in-out 2s forwards; }
    .td2 { animation: dot-tl2 2s ease-in-out 2s forwards; }
    .td3 { animation: dot-tl3 2s ease-in-out 2s forwards; }
    .td4 { animation: dot-tl4 2s ease-in-out 2s forwards; }
    .td5 { animation: dot-tl5 2s ease-in-out 2s forwards; }
    .td6 { animation: dot-tl6 2s ease-in-out 2s forwards; }
    .td7 { animation: dot-tl7 2s ease-in-out 2s forwards; }
    .td8 { animation: dot-tl8 2s ease-in-out 2s forwards; }

    /* Behavior space dots */
    .bd1 { animation: dot-br1 2s ease-in-out 2s forwards; }
    .bd2 { animation: dot-br2 2s ease-in-out 2s forwards; }
    .bd3 { animation: dot-br3 2s ease-in-out 2s forwards; }
    .bd4 { animation: dot-br4 2s ease-in-out 2s forwards; }
    .bd5 { animation: dot-br5 2s ease-in-out 2s forwards; }
    .bd6 { animation: dot-br6 2s ease-in-out 2s forwards; }
    .bd7 { animation: dot-br7 2s ease-in-out 2s forwards; }
    .bd8 { animation: dot-br8 2s ease-in-out 2s forwards; }

    /* Space boundaries merge */
    .text-boundary {
      animation: mergeLeft 2s ease-in-out 2s forwards;
    }
    .behavior-boundary {
      animation: mergeRight 2s ease-in-out 2s forwards;
    }

    /* Labels fade and move */
    .text-label-move { animation: mergeLeft 2s ease-in-out 2s forwards; }
    .behav-label-move { animation: mergeRight 2s ease-in-out 2s forwards; }

    /* Result label */
    .result { opacity: 0; animation: fadeIn 0.6s ease-out 4.2s forwards; }
    .aligned-label { opacity: 0; animation: fadeIn 0.5s ease-out 4.5s forwards; }
  
    @keyframes loopCycle { 0% { opacity: 0; } 3% { opacity: 1; } 47% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 0; } }
  </style>
<g class="loop-wrapper" style="animation: loopCycle 14s ease-in-out infinite">

  <!-- Title -->
  <text class="title" x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b1225">Embedding Space Alignment</text>

  <!-- Text Space boundary -->
  <g class="text-boundary">
    <ellipse class="space-label" cx="105" cy="155" rx="100" ry="80" fill="#0c8383" opacity="0.08" stroke="#0c8383" stroke-width="1.5" stroke-dasharray="5,3" />
  </g>

  <!-- Text space label -->
  <g class="text-label-move">
    <text class="space-label" x="105" y="65" text-anchor="middle" font-size="11" fill="#0c8383" font-weight="700">Text Space</text>
  </g>

  <!-- Text dots -->
  <circle class="td1" cx="80" cy="100" r="5" fill="#0c8383" opacity="0.8" />
  <circle class="td2" cx="100" cy="140" r="4" fill="#0c8383" opacity="0.7" />
  <circle class="td3" cx="60" cy="170" r="5.5" fill="#0c8383" opacity="0.8" />
  <circle class="td4" cx="130" cy="110" r="4" fill="#0c8383" opacity="0.6" />
  <circle class="td5" cx="110" cy="190" r="5" fill="#0c8383" opacity="0.7" />
  <circle class="td6" cx="70" cy="130" r="3.5" fill="#0c8383" opacity="0.8" />
  <circle class="td7" cx="140" cy="160" r="4.5" fill="#0c8383" opacity="0.7" />
  <circle class="td8" cx="90" cy="200" r="4" fill="#0c8383" opacity="0.6" />

  <!-- Behavior Space boundary -->
  <g class="behavior-boundary">
    <ellipse class="space-label" cx="495" cy="155" rx="100" ry="80" fill="#3bc4a1" opacity="0.08" stroke="#3bc4a1" stroke-width="1.5" stroke-dasharray="5,3" />
  </g>

  <!-- Behavior space label -->
  <g class="behav-label-move">
    <text class="space-label" x="495" y="65" text-anchor="middle" font-size="11" fill="#3bc4a1" font-weight="700">Behavior Space</text>
  </g>

  <!-- Behavior dots -->
  <circle class="bd1" cx="470" cy="110" r="5" fill="#3bc4a1" opacity="0.8" />
  <circle class="bd2" cx="500" cy="150" r="4" fill="#3bc4a1" opacity="0.7" />
  <circle class="bd3" cx="460" cy="180" r="5.5" fill="#3bc4a1" opacity="0.8" />
  <circle class="bd4" cx="520" cy="120" r="4" fill="#3bc4a1" opacity="0.6" />
  <circle class="bd5" cx="490" cy="190" r="5" fill="#3bc4a1" opacity="0.7" />
  <circle class="bd6" cx="450" cy="140" r="3.5" fill="#3bc4a1" opacity="0.8" />
  <circle class="bd7" cx="510" cy="170" r="4.5" fill="#3bc4a1" opacity="0.7" />
  <circle class="bd8" cx="480" cy="200" r="4" fill="#3bc4a1" opacity="0.6" />

  <!-- Center merge indicator (appears after merge) -->
  <g class="aligned-label">
    <text x="300" y="155" text-anchor="middle" font-size="12" fill="#0b1225" font-weight="600">Aligned</text>
  </g>

  <!-- Result label -->
  <g class="result">
    <rect x="160" y="260" width="280" height="30" rx="8" fill="#0b1225" />
    <text x="300" y="280" text-anchor="middle" font-size="10.5" fill="#f5f5f4" font-weight="600">beeFormer: ELSA loss aligns text to behavior</text>
  </g>
</g>
</svg>