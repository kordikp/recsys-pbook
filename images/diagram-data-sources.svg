<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1C1917">Three Pillars of Recommendation Data</text>

  <!-- Pillar 1: Item Catalog -->
  <rect x="40" y="60" width="160" height="180" rx="8" fill="#F5F5F4" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="40" y="60" width="160" height="34" rx="8" fill="#2563EB"/>
  <rect x="40" y="86" width="160" height="8" fill="#2563EB"/>
  <text x="120" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="white">Item Catalog</text>
  <!-- Grid icon -->
  <rect x="96" y="108" width="16" height="16" rx="2" fill="#BFDBFE" stroke="#2563EB" stroke-width="1"/>
  <rect x="116" y="108" width="16" height="16" rx="2" fill="#BFDBFE" stroke="#2563EB" stroke-width="1"/>
  <rect x="96" y="128" width="16" height="16" rx="2" fill="#BFDBFE" stroke="#2563EB" stroke-width="1"/>
  <rect x="116" y="128" width="16" height="16" rx="2" fill="#BFDBFE" stroke="#2563EB" stroke-width="1"/>
  <text x="120" y="168" text-anchor="middle" font-size="10" fill="#1C1917">Titles &amp; descriptions</text>
  <text x="120" y="183" text-anchor="middle" font-size="10" fill="#1C1917">Images &amp; media</text>
  <text x="120" y="198" text-anchor="middle" font-size="10" fill="#1C1917">Categories &amp; tags</text>
  <text x="120" y="213" text-anchor="middle" font-size="10" fill="#1C1917">Attributes &amp; metadata</text>
  <text x="120" y="232" text-anchor="middle" font-size="9" fill="#78716C">What to recommend</text>

  <!-- Pillar 2: Interactions (emphasized) -->
  <rect x="240" y="48" width="200" height="200" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <rect x="240" y="48" width="200" height="34" rx="8" fill="#D97706"/>
  <rect x="240" y="74" width="200" height="8" fill="#D97706"/>
  <text x="340" y="71" text-anchor="middle" font-size="14" font-weight="700" fill="white">Interactions</text>
  <!-- Connection dots with arrows icon -->
  <circle cx="310" cy="108" r="6" fill="#FED7AA" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="340" cy="126" r="6" fill="#FED7AA" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="370" cy="108" r="6" fill="#FED7AA" stroke="#D97706" stroke-width="1.5"/>
  <line x1="315" y1="111" x2="335" y2="123" stroke="#D97706" stroke-width="1.2"/>
  <line x1="345" y1="123" x2="365" y2="111" stroke="#D97706" stroke-width="1.2"/>
  <line x1="316" y1="105" x2="364" y2="105" stroke="#D97706" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="340" y="158" text-anchor="middle" font-size="10" fill="#1C1917">Clicks &amp; detail views</text>
  <text x="340" y="173" text-anchor="middle" font-size="10" fill="#1C1917">Purchases &amp; bookmarks</text>
  <text x="340" y="188" text-anchor="middle" font-size="10" fill="#1C1917">Ratings &amp; reviews</text>
  <text x="340" y="203" text-anchor="middle" font-size="10" fill="#1C1917">Search queries</text>
  <text x="340" y="218" text-anchor="middle" font-size="10" fill="#1C1917">Session sequences</text>
  <text x="340" y="240" text-anchor="middle" font-size="9" fill="#78716C">The core signal</text>
  <!-- Emphasis star -->
  <text x="430" y="66" font-size="11" fill="white">&#9733;</text>

  <!-- Pillar 3: User Catalog -->
  <rect x="480" y="60" width="160" height="180" rx="8" fill="#F5F5F4" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="480" y="60" width="160" height="34" rx="8" fill="#7C3AED"/>
  <rect x="480" y="86" width="160" height="8" fill="#7C3AED"/>
  <text x="560" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="white">User Catalog</text>
  <!-- People icon -->
  <circle cx="545" cy="114" r="8" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  <path d="M535,132 Q545,126 555,132" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="570" cy="114" r="6" fill="none" stroke="#C4B5FD" stroke-width="1.2"/>
  <path d="M562,128 Q570,124 578,128" fill="none" stroke="#C4B5FD" stroke-width="1.2"/>
  <text x="560" y="168" text-anchor="middle" font-size="10" fill="#1C1917">Demographics</text>
  <text x="560" y="183" text-anchor="middle" font-size="10" fill="#1C1917">Location &amp; language</text>
  <text x="560" y="198" text-anchor="middle" font-size="10" fill="#1C1917">Preferences</text>
  <text x="560" y="213" text-anchor="middle" font-size="10" fill="#1C1917">Segments &amp; cohorts</text>
  <text x="560" y="232" text-anchor="middle" font-size="9" fill="#78716C">Who to recommend to</text>

  <!-- Arrows down to recommender -->
  <line x1="120" y1="244" x2="250" y2="300" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="340" y1="252" x2="340" y2="292" stroke="#D97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <line x1="560" y1="244" x2="430" y2="300" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Central Recommender System box -->
  <rect x="220" y="296" width="240" height="48" rx="8" fill="#1C1917"/>
  <text x="340" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="white">Recommender System</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2563EB" stroke-width="1.5"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#D97706" stroke-width="1.5"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>