<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" font-family="system-ui,sans-serif">
  <style>
    .card { opacity: 0; animation: popIn 18s ease infinite; }
    .cd1{animation-delay:.2s} .cd2{animation-delay:.4s} .cd3{animation-delay:.6s}
    .cd4{animation-delay:.8s} .cd5{animation-delay:1.0s} .cd6{animation-delay:1.2s}
    @keyframes popIn { 0% { opacity: 0; } 8% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
  </style>

  <rect width="650" height="250" fill="#f5f5f4" rx="12"/>
  <text x="325" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0b1225">Recommendation Scenarios</text>
  <!-- Row 1 -->
  <g class="card cd1"><rect x="20" y="50" width="190" height="80" rx="8" fill="#0c8383"/><text x="115" y="78" text-anchor="middle" font-size="22">🏠</text><text x="115" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="white">Homepage</text><text x="115" y="116" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Personalized discovery</text></g>
  <g class="card cd2"><rect x="230" y="50" width="190" height="80" rx="8" fill="#3bc4a1"/><text x="325" y="78" text-anchor="middle" font-size="22">📦</text><text x="325" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="white">Product Detail</text><text x="325" y="116" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Similar &amp; complementary</text></g>
  <g class="card cd3"><rect x="440" y="50" width="190" height="80" rx="8" fill="#f59e0b"/><text x="535" y="78" text-anchor="middle" font-size="22">🛒</text><text x="535" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="white">Cart / Checkout</text><text x="535" y="116" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Cross-sell add-ons</text></g>
  <!-- Row 2 -->
  <g class="card cd4"><rect x="20" y="150" width="190" height="80" rx="8" fill="#0b1225"/><text x="115" y="178" text-anchor="middle" font-size="22">🔍</text><text x="115" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="white">Search</text><text x="115" y="216" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">Personalized ranking</text></g>
  <g class="card cd5"><rect x="230" y="150" width="190" height="80" rx="8" fill="#ef4444" opacity="0.85"/><text x="325" y="178" text-anchor="middle" font-size="22">📧</text><text x="325" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="white">Email / Newsletter</text><text x="325" y="216" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Re-engagement + rotation</text></g>
  <g class="card cd6"><rect x="440" y="150" width="190" height="80" rx="8" fill="#0c8383" opacity="0.8"/><text x="535" y="178" text-anchor="middle" font-size="22">▶️</text><text x="535" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="white">Continue / Watch Next</text><text x="535" y="216" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Resume &amp; post-playback</text></g>
</svg>