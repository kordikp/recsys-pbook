<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" font-family="system-ui,sans-serif">
  <style>
    @keyframes ratingAppear { 0%,100% { opacity: 0; } 5%,45% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes matchGlow { 0%,20%,100% { opacity: 0; } 25%,45% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes recAppear { 0%,35%,100% { opacity: 0; } 40%,48% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes arrowDraw { 0%,30%,100% { stroke-dashoffset: 40; opacity: 0; } 35%,46% { stroke-dashoffset: 0; opacity: 1; } 50% { stroke-dashoffset: 40; opacity: 0; } }
    .p1 { opacity: 0; animation: ratingAppear 12s ease-in-out infinite; }
    .p1a{animation-delay:0s} .p1b{animation-delay:.2s} .p1c{animation-delay:.4s} .p1d{animation-delay:.6s}
    .match { opacity: 0; animation: matchGlow 12s ease-in-out infinite; }
    .rec { opacity: 0; animation: recAppear 12s ease-in-out infinite; }
    .fa { stroke-dasharray: 40; stroke-dashoffset: 40; opacity: 0; animation: arrowDraw 12s ease-in-out infinite; }
  </style>
  <rect width="640" height="180" fill="#0b1225" rx="12"/>

  <!-- Left: Rating matrix (compact) -->
  <text x="15" y="18" font-size="9" font-weight="600" fill="#3bc4a1">Rating Matrix</text>
  <!-- Headers -->
  <text x="100" y="32" text-anchor="middle" font-size="9" fill="#0c8383">🎬</text>
  <text x="130" y="32" text-anchor="middle" font-size="9" fill="#0c8383">📚</text>
  <text x="160" y="32" text-anchor="middle" font-size="9" fill="#0c8383">🎵</text>
  <text x="190" y="32" text-anchor="middle" font-size="9" fill="#0c8383">🎮</text>

  <!-- You -->
  <rect x="12" y="38" width="195" height="22" rx="3" fill="#0c8383" opacity="0.15"/>
  <text x="52" y="53" text-anchor="middle" font-size="9" font-weight="700" fill="#0c8383">You</text>
  <text x="100" y="54" text-anchor="middle" font-size="12" font-weight="700" fill="#3bc4a1" class="p1 p1a">★5</text>
  <text x="130" y="54" text-anchor="middle" font-size="12" font-weight="700" fill="#3bc4a1" class="p1 p1b">★4</text>
  <text x="160" y="54" text-anchor="middle" font-size="12" font-weight="700" fill="#666" class="p1 p1c">★2</text>
  <text x="190" y="54" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b" class="p1 p1d">?</text>

  <!-- Alice -->
  <rect x="12" y="63" width="195" height="22" rx="3" fill="#3bc4a1" opacity="0.06"/>
  <text x="52" y="78" text-anchor="middle" font-size="9" fill="#888">Alice</text>
  <text x="100" y="79" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1a">★5</text>
  <text x="130" y="79" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1b">★4</text>
  <text x="160" y="79" text-anchor="middle" font-size="12" fill="#666" class="p1 p1c">★3</text>
  <text x="190" y="79" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1d">★5</text>

  <!-- Bob -->
  <text x="52" y="101" text-anchor="middle" font-size="9" fill="#555">Bob</text>
  <text x="100" y="102" text-anchor="middle" font-size="12" fill="#666" class="p1 p1a">★2</text>
  <text x="130" y="102" text-anchor="middle" font-size="12" fill="#666" class="p1 p1b">★1</text>
  <text x="160" y="102" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1c">★5</text>
  <text x="190" y="102" text-anchor="middle" font-size="12" fill="#666" class="p1 p1d">★3</text>

  <!-- Carol -->
  <text x="52" y="123" text-anchor="middle" font-size="9" fill="#888">Carol</text>
  <text x="100" y="124" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1a">★4</text>
  <text x="130" y="124" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1b">★5</text>
  <text x="160" y="124" text-anchor="middle" font-size="12" fill="#666" class="p1 p1c">★1</text>
  <text x="190" y="124" text-anchor="middle" font-size="12" fill="#3bc4a1" class="p1 p1d">★4</text>

  <!-- Match highlight -->
  <rect x="10" y="36" width="199" height="25" rx="4" fill="none" stroke="#3bc4a1" stroke-width="1.5" class="match"/>
  <rect x="10" y="61" width="199" height="25" rx="4" fill="none" stroke="#3bc4a1" stroke-width="1.5" class="match"/>
  <text x="140" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#3bc4a1" class="match">Taste Twin found!</text>

  <!-- Center: Arrow -->
  <line x1="215" y1="70" x2="280" y2="70" stroke="#f59e0b" stroke-width="2" class="fa" stroke-linecap="round"/>
  <text x="248" y="62" text-anchor="middle" font-size="8" fill="#f59e0b" class="rec">predict</text>

  <!-- Right: Recommendation -->
  <rect x="285" y="20" width="340" height="130" rx="10" fill="#0c8383" opacity="0.1" class="rec"/>
  <text x="455" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#3bc4a1" class="rec">Recommendation for You</text>

  <g class="rec">
    <rect x="300" y="52" width="145" height="45" rx="6" fill="#0c8383" opacity="0.25"/>
    <text x="372" y="72" text-anchor="middle" font-size="16">🎮</text>
    <text x="372" y="90" text-anchor="middle" font-size="9" font-weight="600" fill="white">Predicted: ★5</text>
  </g>
  <g class="rec">
    <rect x="460" y="52" width="145" height="45" rx="6" fill="#0b1225" opacity="0.4"/>
    <text x="532" y="72" text-anchor="middle" font-size="16">📱</text>
    <text x="532" y="90" text-anchor="middle" font-size="9" fill="#888">Not recommended</text>
  </g>

  <text x="455" y="120" text-anchor="middle" font-size="8" fill="#555" class="rec">Alice ★5 · Carol ★4 → You'll love it</text>
  <text x="455" y="140" text-anchor="middle" font-size="7" fill="#444" class="rec">Similar users → Their preferences → Your prediction</text>

  <!-- Bottom bar -->
  <text x="320" y="170" text-anchor="middle" font-size="8" fill="#444">How Collaborative Filtering Works — powering Netflix, Spotify, Amazon</text>
</svg>