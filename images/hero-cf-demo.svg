<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="system-ui,sans-serif">
  <style>
    /* Infinite loop: 12s total = 6s animation + 6s pause */
    @keyframes fadeLoop { 0%,4% { opacity: 0; } 8%,46% { opacity: 1; } 50%,100% { opacity: 1; } }
    @keyframes ratingAppear { 0%,100% { opacity: 0; } 5%,45% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes matchGlow { 0%,20%,100% { opacity: 0; } 25%,45% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes predictPulse { 0%,30%,100% { opacity: 0; } 35%,45% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes recAppear { 0%,38%,100% { opacity: 0; } 42%,48% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes arrowDraw { 0%,32%,100% { stroke-dashoffset: 60; opacity: 0; } 36%,46% { stroke-dashoffset: 0; opacity: 1; } 50% { stroke-dashoffset: 60; opacity: 0; } }

    .phase1 { opacity: 0; animation: ratingAppear 12s ease-in-out infinite; }
    .p1a { animation-delay: 0s; } .p1b { animation-delay: 0.3s; } .p1c { animation-delay: 0.6s; }
    .p1d { animation-delay: 0.9s; } .p1e { animation-delay: 1.2s; }

    .match { opacity: 0; animation: matchGlow 12s ease-in-out infinite; }
    .m1 { animation-delay: 0s; }

    .predict { opacity: 0; animation: predictPulse 12s ease-in-out infinite; }

    .rec { opacity: 0; animation: recAppear 12s ease-in-out infinite; }

    .flow-arrow { stroke-dasharray: 60; stroke-dashoffset: 60; opacity: 0; animation: arrowDraw 12s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="480" height="360" fill="#0b1225" rx="16"/>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#3bc4a1">How Collaborative Filtering Works</text>

  <!-- Rating Matrix -->
  <text x="30" y="55" font-size="9" fill="#666">Rating Matrix</text>

  <!-- Column headers (items) -->
  <text x="135" y="68" text-anchor="middle" font-size="8" fill="#0c8383">🎬</text>
  <text x="175" y="68" text-anchor="middle" font-size="8" fill="#0c8383">📚</text>
  <text x="215" y="68" text-anchor="middle" font-size="8" fill="#0c8383">🎵</text>
  <text x="255" y="68" text-anchor="middle" font-size="8" fill="#0c8383">🎮</text>
  <text x="295" y="68" text-anchor="middle" font-size="8" fill="#0c8383">📱</text>

  <!-- User A (You) -->
  <rect x="20" y="76" width="290" height="28" rx="4" fill="#0c8383" opacity="0.15"/>
  <text x="70" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#0c8383">You</text>
  <text x="135" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#3bc4a1" class="phase1 p1a">★5</text>
  <text x="175" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#3bc4a1" class="phase1 p1b">★4</text>
  <text x="215" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#666" class="phase1 p1c">★2</text>
  <text x="255" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b" class="phase1 p1d">?</text>
  <text x="295" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b" class="phase1 p1e">?</text>

  <!-- User B (Taste Twin) -->
  <rect x="20" y="108" width="290" height="28" rx="4" fill="#3bc4a1" opacity="0.08"/>
  <text x="70" y="126" text-anchor="middle" font-size="10" fill="#888">Alice</text>
  <text x="135" y="127" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1a">★5</text>
  <text x="175" y="127" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1b">★4</text>
  <text x="215" y="127" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1c">★3</text>
  <text x="255" y="127" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1d">★5</text>
  <text x="295" y="127" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1e">★2</text>

  <!-- User C -->
  <rect x="20" y="140" width="290" height="28" rx="4" fill="transparent"/>
  <text x="70" y="158" text-anchor="middle" font-size="10" fill="#555">Bob</text>
  <text x="135" y="159" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1a">★2</text>
  <text x="175" y="159" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1b">★1</text>
  <text x="215" y="159" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1c">★5</text>
  <text x="255" y="159" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1d">★3</text>
  <text x="295" y="159" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1e">★5</text>

  <!-- User D -->
  <rect x="20" y="172" width="290" height="28" rx="4" fill="#3bc4a1" opacity="0.05"/>
  <text x="70" y="190" text-anchor="middle" font-size="10" fill="#888">Carol</text>
  <text x="135" y="191" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1a">★4</text>
  <text x="175" y="191" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1b">★5</text>
  <text x="215" y="191" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1c">★1</text>
  <text x="255" y="191" text-anchor="middle" font-size="13" fill="#3bc4a1" class="phase1 p1d">★4</text>
  <text x="295" y="191" text-anchor="middle" font-size="13" fill="#666" class="phase1 p1e">★3</text>

  <!-- Phase 2: Taste match highlight -->
  <rect x="18" y="74" width="294" height="32" rx="5" fill="none" stroke="#3bc4a1" stroke-width="2" class="match m1"/>
  <rect x="18" y="106" width="294" height="32" rx="5" fill="none" stroke="#3bc4a1" stroke-width="2" class="match m1"/>
  <text x="340" y="100" font-size="10" font-weight="700" fill="#3bc4a1" class="match m1">Taste Twin!</text>
  <text x="340" y="114" font-size="8" fill="#888" class="match m1">Similar ratings</text>

  <!-- Phase 3: Arrow + prediction -->
  <line x1="310" y1="126" x2="370" y2="240" stroke="#f59e0b" stroke-width="2" class="flow-arrow" stroke-linecap="round"/>

  <!-- Phase 4: Recommendation result -->
  <rect x="30" y="225" width="420" height="110" rx="12" fill="#0c8383" opacity="0.12" class="rec"/>
  <text x="240" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#3bc4a1" class="rec">Recommendation for You</text>

  <g class="rec">
    <rect x="50" y="260" width="160" height="55" rx="8" fill="#0c8383" opacity="0.3"/>
    <text x="130" y="282" text-anchor="middle" font-size="20">🎮</text>
    <text x="130" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="white">Predicted: ★5</text>
    <text x="130" y="312" text-anchor="middle" font-size="8" fill="#3bc4a1">Alice ★5 · Carol ★4</text>
  </g>

  <g class="rec">
    <rect x="230" y="260" width="160" height="55" rx="8" fill="#0b1225" opacity="0.5"/>
    <text x="310" y="282" text-anchor="middle" font-size="20">📱</text>
    <text x="310" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="white">Predicted: ★3</text>
    <text x="310" y="312" text-anchor="middle" font-size="8" fill="#888">Alice ★2 · Carol ★3</text>
  </g>

  <!-- Bottom label -->
  <text x="240" y="350" text-anchor="middle" font-size="9" fill="#555">Find similar users → See what they liked → Predict your rating</text>
</svg>