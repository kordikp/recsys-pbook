<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" viewBox="0 0 680 280">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#7C3AED">Your Digital Footprints</text>

  <!-- Ground/path -->
  <rect x="20" y="195" width="640" height="8" rx="4" fill="#E5E7EB"/>

  <!-- Footprint 1: Clicked -->
  <g transform="translate(50, 100)">
    <!-- Shoe print shape -->
    <ellipse cx="25" cy="60" rx="16" ry="28" fill="#3B82F6" transform="rotate(-10,25,60)"/>
    <ellipse cx="25" cy="25" rx="10" ry="14" fill="#3B82F6" transform="rotate(-10,25,25)"/>
    <text x="25" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#3B82F6">Clicked</text>
    <text x="25" y="124" text-anchor="middle" font-size="14">&#128070;</text>
  </g>

  <!-- Footprint 2: Watched 100% -->
  <g transform="translate(160, 80)">
    <ellipse cx="25" cy="60" rx="16" ry="28" fill="#10B981" transform="rotate(8,25,60)"/>
    <ellipse cx="25" cy="25" rx="10" ry="14" fill="#10B981" transform="rotate(8,25,25)"/>
    <text x="25" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#10B981">Watched</text>
    <text x="25" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#10B981">100%</text>
    <text x="25" y="136" text-anchor="middle" font-size="14">&#128064;</text>
  </g>

  <!-- Footprint 3: Skipped -->
  <g transform="translate(270, 100)">
    <ellipse cx="25" cy="60" rx="16" ry="28" fill="#EF4444" transform="rotate(-10,25,60)"/>
    <ellipse cx="25" cy="25" rx="10" ry="14" fill="#EF4444" transform="rotate(-10,25,25)"/>
    <text x="25" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF4444">Skipped</text>
    <text x="25" y="124" text-anchor="middle" font-size="14">&#9197;</text>
  </g>

  <!-- Footprint 4: Searched -->
  <g transform="translate(380, 80)">
    <ellipse cx="25" cy="60" rx="16" ry="28" fill="#F59E0B" transform="rotate(8,25,60)"/>
    <ellipse cx="25" cy="25" rx="10" ry="14" fill="#F59E0B" transform="rotate(8,25,25)"/>
    <text x="25" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#F59E0B">Searched</text>
    <text x="25" y="124" text-anchor="middle" font-size="14">&#128270;</text>
  </g>

  <!-- Footprint 5: Liked -->
  <g transform="translate(480, 100)">
    <ellipse cx="25" cy="60" rx="16" ry="28" fill="#EC4899" transform="rotate(-10,25,60)"/>
    <ellipse cx="25" cy="25" rx="10" ry="14" fill="#EC4899" transform="rotate(-10,25,25)"/>
    <text x="25" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#EC4899">Liked</text>
    <text x="25" y="124" text-anchor="middle" font-size="14">&#10084;&#65039;</text>
  </g>

  <!-- Smiling robot at the end -->
  <g transform="translate(570, 58)">
    <!-- Robot body -->
    <rect x="0" y="30" width="60" height="60" rx="10" fill="#7C3AED"/>
    <!-- Robot head -->
    <rect x="8" y="5" width="44" height="35" rx="8" fill="#7C3AED"/>
    <!-- Antenna -->
    <line x1="30" y1="5" x2="30" y2="-8" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="30" cy="-12" r="5" fill="#FBBF24"/>
    <!-- Eyes -->
    <circle cx="20" cy="20" r="5" fill="white"/>
    <circle cx="40" cy="20" r="5" fill="white"/>
    <circle cx="20" cy="20" r="2.5" fill="#1F2937"/>
    <circle cx="40" cy="20" r="2.5" fill="#1F2937"/>
    <!-- Smile -->
    <path d="M18 30 Q30 38 42 30" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Speech bubble -->
    <rect x="-30" y="100" width="120" height="32" rx="8" fill="#10B981"/>
    <polygon points="28,100 35,92 42,100" fill="#10B981"/>
    <text x="30" y="114" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Now I know</text>
    <text x="30" y="126" text-anchor="middle" font-size="8" fill="white" font-weight="bold">your taste!</text>
  </g>

  <!-- Dotted path connecting footprints -->
  <path d="M85 180 Q120 170 185 170 Q220 170 295 180 Q340 185 405 170 Q440 165 505 180 Q545 185 575 175" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Decorative dots -->
  <circle cx="30" cy="250" r="4" fill="#3B82F6" opacity="0.4"/>
  <circle cx="50" cy="260" r="3" fill="#10B981" opacity="0.4"/>
  <circle cx="640" cy="250" r="4" fill="#EC4899" opacity="0.4"/>
</svg>