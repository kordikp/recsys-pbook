<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1C1917">Matrix Factorization: A Visual Metaphor</text>

  <!-- Panel 1: The Puzzle -->
  <g transform="translate(15, 40)">
    <rect x="0" y="0" width="210" height="195" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#7C3AED"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">1</text>

    <!-- Puzzle grid (6x6 with many missing pieces) -->
    <g transform="translate(30, 25)">
      <!-- Grid -->
      <g stroke="#E7E5E4" stroke-width="0.8">
        <rect x="0" y="0" width="150" height="100" fill="#F5F5F4" rx="4"/>
        <!-- Horizontal -->
        <line x1="0" y1="20" x2="150" y2="20"/>
        <line x1="0" y1="40" x2="150" y2="40"/>
        <line x1="0" y1="60" x2="150" y2="60"/>
        <line x1="0" y1="80" x2="150" y2="80"/>
        <!-- Vertical -->
        <line x1="30" y1="0" x2="30" y2="100"/>
        <line x1="60" y1="0" x2="60" y2="100"/>
        <line x1="90" y1="0" x2="90" y2="100"/>
        <line x1="120" y1="0" x2="120" y2="100"/>
      </g>

      <!-- Filled cells (puzzle pieces present) -->
      <rect x="1" y="1" width="28" height="18" rx="2" fill="#2563EB" opacity="0.2"/>
      <text x="15" y="14" text-anchor="middle" font-size="9" fill="#2563EB">5</text>

      <rect x="91" y="1" width="28" height="18" rx="2" fill="#059669" opacity="0.2"/>
      <text x="105" y="14" text-anchor="middle" font-size="9" fill="#059669">3</text>

      <rect x="31" y="21" width="28" height="18" rx="2" fill="#D97706" opacity="0.2"/>
      <text x="45" y="34" text-anchor="middle" font-size="9" fill="#D97706">4</text>

      <rect x="121" y="21" width="28" height="18" rx="2" fill="#2563EB" opacity="0.2"/>
      <text x="135" y="34" text-anchor="middle" font-size="9" fill="#2563EB">2</text>

      <rect x="61" y="41" width="28" height="18" rx="2" fill="#059669" opacity="0.2"/>
      <text x="75" y="54" text-anchor="middle" font-size="9" fill="#059669">5</text>

      <rect x="1" y="61" width="28" height="18" rx="2" fill="#D97706" opacity="0.2"/>
      <text x="15" y="74" text-anchor="middle" font-size="9" fill="#D97706">4</text>

      <rect x="91" y="81" width="28" height="18" rx="2" fill="#2563EB" opacity="0.2"/>
      <text x="105" y="94" text-anchor="middle" font-size="9" fill="#2563EB">3</text>

      <!-- Missing pieces (question marks) -->
      <g font-size="9" fill="#E7E5E4">
        <text x="45" y="14" text-anchor="middle">?</text>
        <text x="75" y="14" text-anchor="middle">?</text>
        <text x="135" y="14" text-anchor="middle">?</text>
        <text x="15" y="34" text-anchor="middle">?</text>
        <text x="75" y="34" text-anchor="middle">?</text>
        <text x="105" y="34" text-anchor="middle">?</text>
        <text x="15" y="54" text-anchor="middle">?</text>
        <text x="45" y="54" text-anchor="middle">?</text>
        <text x="105" y="54" text-anchor="middle">?</text>
        <text x="135" y="54" text-anchor="middle">?</text>
        <text x="45" y="74" text-anchor="middle">?</text>
        <text x="75" y="74" text-anchor="middle">?</text>
        <text x="105" y="74" text-anchor="middle">?</text>
        <text x="135" y="74" text-anchor="middle">?</text>
        <text x="15" y="94" text-anchor="middle">?</text>
        <text x="45" y="94" text-anchor="middle">?</text>
        <text x="75" y="94" text-anchor="middle">?</text>
        <text x="135" y="94" text-anchor="middle">?</text>
      </g>
    </g>

    <!-- Caption -->
    <text x="105" y="145" text-anchor="middle" font-size="11" fill="#1C1917" font-weight="bold">The giant puzzle</text>
    <text x="105" y="160" text-anchor="middle" font-size="10" fill="#78716C">We have a rating matrix</text>
    <text x="105" y="174" text-anchor="middle" font-size="10" fill="#78716C">with most pieces missing.</text>
  </g>

  <!-- Panel 2: Fingerprints -->
  <g transform="translate(235, 40)">
    <rect x="0" y="0" width="210" height="195" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#7C3AED"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>

    <!-- Compression arrow -->
    <text x="105" y="32" text-anchor="middle" font-size="10" fill="#7C3AED" font-weight="bold">Compress into "taste fingerprints"</text>

    <!-- User cards -->
    <g transform="translate(15, 42)">
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB" stroke-width="1"/>
      <circle cx="18" cy="14" r="5" fill="#2563EB" opacity="0.4"/>
      <text x="18" y="30" text-anchor="middle" font-size="7" fill="#2563EB">User 1</text>
      <text x="55" y="14" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="bold">[0.8, 0.2, 0.5]</text>
      <text x="55" y="34" text-anchor="middle" font-size="7" fill="#78716C">taste profile</text>
    </g>

    <g transform="translate(15, 88)">
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB" stroke-width="1"/>
      <circle cx="18" cy="14" r="5" fill="#2563EB" opacity="0.4"/>
      <text x="18" y="30" text-anchor="middle" font-size="7" fill="#2563EB">User 2</text>
      <text x="55" y="14" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="bold">[0.1, 0.9, 0.3]</text>
      <text x="55" y="34" text-anchor="middle" font-size="7" fill="#78716C">taste profile</text>
    </g>

    <!-- Item cards -->
    <g transform="translate(110, 42)">
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#059669" fill-opacity="0.08" stroke="#059669" stroke-width="1"/>
      <rect x="12" y="7" width="12" height="16" rx="2" fill="#059669" opacity="0.3"/>
      <text x="18" y="30" text-anchor="middle" font-size="7" fill="#059669">Item A</text>
      <text x="55" y="14" text-anchor="middle" font-size="8" fill="#059669" font-weight="bold">[0.9, 0.1, 0.7]</text>
      <text x="55" y="34" text-anchor="middle" font-size="7" fill="#78716C">item profile</text>
    </g>

    <g transform="translate(110, 88)">
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#059669" fill-opacity="0.08" stroke="#059669" stroke-width="1"/>
      <rect x="12" y="7" width="12" height="16" rx="2" fill="#059669" opacity="0.3"/>
      <text x="18" y="30" text-anchor="middle" font-size="7" fill="#059669">Item B</text>
      <text x="55" y="14" text-anchor="middle" font-size="8" fill="#059669" font-weight="bold">[0.3, 0.8, 0.4]</text>
      <text x="55" y="34" text-anchor="middle" font-size="7" fill="#78716C">item profile</text>
    </g>

    <!-- Caption -->
    <text x="105" y="150" text-anchor="middle" font-size="11" fill="#1C1917" font-weight="bold">Taste fingerprints</text>
    <text x="105" y="165" text-anchor="middle" font-size="10" fill="#78716C">MF gives every user and</text>
    <text x="105" y="179" text-anchor="middle" font-size="10" fill="#78716C">item a compact number card.</text>
  </g>

  <!-- Panel 3: Match -->
  <g transform="translate(455, 40)">
    <rect x="0" y="0" width="210" height="195" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#7C3AED"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">3</text>

    <!-- User card -->
    <rect x="20" y="30" width="70" height="30" rx="6" fill="#2563EB" fill-opacity="0.12" stroke="#2563EB" stroke-width="1.5"/>
    <text x="55" y="48" text-anchor="middle" font-size="8" fill="#2563EB" font-weight="bold">[0.8, 0.2, 0.5]</text>

    <!-- Item card -->
    <rect x="120" y="30" width="70" height="30" rx="6" fill="#059669" fill-opacity="0.12" stroke="#059669" stroke-width="1.5"/>
    <text x="155" y="48" text-anchor="middle" font-size="8" fill="#059669" font-weight="bold">[0.9, 0.1, 0.7]</text>

    <!-- Dot product arrow -->
    <text x="105" y="50" text-anchor="middle" font-size="14" fill="#D97706" font-weight="bold">&middot;</text>

    <!-- Arrow down to result -->
    <line x1="105" y1="62" x2="105" y2="80" stroke="#D97706" stroke-width="1.5"/>
    <polygon points="105,82 100,76 110,76" fill="#D97706"/>

    <!-- Result -->
    <rect x="55" y="85" width="100" height="30" rx="8" fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-width="1.5"/>
    <text x="105" y="104" text-anchor="middle" font-size="12" fill="#D97706" font-weight="bold">Score: 4.09</text>

    <!-- Puzzle piece filling in -->
    <rect x="75" y="118" width="60" height="15" rx="4" fill="#7C3AED" fill-opacity="0.15" stroke="#7C3AED" stroke-width="1"/>
    <text x="105" y="129" text-anchor="middle" font-size="8" fill="#7C3AED">Puzzle piece filled!</text>

    <!-- Caption -->
    <text x="105" y="150" text-anchor="middle" font-size="11" fill="#1C1917" font-weight="bold">Predict the missing rating</text>
    <text x="105" y="165" text-anchor="middle" font-size="10" fill="#78716C">Match the fingerprints</text>
    <text x="105" y="179" text-anchor="middle" font-size="10" fill="#78716C">(dot product) to fill gaps.</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(40, 255)">
    <rect x="0" y="0" width="600" height="130" rx="10" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1"/>

    <text x="300" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C3AED">Why Matrix Factorization Works</text>

    <!-- Visual: Big sparse → small dense × small dense = big complete -->
    <g transform="translate(30, 40)">
      <!-- Sparse matrix -->
      <rect x="0" y="0" width="70" height="50" rx="4" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1.5"/>
      <text x="35" y="18" text-anchor="middle" font-size="8" fill="#78716C">Huge sparse</text>
      <text x="35" y="30" text-anchor="middle" font-size="8" fill="#78716C">matrix</text>
      <text x="35" y="44" text-anchor="middle" font-size="9" fill="#DC2626">90% missing</text>

      <!-- Arrow -->
      <text x="90" y="30" text-anchor="middle" font-size="16" fill="#1C1917">&rarr;</text>

      <!-- User matrix -->
      <rect x="108" y="0" width="40" height="50" rx="4" fill="#2563EB" fill-opacity="0.15" stroke="#2563EB" stroke-width="1"/>
      <text x="128" y="22" text-anchor="middle" font-size="8" fill="#2563EB">User</text>
      <text x="128" y="34" text-anchor="middle" font-size="8" fill="#2563EB">vectors</text>

      <!-- Times -->
      <text x="162" y="30" text-anchor="middle" font-size="14" fill="#1C1917">&times;</text>

      <!-- Item matrix -->
      <rect x="178" y="8" width="65" height="32" rx="4" fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-width="1"/>
      <text x="210" y="28" text-anchor="middle" font-size="8" fill="#059669">Item vectors</text>

      <!-- Arrow -->
      <text x="260" y="30" text-anchor="middle" font-size="16" fill="#1C1917">&rarr;</text>

      <!-- Complete matrix -->
      <rect x="280" y="0" width="70" height="50" rx="4" fill="#D97706" fill-opacity="0.1" stroke="#D97706" stroke-width="1.5"/>
      <text x="315" y="18" text-anchor="middle" font-size="8" fill="#D97706">Complete</text>
      <text x="315" y="30" text-anchor="middle" font-size="8" fill="#D97706">predictions</text>
      <text x="315" y="44" text-anchor="middle" font-size="9" fill="#059669">0% missing</text>
    </g>

    <!-- Key numbers -->
    <g transform="translate(410, 40)">
      <text x="0" y="12" font-size="10" fill="#1C1917" font-weight="bold">The magic:</text>
      <text x="0" y="28" font-size="9" fill="#78716C">1M users x 100K items = 100B cells</text>
      <text x="0" y="42" font-size="9" fill="#78716C">But only ~50 dimensions per vector</text>
    </g>

    <text x="300" y="115" text-anchor="middle" font-size="10" fill="#78716C" font-style="italic">The key insight: users and items live in a low-dimensional space of hidden preferences</text>
  </g>
</svg>