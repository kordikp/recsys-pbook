<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1C1917">Matrix Factorization: Finding Hidden Dimensions</text>
  <text x="340" y="50" text-anchor="middle" font-size="12" fill="#78716C">Decompose a sparse rating matrix into compact user and item representations</text>

  <!-- Matrix R (users x items) -->
  <g transform="translate(30, 75)">
    <rect x="0" y="0" width="130" height="170" rx="8" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="65" y="-8" text-anchor="middle" font-size="13" font-weight="bold" fill="#1C1917">R</text>
    <text x="65" y="190" text-anchor="middle" font-size="10" fill="#78716C">users x items</text>

    <!-- Grid cells with some values, some empty -->
    <g font-size="10" fill="#78716C" text-anchor="middle">
      <!-- Row 1 -->
      <text x="22" y="28" fill="#1C1917">5</text>
      <text x="48" y="28" fill="#E7E5E4">?</text>
      <text x="74" y="28" fill="#1C1917">3</text>
      <text x="100" y="28" fill="#E7E5E4">?</text>
      <!-- Row 2 -->
      <text x="22" y="53" fill="#E7E5E4">?</text>
      <text x="48" y="53" fill="#1C1917">4</text>
      <text x="74" y="53" fill="#E7E5E4">?</text>
      <text x="100" y="53" fill="#1C1917">2</text>
      <!-- Row 3 -->
      <text x="22" y="78" fill="#1C1917">4</text>
      <text x="48" y="78" fill="#E7E5E4">?</text>
      <text x="74" y="78" fill="#1C1917">5</text>
      <text x="100" y="78" fill="#E7E5E4">?</text>
      <!-- Row 4 -->
      <text x="22" y="103" fill="#E7E5E4">?</text>
      <text x="48" y="103" fill="#1C1917">3</text>
      <text x="74" y="103" fill="#E7E5E4">?</text>
      <text x="100" y="103" fill="#1C1917">5</text>
      <!-- Row 5 -->
      <text x="22" y="128" fill="#1C1917">3</text>
      <text x="48" y="128" fill="#E7E5E4">?</text>
      <text x="74" y="128" fill="#E7E5E4">?</text>
      <text x="100" y="128" fill="#1C1917">4</text>
      <!-- Row 6 -->
      <text x="22" y="153" fill="#E7E5E4">?</text>
      <text x="48" y="153" fill="#1C1917">2</text>
      <text x="74" y="153" fill="#1C1917">4</text>
      <text x="100" y="153" fill="#E7E5E4">?</text>
    </g>

    <!-- Grid lines -->
    <g stroke="#E7E5E4" stroke-width="0.5">
      <line x1="0" y1="34" x2="130" y2="34"/>
      <line x1="0" y1="59" x2="130" y2="59"/>
      <line x1="0" y1="84" x2="130" y2="84"/>
      <line x1="0" y1="109" x2="130" y2="109"/>
      <line x1="0" y1="134" x2="130" y2="134"/>
      <line x1="35" y1="0" x2="35" y2="170"/>
      <line x1="61" y1="0" x2="61" y2="170"/>
      <line x1="87" y1="0" x2="87" y2="170"/>
    </g>
  </g>

  <!-- Approximately equal sign -->
  <g transform="translate(175, 155)">
    <text x="0" y="5" font-size="28" fill="#1C1917" font-weight="bold">&asymp;</text>
  </g>

  <!-- Matrix U (users x k) - Blue -->
  <g transform="translate(210, 75)">
    <rect x="0" y="0" width="70" height="170" rx="8" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB" stroke-width="1.5"/>
    <text x="35" y="-8" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563EB">U</text>
    <text x="35" y="190" text-anchor="middle" font-size="10" fill="#2563EB">users x k</text>

    <!-- User vectors -->
    <g font-size="9" fill="#2563EB" text-anchor="middle">
      <text x="20" y="28">0.8</text><text x="52" y="28">0.2</text>
      <text x="20" y="53">0.1</text><text x="52" y="53">0.9</text>
      <text x="20" y="78">0.7</text><text x="52" y="78">0.3</text>
      <text x="20" y="103">0.2</text><text x="52" y="103">0.8</text>
      <text x="20" y="128">0.5</text><text x="52" y="128">0.6</text>
      <text x="20" y="153">0.3</text><text x="52" y="153">0.7</text>
    </g>

    <!-- Highlight row 3 -->
    <rect x="2" y="63" width="66" height="22" fill="#2563EB" fill-opacity="0.12" rx="3"/>

    <!-- Grid lines -->
    <g stroke="#2563EB" stroke-width="0.3" opacity="0.4">
      <line x1="0" y1="34" x2="70" y2="34"/>
      <line x1="0" y1="59" x2="70" y2="59"/>
      <line x1="0" y1="84" x2="70" y2="84"/>
      <line x1="0" y1="109" x2="70" y2="109"/>
      <line x1="0" y1="134" x2="70" y2="134"/>
      <line x1="36" y1="0" x2="36" y2="170"/>
    </g>
  </g>

  <!-- Multiplication sign -->
  <g transform="translate(292, 155)">
    <text x="0" y="5" font-size="22" fill="#1C1917" font-weight="bold">&times;</text>
  </g>

  <!-- Matrix V^T (k x items) - Green -->
  <g transform="translate(320, 115)">
    <rect x="0" y="0" width="130" height="55" rx="8" fill="#059669" fill-opacity="0.08" stroke="#059669" stroke-width="1.5"/>
    <text x="65" y="-8" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">V<tspan baseline-shift="super" font-size="9">T</tspan></text>
    <text x="65" y="75" text-anchor="middle" font-size="10" fill="#059669">k x items</text>

    <!-- Item vectors -->
    <g font-size="9" fill="#059669" text-anchor="middle">
      <text x="20" y="22">0.9</text><text x="52" y="22">0.3</text><text x="84" y="22">0.7</text><text x="116" y="22">0.1</text>
      <text x="20" y="45">0.1</text><text x="52" y="45">0.8</text><text x="84" y="45">0.2</text><text x="116" y="45">0.9</text>
    </g>

    <!-- Highlight column 3 -->
    <rect x="68" y="2" width="30" height="51" fill="#059669" fill-opacity="0.12" rx="3"/>

    <!-- Grid lines -->
    <g stroke="#059669" stroke-width="0.3" opacity="0.4">
      <line x1="0" y1="30" x2="130" y2="30"/>
      <line x1="36" y1="0" x2="36" y2="55"/>
      <line x1="68" y1="0" x2="68" y2="55"/>
      <line x1="100" y1="0" x2="100" y2="55"/>
    </g>
  </g>

  <!-- k label with bracket -->
  <text x="245" y="275" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="bold">k = latent dimensions</text>
  <line x1="212" y1="250" x2="278" y2="250" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Dot product example -->
  <g transform="translate(50, 305)">
    <rect x="0" y="0" width="580" height="75" rx="8" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1"/>

    <text x="290" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#1C1917">Dot Product: Predicting User 3's rating for Item C</text>

    <!-- User vector -->
    <rect x="30" y="32" width="100" height="28" rx="6" fill="#2563EB" fill-opacity="0.1" stroke="#2563EB" stroke-width="1"/>
    <text x="80" y="50" text-anchor="middle" font-size="11" fill="#2563EB" font-weight="bold">[0.7, 0.3]</text>
    <text x="80" y="72" text-anchor="middle" font-size="9" fill="#2563EB">User 3 vector</text>

    <!-- Dot -->
    <text x="150" y="51" text-anchor="middle" font-size="16" fill="#1C1917" font-weight="bold">&middot;</text>

    <!-- Item vector -->
    <rect x="170" y="32" width="100" height="28" rx="6" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1"/>
    <text x="220" y="50" text-anchor="middle" font-size="11" fill="#059669" font-weight="bold">[0.7, 0.2]</text>
    <text x="220" y="72" text-anchor="middle" font-size="9" fill="#059669">Item C vector</text>

    <!-- Equals -->
    <text x="290" y="51" text-anchor="middle" font-size="16" fill="#1C1917" font-weight="bold">=</text>

    <!-- Computation -->
    <text x="365" y="50" text-anchor="middle" font-size="11" fill="#78716C">0.7&times;0.7 + 0.3&times;0.2</text>

    <!-- Equals -->
    <text x="445" y="51" text-anchor="middle" font-size="16" fill="#1C1917" font-weight="bold">=</text>

    <!-- Result -->
    <rect x="465" y="32" width="80" height="28" rx="6" fill="#D97706" fill-opacity="0.15" stroke="#D97706" stroke-width="1.5"/>
    <text x="505" y="51" text-anchor="middle" font-size="14" fill="#D97706" font-weight="bold">0.55</text>
    <text x="505" y="72" text-anchor="middle" font-size="9" fill="#D97706">predicted score</text>
  </g>
</svg>