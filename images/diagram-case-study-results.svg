<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" font-family="system-ui, sans-serif">
  <rect width="600" height="300" rx="8" fill="#f5f5f4"/>

  <text x="300" y="22" text-anchor="middle" fill="#0b1225" font-size="12" font-weight="700">Measured Impact of Personalized Recommendations</text>

  <!-- Axes -->
  <line x1="90" y1="40" x2="90" y2="240" stroke="#0b1225" stroke-width="0.8"/>
  <line x1="90" y1="240" x2="575" y2="240" stroke="#0b1225" stroke-width="0.8"/>

  <!-- Y axis label -->
  <text x="16" y="140" text-anchor="middle" fill="#0b1225" font-size="9" font-weight="500" transform="rotate(-90, 16, 140)">Improvement (%)</text>

  <!-- Y grid and labels - using log-ish scale for visual clarity -->
  <!-- We'll use linear up to 210%, then compressed for 2000% -->
  <!-- Scale: 0-210% maps to y:240 to y:65, then 2000% gets special treatment -->

  <text x="85" y="243" text-anchor="end" fill="#999" font-size="7">0%</text>
  <line x1="88" y1="240" x2="575" y2="240" stroke="#e5e7eb" stroke-width="0.3"/>

  <text x="85" y="206" text-anchor="end" fill="#999" font-size="7">50%</text>
  <line x1="90" y1="203" x2="575" y2="203" stroke="#e5e7eb" stroke-width="0.3"/>

  <text x="85" y="168" text-anchor="end" fill="#999" font-size="7">100%</text>
  <line x1="90" y1="165" x2="575" y2="165" stroke="#e5e7eb" stroke-width="0.3"/>

  <text x="85" y="130" text-anchor="end" fill="#999" font-size="7">150%</text>
  <line x1="90" y1="127" x2="575" y2="127" stroke="#e5e7eb" stroke-width="0.3"/>

  <text x="85" y="92" text-anchor="end" fill="#999" font-size="7">200%</text>
  <line x1="90" y1="89" x2="575" y2="89" stroke="#e5e7eb" stroke-width="0.3"/>

  <!-- Bar width and spacing -->
  <!-- 6 bars, each ~55px wide with spacing, starting at x=110 -->

  <!-- Bar 1: FTV Prima +34% video views (teal - video) -->
  <rect x="110" y="214" width="55" height="26" rx="3" fill="#0c8383"/>
  <text x="137" y="210" text-anchor="middle" fill="#0c8383" font-size="10" font-weight="700">+34%</text>
  <text x="137" y="255" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="600">FTV Prima</text>
  <text x="137" y="266" text-anchor="middle" fill="#999" font-size="7">video views</text>

  <!-- Bar 2: Audiomack +206% plays (green - music) -->
  <rect x="185" y="84" width="55" height="156" rx="3" fill="#3bc4a1"/>
  <text x="212" y="80" text-anchor="middle" fill="#3bc4a1" font-size="10" font-weight="700">+206%</text>
  <text x="212" y="255" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="600">Audiomack</text>
  <text x="212" y="266" text-anchor="middle" fill="#999" font-size="7">plays</text>

  <!-- Bar 3: Slickdeals +70% CTR (amber - deals) -->
  <rect x="260" y="187" width="55" height="53" rx="3" fill="#f59e0b"/>
  <text x="287" y="183" text-anchor="middle" fill="#c27800" font-size="10" font-weight="700">+70%</text>
  <text x="287" y="255" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="600">Slickdeals</text>
  <text x="287" y="266" text-anchor="middle" fill="#999" font-size="7">CTR</text>

  <!-- Bar 4: 9GAG +37% views (blue - social/news) -->
  <rect x="335" y="212" width="55" height="28" rx="3" fill="#4a90d9"/>
  <text x="362" y="208" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="700">+37%</text>
  <text x="362" y="255" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="600">9GAG</text>
  <text x="362" y="266" text-anchor="middle" fill="#999" font-size="7">views</text>

  <!-- Bar 5: Crexi +40% buy actions (purple - real estate) -->
  <rect x="410" y="210" width="55" height="30" rx="3" fill="#8b5cf6"/>
  <text x="437" y="206" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="700">+40%</text>
  <text x="437" y="255" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="600">Crexi</text>
  <text x="437" y="266" text-anchor="middle" fill="#999" font-size="7">buy actions</text>

  <!-- Bar 6: itison +2000% ROI (red - deals) -->
  <!-- This bar breaks the scale, show with broken bar effect -->
  <rect x="485" y="60" width="55" height="180" rx="3" fill="#ef4444"/>
  <!-- Scale break indicator -->
  <path d="M485,70 L490,73 L495,67 L500,73 L505,67 L510,73 L515,67 L520,73 L525,67 L530,73 L535,67 L540,70"
    fill="none" stroke="#f5f5f4" stroke-width="2"/>
  <rect x="485" y="72" width="55" height="168" rx="0" fill="#ef4444"/>
  <rect x="485" y="232" width="55" height="8" rx="0" ry="0" fill="#ef4444"/>
  <rect x="485" y="236" width="55" height="4" rx="0" ry="3" fill="#ef4444"/>
  <text x="512" y="56" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">+2000%</text>
  <text x="512" y="255" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="600">itison</text>
  <text x="512" y="266" text-anchor="middle" fill="#999" font-size="7">ROI</text>

  <!-- Scale break annotation -->
  <text x="512" y="100" text-anchor="middle" fill="white" font-size="7" font-weight="500">scale</text>
  <text x="512" y="110" text-anchor="middle" fill="white" font-size="7" font-weight="500">break</text>

  <!-- Legend -->
  <rect x="100" y="278" width="400" height="16" rx="3" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <circle cx="115" cy="286" r="4" fill="#0c8383"/>
  <text x="122" y="289" fill="#666" font-size="7">Video</text>
  <circle cx="160" cy="286" r="4" fill="#3bc4a1"/>
  <text x="167" y="289" fill="#666" font-size="7">Music</text>
  <circle cx="205" cy="286" r="4" fill="#f59e0b"/>
  <text x="212" y="289" fill="#666" font-size="7">Deals</text>
  <circle cx="250" cy="286" r="4" fill="#4a90d9"/>
  <text x="257" y="289" fill="#666" font-size="7">Social</text>
  <circle cx="300" cy="286" r="4" fill="#8b5cf6"/>
  <text x="307" y="289" fill="#666" font-size="7">Real estate</text>
  <circle cx="365" cy="286" r="4" fill="#ef4444"/>
  <text x="372" y="289" fill="#666" font-size="7">Deals (ROI)</text>
</svg>