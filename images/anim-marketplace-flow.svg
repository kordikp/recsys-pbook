<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideFromLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideFromRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes engineGlow {
      0%, 100% { filter: drop-shadow(0 0 3px #0c8383); }
      50% { filter: drop-shadow(0 0 12px #0c8383); }
    }
    @keyframes particleLeft {
      0% { opacity: 0; transform: translateX(0); }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; transform: translateX(100px); }
    }
    @keyframes particleRight {
      0% { opacity: 0; transform: translateX(0); }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; transform: translateX(100px); }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.6); }
      70% { transform: scale(1.08); }
      100% { opacity: 1; transform: scale(1); }
    }
    .title { opacity: 0; animation: fadeIn 0.5s ease-out 0.1s forwards; }
    .sellers { opacity: 0; animation: slideFromLeft 0.6s ease-out 0.4s forwards; }
    .engine { opacity: 0; animation: popIn 0.6s ease-out 0.8s forwards; }
    .engine-inner { animation: engineGlow 2s ease-in-out 1.5s infinite; }
    .buyers { opacity: 0; animation: slideFromRight 0.6s ease-out 1.2s forwards; }
    .val-label { opacity: 0; animation: fadeIn 0.4s ease-out 2s forwards; }

    .p-left1 { opacity: 0; animation: particleLeft 1.8s linear 1.5s infinite; }
    .p-left2 { opacity: 0; animation: particleLeft 1.8s linear 2.1s infinite; }
    .p-left3 { opacity: 0; animation: particleLeft 1.8s linear 2.7s infinite; }
    .p-right1 { opacity: 0; animation: particleRight 1.8s linear 1.8s infinite; }
    .p-right2 { opacity: 0; animation: particleRight 1.8s linear 2.4s infinite; }
    .p-right3 { opacity: 0; animation: particleRight 1.8s linear 3.0s infinite; }
  </style>

  <!-- Title -->
  <text class="title" x="275" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b1225">Marketplace Recommendation Flow</text>

  <!-- Sellers side -->
  <g class="sellers">
    <rect x="20" y="80" width="120" height="140" rx="10" fill="#f5f5f4" stroke="#0c8383" stroke-width="2"/>
    <text x="80" y="110" text-anchor="middle" font-size="13" fill="#0c8383" font-weight="700">Sellers</text>
    <!-- Listing icons -->
    <rect x="40" y="122" width="30" height="25" rx="4" fill="#0c8383" opacity="0.3"/>
    <rect x="78" y="122" width="30" height="25" rx="4" fill="#0c8383" opacity="0.5"/>
    <rect x="40" y="155" width="30" height="25" rx="4" fill="#0c8383" opacity="0.4"/>
    <rect x="78" y="155" width="30" height="25" rx="4" fill="#0c8383" opacity="0.6"/>
    <text x="80" y="200" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">Post listings</text>
  </g>

  <!-- Particles flowing left to center -->
  <rect class="p-left1" x="140" y="130" width="12" height="8" rx="2" fill="#0c8383"/>
  <rect class="p-left2" x="140" y="150" width="12" height="8" rx="2" fill="#3bc4a1"/>
  <rect class="p-left3" x="140" y="170" width="12" height="8" rx="2" fill="#0c8383"/>

  <!-- Arrow left -->
  <g class="engine">
    <line x1="145" y1="150" x2="195" y2="150" stroke="#0b1225" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Central engine -->
  <g class="engine">
    <g class="engine-inner">
      <rect x="195" y="85" width="160" height="130" rx="14" fill="#0b1225"/>
      <text x="275" y="118" text-anchor="middle" font-size="12" fill="#f5f5f4" font-weight="700">Recommendation</text>
      <text x="275" y="136" text-anchor="middle" font-size="12" fill="#f5f5f4" font-weight="700">Engine</text>
      <!-- Gear icon -->
      <circle cx="275" cy="170" r="18" fill="none" stroke="#3bc4a1" stroke-width="2"/>
      <circle cx="275" cy="170" r="7" fill="#3bc4a1"/>
      <line x1="275" y1="149" x2="275" y2="155" stroke="#3bc4a1" stroke-width="2.5"/>
      <line x1="275" y1="185" x2="275" y2="191" stroke="#3bc4a1" stroke-width="2.5"/>
      <line x1="254" y1="170" x2="260" y2="170" stroke="#3bc4a1" stroke-width="2.5"/>
      <line x1="290" y1="170" x2="296" y2="170" stroke="#3bc4a1" stroke-width="2.5"/>
    </g>
  </g>

  <!-- Arrow right -->
  <g class="buyers">
    <line x1="355" y1="150" x2="405" y2="150" stroke="#0b1225" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Particles flowing center to right -->
  <rect class="p-right1" x="355" y="130" width="12" height="8" rx="2" fill="#3bc4a1"/>
  <rect class="p-right2" x="355" y="150" width="12" height="8" rx="2" fill="#0c8383"/>
  <rect class="p-right3" x="355" y="170" width="12" height="8" rx="2" fill="#3bc4a1"/>

  <!-- Buyers side -->
  <g class="buyers">
    <rect x="410" y="80" width="120" height="140" rx="10" fill="#f5f5f4" stroke="#3bc4a1" stroke-width="2"/>
    <text x="470" y="110" text-anchor="middle" font-size="13" fill="#3bc4a1" font-weight="700">Buyers</text>
    <!-- Feed icons -->
    <rect x="425" y="122" width="80" height="12" rx="3" fill="#3bc4a1" opacity="0.3"/>
    <rect x="425" y="140" width="80" height="12" rx="3" fill="#3bc4a1" opacity="0.5"/>
    <rect x="425" y="158" width="80" height="12" rx="3" fill="#3bc4a1" opacity="0.4"/>
    <rect x="425" y="176" width="80" height="12" rx="3" fill="#3bc4a1" opacity="0.6"/>
    <text x="470" y="200" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.6">See recommendations</text>
  </g>

  <!-- Value labels -->
  <g class="val-label">
    <text x="80" y="245" text-anchor="middle" font-size="10" fill="#0c8383" font-weight="600">Supply</text>
    <text x="275" y="240" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">Matching</text>
    <text x="470" y="245" text-anchor="middle" font-size="10" fill="#3bc4a1" font-weight="600">Demand</text>
    <text x="275" y="280" text-anchor="middle" font-size="11" fill="#0b1225" opacity="0.5">Three-sided value creation: sellers, platform, buyers</text>
  </g>
</svg>