<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" font-family="system-ui,sans-serif">
  <style>
    .step{opacity:0;animation:fadeIn 18s ease infinite}
    .s1{animation-delay:.2s}.s2{animation-delay:.6s}.s3{animation-delay:1.0s}.s4{animation-delay:1.4s}.s5{animation-delay:1.8s}.s6{animation-delay:2.2s}
    .arrow{opacity:0;animation:fadeIn 18s ease infinite}
    .ar1{animation-delay:.4s}.ar2{animation-delay:.8s}.ar3{animation-delay:1.2s}.ar4{animation-delay:1.6s}.ar5{animation-delay:2.0s}
    @keyframes fadeIn { 0% { opacity: 0; } 8% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    .flash{animation:flash .5s ease-in-out 3;animation-delay:.2s}
    @keyframes flash{0%,100%{fill:#ef4444}50%{fill:#fca5a5}}
  </style>

  <rect width="650" height="200" fill="#f5f5f4" rx="12"/>
  <text x="325" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#0b1225">Incident Response Lifecycle</text>
  <g class="step s1"><rect x="10" y="55" width="85" height="55" rx="8" fill="#ef4444" class="flash"/><text x="52" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="white">DETECT</text><text x="52" y="95" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">Alert fires</text></g>
  <path d="M100 82 L115 82" stroke="#0b1225" stroke-width="1.5" fill="none" marker-end="url(#ah)" class="arrow ar1"/>
  <g class="step s2"><rect x="120" y="55" width="85" height="55" rx="8" fill="#f59e0b"/><text x="162" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="white">CLASSIFY</text><text x="162" y="95" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">Severity level</text></g>
  <path d="M210 82 L225 82" stroke="#0b1225" stroke-width="1.5" fill="none" marker-end="url(#ah)" class="arrow ar2"/>
  <g class="step s3"><rect x="230" y="55" width="85" height="55" rx="8" fill="#3bc4a1"/><text x="272" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="white">FALLBACK</text><text x="272" y="95" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">Activate backup</text></g>
  <path d="M320 82 L335 82" stroke="#0b1225" stroke-width="1.5" fill="none" marker-end="url(#ah)" class="arrow ar3"/>
  <g class="step s4"><rect x="340" y="55" width="85" height="55" rx="8" fill="#0c8383"/><text x="382" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="white">DIAGNOSE</text><text x="382" y="95" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">Root cause</text></g>
  <path d="M430 82 L445 82" stroke="#0b1225" stroke-width="1.5" fill="none" marker-end="url(#ah)" class="arrow ar4"/>
  <g class="step s5"><rect x="450" y="55" width="85" height="55" rx="8" fill="#0c8383"/><text x="492" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="white">FIX</text><text x="492" y="95" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">Deploy fix</text></g>
  <path d="M540 82 L555 82" stroke="#0b1225" stroke-width="1.5" fill="none" marker-end="url(#ah)" class="arrow ar5"/>
  <g class="step s6"><rect x="560" y="55" width="80" height="55" rx="8" fill="#0b1225"/><text x="600" y="78" text-anchor="middle" font-size="9" font-weight="700" fill="white">POST-</text><text x="600" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="white">MORTEM</text></g>
  <g class="step s6"><text x="325" y="150" text-anchor="middle" font-size="11" fill="#666">Fallback tiers: Degrade gracefully → Popular items → Disable recs</text><text x="325" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#0c8383">Goal: contain impact before diagnosing root cause</text></g>
  <defs><marker id="ah" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#0b1225"/></marker></defs>
</svg>
