<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" width="650" height="300" font-family="system-ui, sans-serif">
  <rect width="650" height="300" rx="8" fill="#f5f5f4"/>

  <text x="325" y="24" text-anchor="middle" fill="#0b1225" font-size="13" font-weight="700">Feature Interaction Models</text>

  <!-- === FM (Factorization Machines) === -->
  <rect x="15" y="38" width="195" height="245" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="15" y="38" width="195" height="28" rx="6" fill="#0c8383"/>
  <rect x="15" y="56" width="195" height="10" fill="#0c8383"/>
  <text x="112" y="56" text-anchor="middle" fill="white" font-size="11" font-weight="600">FM</text>

  <!-- Linear terms -->
  <text x="112" y="84" text-anchor="middle" fill="#0b1225" font-size="9" font-weight="500">Linear Terms</text>
  <rect x="40" y="90" width="145" height="20" rx="3" fill="#0c8383" opacity="0.15" stroke="#0c8383" stroke-width="0.5"/>
  <text x="112" y="104" text-anchor="middle" fill="#0c8383" font-size="9">w0 + w1x1 + w2x2 + ...</text>

  <!-- Plus sign -->
  <text x="112" y="125" text-anchor="middle" fill="#0b1225" font-size="14" font-weight="300">+</text>

  <!-- Factorized interaction matrix -->
  <text x="112" y="142" text-anchor="middle" fill="#0b1225" font-size="9" font-weight="500">Factorized Interactions</text>

  <!-- Small grid showing V*V^T -->
  <g transform="translate(50, 148)">
    <!-- V matrix -->
    <rect x="0" y="0" width="30" height="50" rx="2" fill="#0c8383" opacity="0.3" stroke="#0c8383" stroke-width="0.5"/>
    <text x="15" y="28" text-anchor="middle" fill="#0c8383" font-size="10" font-weight="600">V</text>
    <text x="15" y="40" text-anchor="middle" fill="#0c8383" font-size="6">n x k</text>

    <!-- Multiply -->
    <text x="40" y="28" text-anchor="middle" fill="#0b1225" font-size="10">x</text>

    <!-- V^T matrix -->
    <rect x="50" y="8" width="50" height="30" rx="2" fill="#0c8383" opacity="0.3" stroke="#0c8383" stroke-width="0.5"/>
    <text x="75" y="27" text-anchor="middle" fill="#0c8383" font-size="10" font-weight="600">V^T</text>
    <text x="75" y="10" text-anchor="end" fill="#0c8383" font-size="6">k x n</text>
  </g>

  <text x="112" y="218" text-anchor="middle" fill="#666" font-size="7">Each feature i gets a</text>
  <text x="112" y="228" text-anchor="middle" fill="#666" font-size="7">k-dim latent vector vi</text>

  <!-- Complexity -->
  <rect x="55" y="238" width="115" height="22" rx="11" fill="#0c8383" opacity="0.1" stroke="#0c8383" stroke-width="0.5"/>
  <text x="112" y="253" text-anchor="middle" fill="#0c8383" font-size="10" font-weight="600">O(kn)</text>
  <text x="112" y="275" text-anchor="middle" fill="#999" font-size="7">Linear in features</text>

  <!-- === DeepFM === -->
  <rect x="225" y="38" width="195" height="245" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="225" y="38" width="195" height="28" rx="6" fill="#3bc4a1"/>
  <rect x="225" y="56" width="195" height="10" fill="#3bc4a1"/>
  <text x="322" y="56" text-anchor="middle" fill="white" font-size="11" font-weight="600">DeepFM</text>

  <!-- Shared embeddings at bottom -->
  <rect x="250" y="215" width="145" height="22" rx="3" fill="#0b1225" opacity="0.08" stroke="#0b1225" stroke-width="0.5"/>
  <text x="322" y="230" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="500">Shared Embeddings</text>

  <!-- FM path (left) -->
  <rect x="245" y="130" width="65" height="55" rx="3" fill="#0c8383" opacity="0.15" stroke="#0c8383" stroke-width="0.5"/>
  <text x="277" y="152" text-anchor="middle" fill="#0c8383" font-size="9" font-weight="500">FM</text>
  <text x="277" y="165" text-anchor="middle" fill="#0c8383" font-size="7">Component</text>
  <text x="277" y="178" text-anchor="middle" fill="#0c8383" font-size="6">order-2</text>

  <!-- DNN path (right) -->
  <rect x="325" y="130" width="80" height="55" rx="3" fill="#3bc4a1" opacity="0.15" stroke="#3bc4a1" stroke-width="0.5"/>
  <text x="365" y="152" text-anchor="middle" fill="#3bc4a1" font-size="9" font-weight="500">DNN</text>
  <text x="365" y="165" text-anchor="middle" fill="#3bc4a1" font-size="7">Component</text>
  <text x="365" y="178" text-anchor="middle" fill="#3bc4a1" font-size="6">high-order</text>

  <!-- Arrows from embeddings to both -->
  <line x1="290" y1="215" x2="277" y2="188" stroke="#999" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="350" y1="215" x2="365" y2="188" stroke="#999" stroke-width="1" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 5,2 0,4" fill="#999"/>
    </marker>
  </defs>

  <!-- Merge at top -->
  <rect x="275" y="92" width="95" height="22" rx="3" fill="#0b1225" opacity="0.08" stroke="#0b1225" stroke-width="0.5"/>
  <text x="322" y="107" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="500">Sigmoid (concat)</text>

  <!-- Arrows to merge -->
  <line x1="277" y1="128" x2="300" y2="116" stroke="#999" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="365" y1="128" x2="345" y2="116" stroke="#999" stroke-width="1" marker-end="url(#arrowGray)"/>

  <!-- Output -->
  <text x="322" y="84" text-anchor="middle" fill="#0b1225" font-size="8">y-hat</text>
  <line x1="322" y1="87" x2="322" y2="92" stroke="#999" stroke-width="0.5"/>

  <!-- Complexity -->
  <rect x="255" y="238" width="135" height="22" rx="11" fill="#3bc4a1" opacity="0.1" stroke="#3bc4a1" stroke-width="0.5"/>
  <text x="322" y="253" text-anchor="middle" fill="#3bc4a1" font-size="10" font-weight="600">O(kn + DNN)</text>
  <text x="322" y="275" text-anchor="middle" fill="#999" font-size="7">End-to-end, no manual features</text>

  <!-- === DCN (Deep & Cross Network) === -->
  <rect x="435" y="38" width="200" height="245" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="435" y="38" width="200" height="28" rx="6" fill="#f59e0b"/>
  <rect x="435" y="56" width="200" height="10" fill="#f59e0b"/>
  <text x="535" y="56" text-anchor="middle" fill="white" font-size="11" font-weight="600">DCN (Deep &amp; Cross)</text>

  <!-- Cross network layers -->
  <text x="490" y="82" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="500">Cross Network</text>

  <!-- Cross layer 1 -->
  <rect x="455" y="87" width="70" height="18" rx="2" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="490" y="99" text-anchor="middle" fill="#c27800" font-size="7">x_l+1 = x_0 x_l^T w</text>

  <!-- Cross layer 2 -->
  <rect x="455" y="110" width="70" height="18" rx="2" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="490" y="122" text-anchor="middle" fill="#c27800" font-size="7">Cross Layer 2</text>

  <!-- Cross layer 3 -->
  <rect x="455" y="133" width="70" height="18" rx="2" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="490" y="145" text-anchor="middle" fill="#c27800" font-size="7">Cross Layer 3</text>

  <!-- Residual connections -->
  <line x1="450" y1="96" x2="450" y2="142" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="445" y="120" text-anchor="end" fill="#f59e0b" font-size="6">x_0</text>

  <!-- Deep network -->
  <text x="580" y="82" text-anchor="middle" fill="#0b1225" font-size="8" font-weight="500">Deep Network</text>

  <rect x="555" y="87" width="55" height="18" rx="2" fill="#0b1225" opacity="0.08" stroke="#0b1225" stroke-width="0.5"/>
  <text x="582" y="99" text-anchor="middle" fill="#666" font-size="7">Dense + ReLU</text>

  <rect x="555" y="110" width="55" height="18" rx="2" fill="#0b1225" opacity="0.1" stroke="#0b1225" stroke-width="0.5"/>
  <text x="582" y="122" text-anchor="middle" fill="#666" font-size="7">Dense + ReLU</text>

  <rect x="555" y="133" width="55" height="18" rx="2" fill="#0b1225" opacity="0.12" stroke="#0b1225" stroke-width="0.5"/>
  <text x="582" y="145" text-anchor="middle" fill="#666" font-size="7">Dense + ReLU</text>

  <!-- Input -->
  <rect x="465" y="175" width="140" height="20" rx="3" fill="#0b1225" opacity="0.06" stroke="#0b1225" stroke-width="0.5"/>
  <text x="535" y="189" text-anchor="middle" fill="#0b1225" font-size="8">Input: [x_sparse ; x_dense]</text>

  <!-- Arrows -->
  <line x1="490" y1="175" x2="490" y2="154" stroke="#999" stroke-width="0.8" marker-end="url(#arrowGray)"/>
  <line x1="582" y1="175" x2="582" y2="154" stroke="#999" stroke-width="0.8" marker-end="url(#arrowGray)"/>

  <!-- Combine -->
  <rect x="475" y="160" width="120" height="12" rx="2" fill="none"/>
  <text x="535" y="169" text-anchor="middle" fill="#999" font-size="6">concat + logits</text>

  <!-- Key benefit -->
  <text x="535" y="210" text-anchor="middle" fill="#666" font-size="7">Explicit cross-features</text>
  <text x="535" y="221" text-anchor="middle" fill="#666" font-size="7">up to L-th order in L layers</text>

  <!-- Complexity -->
  <rect x="472" y="238" width="125" height="22" rx="11" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="535" y="253" text-anchor="middle" fill="#c27800" font-size="10" font-weight="600">O(kd + DNN)</text>
  <text x="535" y="275" text-anchor="middle" fill="#999" font-size="7">Bounded cross-feature cost</text>
</svg>