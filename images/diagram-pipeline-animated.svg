<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" font-family="system-ui,sans-serif">
  <style>
    .stage { opacity: 0; animation: fadeIn 0.5s ease forwards; }
    .s1 { animation-delay: 0s; }
    .s2 { animation-delay: 0.8s; }
    .s3 { animation-delay: 1.6s; }
    .s4 { animation-delay: 2.4s; }
    .arrow { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .a1 { animation-delay: 0.5s; }
    .a2 { animation-delay: 1.3s; }
    .a3 { animation-delay: 2.1s; }
    .items { animation: shrink 3s ease-in-out infinite; animation-delay: 3s; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes shrink { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .count { animation: countDown 3s ease-in-out infinite; animation-delay: 3s; }
  </style>

  <!-- Background -->
  <rect width="700" height="250" fill="#f5f5f4" rx="12"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0b1225">The Recommendation Pipeline</text>

  <!-- Stage 1: Retrieve -->
  <g class="stage s1">
    <rect x="20" y="60" width="150" height="120" rx="10" fill="#0c8383"/>
    <text x="95" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white">RETRIEVE</text>
    <text x="95" y="112" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Candidate Generation</text>
    <text x="95" y="145" text-anchor="middle" font-size="24" font-weight="700" fill="white" class="count">1M → 1K</text>
    <text x="95" y="165" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">~50ms</text>
  </g>

  <!-- Arrow 1 -->
  <g class="arrow a1">
    <path d="M175 120 L200 120" stroke="#0b1225" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Stage 2: Score -->
  <g class="stage s2">
    <rect x="205" y="60" width="150" height="120" rx="10" fill="#3bc4a1"/>
    <text x="280" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white">SCORE</text>
    <text x="280" y="112" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Precise Ranking</text>
    <text x="280" y="145" text-anchor="middle" font-size="24" font-weight="700" fill="white">1K → 100</text>
    <text x="280" y="165" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">~100ms</text>
  </g>

  <!-- Arrow 2 -->
  <g class="arrow a2">
    <path d="M360 120 L385 120" stroke="#0b1225" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Stage 3: Re-rank -->
  <g class="stage s3">
    <rect x="390" y="60" width="150" height="120" rx="10" fill="#f59e0b"/>
    <text x="465" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white">RE-RANK</text>
    <text x="465" y="112" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">Diversity + Rules</text>
    <text x="465" y="145" text-anchor="middle" font-size="24" font-weight="700" fill="white">100 → 20</text>
    <text x="465" y="165" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">~30ms</text>
  </g>

  <!-- Arrow 3 -->
  <g class="arrow a3">
    <path d="M545 120 L570 120" stroke="#0b1225" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Stage 4: Serve -->
  <g class="stage s4">
    <rect x="575" y="60" width="105" height="120" rx="10" fill="#0b1225"/>
    <text x="627" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="white">SERVE</text>
    <text x="627" y="112" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Final Response</text>
    <text x="627" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#3bc4a1">20 items</text>
    <text x="627" y="165" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">~20ms</text>
  </g>

  <!-- Total latency bar -->
  <g class="stage s4">
    <rect x="20" y="200" width="660" height="30" rx="6" fill="#0b1225" opacity="0.1"/>
    <rect x="20" y="200" width="660" height="30" rx="6" fill="none" stroke="#0c8383" stroke-width="1.5"/>
    <text x="350" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#0b1225">Total: &lt; 200ms for millions of items → 20 personalized results</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#0b1225"/>
    </marker>
  </defs>
</svg>