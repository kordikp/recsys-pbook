<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="system-ui,sans-serif">
  <style>
    .formula{opacity:0;animation:fadeIn .6s ease forwards}
    .f1{animation-delay:.3s}.f2{animation-delay:1.0s}.f3{animation-delay:1.7s}
    @keyframes fadeIn{to{opacity:1}}
  </style>
  <rect width="600" height="280" fill="#f5f5f4" rx="12"/>
  <text x="300" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#0b1225">Key RecSys Formulas</text>
  <g class="formula f1">
    <rect x="20" y="45" width="560" height="65" rx="8" fill="white" stroke="#0c8383" stroke-width="1.5"/>
    <text x="40" y="68" font-size="12" font-weight="700" fill="#0c8383">Cosine Similarity</text>
    <text x="40" y="90" font-size="14" fill="#0b1225" font-style="italic">cos(A,B) = A·B / (||A|| × ||B||)</text>
    <text x="420" y="80" font-size="10" fill="#666">Measures direction, not magnitude</text>
  </g>
  <g class="formula f2">
    <rect x="20" y="125" width="560" height="65" rx="8" fill="white" stroke="#3bc4a1" stroke-width="1.5"/>
    <text x="40" y="148" font-size="12" font-weight="700" fill="#3bc4a1">nDCG@K</text>
    <text x="40" y="172" font-size="14" fill="#0b1225" font-style="italic">DCG = Σ rel_i / log₂(i+1),  nDCG = DCG / IDCG</text>
    <text x="420" y="160" font-size="10" fill="#666">Ranking quality (0-1)</text>
  </g>
  <g class="formula f3">
    <rect x="20" y="205" width="560" height="65" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="40" y="228" font-size="12" font-weight="700" fill="#f59e0b">BPR Loss</text>
    <text x="40" y="252" font-size="14" fill="#0b1225" font-style="italic">L = -Σ ln σ(x̂_ui - x̂_uj) + λ||θ||²</text>
    <text x="420" y="240" font-size="10" fill="#666">Pairwise ranking objective</text>
  </g>
</svg>
