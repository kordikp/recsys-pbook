<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes drawEngagement {
      to { stroke-dashoffset: 0; }
    }
    @keyframes drawSatisfaction {
      to { stroke-dashoffset: 0; }
    }
    @keyframes gapReveal {
      from { opacity: 0; }
      to { opacity: 0.2; }
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.4); }
      70%  { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .title { opacity: 0; animation: fadeIn 0.5s ease-out 0.1s forwards; }
    .axes { opacity: 0; animation: fadeIn 0.4s ease-out 0.3s forwards; }
    .legend { opacity: 0; animation: fadeIn 0.4s ease-out 0.5s forwards; }

    .engagement-line {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawEngagement 2s ease-out 0.8s forwards;
    }
    .satisfaction-line {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawSatisfaction 2s ease-out 1.0s forwards;
    }

    .gap-fill { opacity: 0; animation: gapReveal 0.8s ease-out 2.5s forwards; }
    .gap-label { opacity: 0; animation: popIn 0.5s ease-out 3.0s forwards; }
    .gap-pulse { animation: pulse 2s ease-in-out 3.0s infinite; }
  </style>

  <defs>
    <marker id="ah" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#0b1225" />
    </marker>
    <clipPath id="chartClip">
      <rect x="60" y="40" width="390" height="170" />
    </clipPath>
  </defs>

  <!-- Title -->
  <text class="title" x="250" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b1225">Engagement vs. Satisfaction</text>

  <!-- Axes -->
  <g class="axes">
    <!-- Y axis -->
    <line x1="60" y1="210" x2="60" y2="40" stroke="#0b1225" stroke-width="1.5" marker-end="url(#ah)" />
    <text x="22" y="125" text-anchor="middle" font-size="8" fill="#0b1225" opacity="0.6" transform="rotate(-90,22,125)">Metric value</text>

    <!-- X axis -->
    <line x1="60" y1="210" x2="460" y2="210" stroke="#0b1225" stroke-width="1.5" marker-end="url(#ah)" />
    <text x="260" y="235" text-anchor="middle" font-size="8" fill="#0b1225" opacity="0.6">Time (optimization iterations)</text>

    <!-- Grid lines -->
    <line x1="60" y1="170" x2="450" y2="170" stroke="#0b1225" stroke-width="0.3" opacity="0.2" />
    <line x1="60" y1="130" x2="450" y2="130" stroke="#0b1225" stroke-width="0.3" opacity="0.2" />
    <line x1="60" y1="90" x2="450" y2="90" stroke="#0b1225" stroke-width="0.3" opacity="0.2" />
  </g>

  <!-- Legend -->
  <g class="legend">
    <line x1="310" y1="45" x2="330" y2="45" stroke="#f59e0b" stroke-width="2.5" />
    <text x="335" y="48" font-size="9" fill="#0b1225">Engagement</text>
    <line x1="310" y1="58" x2="330" y2="58" stroke="#0c8383" stroke-width="2.5" />
    <text x="335" y="61" font-size="9" fill="#0b1225">Satisfaction</text>
  </g>

  <!-- Gap fill (area between curves) -->
  <path class="gap-fill" d="M60,195 C120,185 180,160 240,130 C300,100 360,75 440,55 L440,65 C360,90 300,115 240,145 C180,165 120,185 60,195 Z" fill="#ef4444" clip-path="url(#chartClip)" />

  <!-- Engagement line (climbs steadily) -->
  <path class="engagement-line" d="M60,195 C120,185 180,160 240,130 C300,100 360,75 440,55" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" clip-path="url(#chartClip)" />

  <!-- Satisfaction line (follows then diverges downward) -->
  <path class="satisfaction-line" d="M60,195 C120,185 180,165 240,145 C300,140 360,145 440,160" fill="none" stroke="#0c8383" stroke-width="2.5" stroke-linecap="round" clip-path="url(#chartClip)" />

  <!-- Updated gap fill to match actual divergence -->
  <path class="gap-fill" d="M180,160 C220,145 240,130 280,115 C320,100 360,75 440,55 L440,160 C360,145 320,140 280,140 C240,145 220,155 180,160 Z" fill="#ef4444" clip-path="url(#chartClip)" />

  <!-- Gap annotation -->
  <g class="gap-label gap-pulse">
    <line x1="400" y1="62" x2="400" y2="152" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="400" y="112" text-anchor="start" font-size="9" fill="#ef4444" font-weight="700" dx="6">Gap</text>
  </g>

  <!-- Bottom label -->
  <g class="gap-label">
    <rect x="155" y="238" width="190" height="22" rx="6" fill="#0b1225" />
    <text x="250" y="253" text-anchor="middle" font-size="9.5" fill="#ef4444" font-weight="600">The gap that matters</text>
  </g>
</svg>