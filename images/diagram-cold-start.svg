<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrSpoke" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <path d="M0,2.5 L7,0 L7,5" fill="#0c8383"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="12" fill="#f5f5f4"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#0b1225">Cold Start Problem</text>
  <text x="250" y="48" text-anchor="middle" font-size="11" fill="#6b7280">Strategies for recommending with no interaction history</text>

  <!-- Center: Question mark circle -->
  <circle cx="250" cy="255" r="52" fill="#0b1225" fill-opacity="0.08" stroke="#0b1225" stroke-width="2"/>
  <circle cx="250" cy="255" r="40" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="250" y="248" text-anchor="middle" font-size="28" font-weight="bold" fill="#ef4444">?</text>
  <text x="250" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">New User</text>
  <text x="250" y="280" text-anchor="middle" font-size="10" fill="#0b1225">or Item</text>

  <!-- Spoke lines (from center outward) -->
  <!-- 1: Popularity (top) -->
  <line x1="250" y1="203" x2="250" y2="118" stroke="#0c8383" stroke-width="2" marker-end="url(#arrSpoke)"/>
  <!-- 2: Content features (top-right) -->
  <line x1="290" y1="218" x2="385" y2="148" stroke="#0c8383" stroke-width="2" marker-end="url(#arrSpoke)"/>
  <!-- 3: Bandit (right) -->
  <line x1="302" y1="255" x2="400" y2="275" stroke="#0c8383" stroke-width="2" marker-end="url(#arrSpoke)"/>
  <!-- 4: Onboarding (bottom-right) -->
  <line x1="285" y1="295" x2="375" y2="385" stroke="#0c8383" stroke-width="2" marker-end="url(#arrSpoke)"/>
  <!-- 5: Transfer learning (bottom-left) -->
  <line x1="215" y1="295" x2="125" y2="385" stroke="#0c8383" stroke-width="2" marker-end="url(#arrSpoke)"/>
  <!-- 6: (top-left) extra line for visual balance -->
  <line x1="210" y1="218" x2="115" y2="148" stroke="#0c8383" stroke-width="2" marker-end="url(#arrSpoke)"/>

  <!-- Solution 1: Popularity Fallback (top) -->
  <g transform="translate(250, 83)">
    <rect x="-65" y="-20" width="130" height="40" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Chart icon -->
    <rect x="-52" y="-8" width="6" height="16" rx="1" fill="#3bc4a1"/>
    <rect x="-42" y="-14" width="6" height="22" rx="1" fill="#0c8383" fill-opacity="0.7"/>
    <rect x="-32" y="-4" width="6" height="12" rx="1" fill="#3bc4a1" fill-opacity="0.5"/>
    <text x="12" y="0" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">Popularity</text>
    <text x="12" y="12" text-anchor="middle" font-size="9" fill="#6b7280">Fallback</text>
  </g>

  <!-- Solution 2: Content Features (top-right) -->
  <g transform="translate(408, 125)">
    <rect x="-62" y="-22" width="124" height="44" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Document icon -->
    <rect x="-50" y="-12" width="16" height="20" rx="2" fill="none" stroke="#0c8383" stroke-width="1.5"/>
    <line x1="-46" y1="-6" x2="-38" y2="-6" stroke="#0c8383" stroke-width="1"/>
    <line x1="-46" y1="-1" x2="-38" y2="-1" stroke="#0c8383" stroke-width="1"/>
    <line x1="-46" y1="4" x2="-42" y2="4" stroke="#0c8383" stroke-width="1"/>
    <text x="14" y="-3" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">Content</text>
    <text x="14" y="10" text-anchor="middle" font-size="9" fill="#6b7280">Features</text>
  </g>

  <!-- Solution 3: Bandit Exploration (right) -->
  <g transform="translate(430, 265)">
    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Dice icon (exploration) -->
    <rect x="-48" y="-10" width="16" height="16" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="-44" cy="-6" r="1.5" fill="#f59e0b"/>
    <circle cx="-36" cy="2" r="1.5" fill="#f59e0b"/>
    <circle cx="-44" cy="2" r="1.5" fill="#f59e0b"/>
    <text x="14" y="-3" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">Bandit</text>
    <text x="14" y="10" text-anchor="middle" font-size="9" fill="#6b7280">Exploration</text>
  </g>

  <!-- Solution 4: Onboarding Survey (bottom-right) -->
  <g transform="translate(395, 400)">
    <rect x="-62" y="-22" width="124" height="44" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Clipboard icon -->
    <rect x="-50" y="-10" width="14" height="18" rx="2" fill="none" stroke="#3bc4a1" stroke-width="1.5"/>
    <line x1="-47" y1="-13" x2="-40" y2="-13" stroke="#3bc4a1" stroke-width="2"/>
    <line x1="-48" y1="-4" x2="-39" y2="-4" stroke="#3bc4a1" stroke-width="1"/>
    <line x1="-48" y1="0" x2="-39" y2="0" stroke="#3bc4a1" stroke-width="1"/>
    <line x1="-48" y1="4" x2="-43" y2="4" stroke="#3bc4a1" stroke-width="1"/>
    <text x="14" y="-3" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">Onboarding</text>
    <text x="14" y="10" text-anchor="middle" font-size="9" fill="#6b7280">Survey</text>
  </g>

  <!-- Solution 5: Transfer Learning (bottom-left) -->
  <g transform="translate(105, 400)">
    <rect x="-62" y="-22" width="124" height="44" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Transfer icon (two arrows) -->
    <line x1="-48" y1="-5" x2="-32" y2="-5" stroke="#0c8383" stroke-width="1.5"/>
    <path d="M-35,-9 L-30,-5 L-35,-1" fill="none" stroke="#0c8383" stroke-width="1.5"/>
    <line x1="-32" y1="5" x2="-48" y2="5" stroke="#0c8383" stroke-width="1.5"/>
    <path d="M-45,1 L-50,5 L-45,9" fill="none" stroke="#0c8383" stroke-width="1.5"/>
    <text x="14" y="-3" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">Transfer</text>
    <text x="14" y="10" text-anchor="middle" font-size="9" fill="#6b7280">Learning</text>
  </g>

  <!-- Solution 6: Side Information (top-left) -->
  <g transform="translate(92, 125)">
    <rect x="-62" y="-22" width="124" height="44" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <!-- Knowledge graph icon -->
    <circle cx="-46" cy="-6" r="4" fill="none" stroke="#0c8383" stroke-width="1.5"/>
    <circle cx="-34" cy="4" r="4" fill="none" stroke="#0c8383" stroke-width="1.5"/>
    <circle cx="-34" cy="-10" r="3" fill="none" stroke="#3bc4a1" stroke-width="1"/>
    <line x1="-43" y1="-4" x2="-36" y2="1" stroke="#0c8383" stroke-width="1"/>
    <line x1="-43" y1="-8" x2="-36" y2="-10" stroke="#3bc4a1" stroke-width="1"/>
    <text x="14" y="-3" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">Side Info</text>
    <text x="14" y="10" text-anchor="middle" font-size="9" fill="#6b7280">Knowledge Graph</text>
  </g>

  <!-- Footer -->
  <text x="250" y="478" text-anchor="middle" font-size="10" fill="#6b7280">Multiple strategies are typically combined for robust cold-start handling</text>
</svg>