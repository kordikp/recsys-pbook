<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 250" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0.1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes strikeFadeIn {
      from { opacity: 0; }
      to   { opacity: 0.6; }
    }

    .title { opacity: 0; animation: fadeIn 0.5s ease-out 0.1s forwards; }
    .divider { opacity: 0; animation: fadeIn 0.6s ease-out 0.3s forwards; }

    /* Old SEO items fade in then fade out */
    .old-header { opacity: 0; animation: fadeIn 0.4s ease-out 0.5s forwards; }
    .old-item { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    .old1 { animation-delay: 0.8s; }
    .old2 { animation-delay: 1.1s; }
    .old3 { animation-delay: 1.4s; }

    /* X marks on old items */
    .old-x { opacity: 0; animation: fadeIn 0.3s ease-out forwards; }
    .ox1 { animation-delay: 1.8s; }
    .ox2 { animation-delay: 2.0s; }
    .ox3 { animation-delay: 2.2s; }

    /* Strike-through lines - use opacity instead of scaleX */
    .strike { opacity: 0; animation: strikeFadeIn 0.4s ease-out forwards; }
    .s1 { animation-delay: 1.8s; }
    .s2 { animation-delay: 2.0s; }
    .s3 { animation-delay: 2.2s; }

    /* Old side fades out */
    .old-group { animation: fadeOut 1s ease-out 3.0s forwards; }

    /* New SEO items */
    .new-header { opacity: 0; animation: fadeIn 0.4s ease-out 0.5s forwards; }
    .new-item { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
    .new1 { animation-delay: 2.8s; }
    .new2 { animation-delay: 3.1s; }
    .new3 { animation-delay: 3.4s; }

    /* Check marks on new items */
    .new-check { opacity: 0; animation: fadeIn 0.3s ease-out forwards; }
    .nc1 { animation-delay: 3.3s; }
    .nc2 { animation-delay: 3.6s; }
    .nc3 { animation-delay: 3.9s; }
  
    @keyframes loopCycle { 0% { opacity: 0; } 3% { opacity: 1; } 47% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 0; } }
  </style>
<g class="loop-wrapper" style="animation: loopCycle 14s ease-in-out infinite">

  <!-- Title -->
  <text class="title" x="275" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b1225">Old SEO vs. New SEO</text>

  <!-- Divider -->
  <line class="divider" x1="275" y1="45" x2="275" y2="240" stroke="#0b1225" stroke-width="1" stroke-dasharray="4,4" opacity="0.3" />

  <!-- OLD SEO (left) -->
  <g class="old-group">
    <text class="old-header" x="138" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#ef4444">Old SEO</text>
    <text class="old-header" x="138" y="84" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Gaming the system</text>

    <!-- Item 1: Keyword stuffing -->
    <g class="old-item old1">
      <rect x="30" y="100" width="216" height="34" rx="6" fill="#f5f5f4" stroke="#ef4444" stroke-width="1" />
      <text x="50" y="121" font-size="11" fill="#0b1225">Keyword stuffing</text>
    </g>
    <text class="old-x ox1" x="220" y="124" font-size="18" fill="#ef4444" font-weight="bold">&#x2717;</text>
    <rect class="strike s1" x="48" y="116" width="150" height="2" rx="1" fill="#ef4444" />

    <!-- Item 2: Link farms -->
    <g class="old-item old2">
      <rect x="30" y="144" width="216" height="34" rx="6" fill="#f5f5f4" stroke="#ef4444" stroke-width="1" />
      <text x="50" y="165" font-size="11" fill="#0b1225">Link farms</text>
    </g>
    <text class="old-x ox2" x="220" y="168" font-size="18" fill="#ef4444" font-weight="bold">&#x2717;</text>
    <rect class="strike s2" x="48" y="160" width="95" height="2" rx="1" fill="#ef4444" />

    <!-- Item 3: Gaming metrics -->
    <g class="old-item old3">
      <rect x="30" y="188" width="216" height="34" rx="6" fill="#f5f5f4" stroke="#ef4444" stroke-width="1" />
      <text x="50" y="209" font-size="11" fill="#0b1225">Click-bait titles</text>
    </g>
    <text class="old-x ox3" x="220" y="212" font-size="18" fill="#ef4444" font-weight="bold">&#x2717;</text>
    <rect class="strike s3" x="48" y="204" width="130" height="2" rx="1" fill="#ef4444" />
  </g>

  <!-- NEW SEO (right) -->
  <text class="new-header" x="412" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#3bc4a1">New SEO</text>
  <text class="new-header" x="412" y="84" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Genuine value</text>

  <!-- Item 1: Genuine engagement -->
  <g class="new-item new1">
    <rect x="304" y="100" width="216" height="34" rx="6" fill="#f5f5f4" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="324" y="121" font-size="11" fill="#0b1225">Genuine engagement</text>
  </g>
  <text class="new-check nc1" x="494" y="124" font-size="18" fill="#3bc4a1" font-weight="bold">&#x2713;</text>

  <!-- Item 2: Topic authority -->
  <g class="new-item new2">
    <rect x="304" y="144" width="216" height="34" rx="6" fill="#f5f5f4" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="324" y="165" font-size="11" fill="#0b1225">Topic authority</text>
  </g>
  <text class="new-check nc2" x="494" y="168" font-size="18" fill="#3bc4a1" font-weight="bold">&#x2713;</text>

  <!-- Item 3: Consistency -->
  <g class="new-item new3">
    <rect x="304" y="188" width="216" height="34" rx="6" fill="#f5f5f4" stroke="#3bc4a1" stroke-width="1.5" />
    <text x="324" y="209" font-size="11" fill="#0b1225">Consistent quality</text>
  </g>
  <text class="new-check nc3" x="494" y="212" font-size="18" fill="#3bc4a1" font-weight="bold">&#x2713;</text>
</g>
</svg>