<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 280" font-family="system-ui,sans-serif">
  <style>
    @keyframes appear { 0% { opacity: 0; } 4% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes narrowAppear { 0%,8% { opacity: 0; } 12% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes stuckAppear { 0%,20% { opacity: 0; } 24% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes escapeAppear { 0%,35% { opacity: 0; } 40% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes warnPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    .t1 { opacity: 0; animation: appear 22s ease-in-out infinite; }
    .t1a{animation-delay:0s} .t1b{animation-delay:.2s} .t1c{animation-delay:.4s}
    .t2 { opacity: 0; animation: narrowAppear 22s ease-in-out infinite; }
    .t2a{animation-delay:0s} .t2b{animation-delay:.2s}
    .t3 { opacity: 0; animation: stuckAppear 22s ease-in-out infinite; }
    .t4 { opacity: 0; animation: escapeAppear 22s ease-in-out infinite; }
    .t4a{animation-delay:0s} .t4b{animation-delay:.2s} .t4c{animation-delay:.4s}
    .wp { animation: warnPulse 1.5s ease-in-out infinite; }
  </style>

  <rect width="650" height="280" fill="#f5f5f4" rx="12"/>

  <!-- Timeline arrow -->
  <g class="t1 t1a">
    <line x1="30" y1="30" x2="620" y2="30" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="30" y="22" font-size="8" fill="#bbb">Week 1</text>
    <text x="200" y="22" font-size="8" fill="#bbb">Week 3</text>
    <text x="370" y="22" font-size="8" fill="#bbb">Week 5</text>
    <text x="530" y="22" font-size="8" fill="#bbb">Week 6</text>
  </g>

  <!-- Phase 1: Diverse interests (Week 1) -->
  <g class="t1 t1a">
    <text x="30" y="52" font-size="9" font-weight="600" fill="#0c8383">Diverse interests</text>
    <rect x="30" y="58" width="150" height="16" rx="3" fill="#0c8383" opacity="0.15"/>
    <text x="38" y="70" font-size="8" fill="#0b1225">🎬 Action</text>
    <rect x="30" y="78" width="150" height="16" rx="3" fill="#3bc4a1" opacity="0.15"/>
    <text x="38" y="90" font-size="8" fill="#0b1225">📚 Documentary</text>
    <rect x="30" y="98" width="150" height="16" rx="3" fill="#6366f1" opacity="0.15"/>
    <text x="38" y="110" font-size="8" fill="#0b1225">😄 Comedy</text>
    <rect x="30" y="118" width="150" height="16" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="38" y="130" font-size="8" fill="#0b1225">🔍 True Crime</text>
    <rect x="30" y="138" width="150" height="16" rx="3" fill="#ec4899" opacity="0.15"/>
    <text x="38" y="150" font-size="8" fill="#0b1225">🎵 Music</text>
  </g>

  <!-- Phase 2: Narrowing (Week 3) -->
  <g class="t2 t2a">
    <text x="200" y="52" font-size="9" font-weight="600" fill="#f59e0b">Narrowing...</text>
    <rect x="200" y="58" width="150" height="16" rx="3" fill="#e5e5e4"/>
    <text x="208" y="70" font-size="8" fill="#ccc">🎬 Action</text>
    <rect x="200" y="78" width="150" height="16" rx="3" fill="#e5e5e4"/>
    <text x="208" y="90" font-size="8" fill="#ccc">📚 Documentary</text>
    <rect x="200" y="98" width="150" height="16" rx="3" fill="#e5e5e4"/>
    <text x="208" y="110" font-size="8" fill="#ccc">😄 Comedy</text>
    <rect x="200" y="118" width="150" height="18" rx="3" fill="#f59e0b" opacity="0.3"/>
    <text x="208" y="131" font-size="8" font-weight="600" fill="#0b1225">🔍 True Crime</text>
    <rect x="200" y="140" width="150" height="18" rx="3" fill="#f59e0b" opacity="0.2"/>
    <text x="208" y="153" font-size="8" fill="#0b1225">🔍 Murder Docs</text>
    <rect x="200" y="162" width="150" height="18" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="208" y="175" font-size="8" fill="#0b1225">🔍 Serial Killers</text>
  </g>

  <!-- Phase 3: Stuck in rabbit hole (Week 5) -->
  <g class="t3">
    <text x="370" y="52" font-size="9" font-weight="700" fill="#ef4444" class="wp">Rabbit hole</text>
    <rect x="370" y="58" width="140" height="22" rx="3" fill="#ef4444" opacity="0.2"/>
    <text x="378" y="73" font-size="8" font-weight="600" fill="#ef4444">🔍 True Crime</text>
    <rect x="370" y="84" width="140" height="22" rx="3" fill="#ef4444" opacity="0.15"/>
    <text x="378" y="99" font-size="8" fill="#ef4444">🔍 Murder Docs</text>
    <rect x="370" y="110" width="140" height="22" rx="3" fill="#ef4444" opacity="0.1"/>
    <text x="378" y="125" font-size="8" fill="#ef4444">🔍 Serial Killers</text>
    <rect x="370" y="136" width="140" height="22" rx="3" fill="#ef4444" opacity="0.08"/>
    <text x="378" y="151" font-size="8" fill="#cc3333">🔍 Forensic Files</text>

    <text x="440" y="175" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="600">Only 1 topic left</text>
    <text x="440" y="188" text-anchor="middle" font-size="7" fill="#999">All other interests suppressed</text>
  </g>

  <!-- Phase 4: Escape via steering -->
  <g class="t4 t4a">
    <text x="530" y="52" font-size="9" font-weight="700" fill="#0c8383">Steered escape</text>
    <rect x="530" y="58" width="105" height="18" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="538" y="71" font-size="8" fill="#0b1225">🔍 True Crime</text>
  </g>
  <g class="t4 t4a">
    <rect x="530" y="80" width="105" height="18" rx="3" fill="#0c8383" opacity="0.2" stroke="#0c8383" stroke-width="1"/>
    <text x="538" y="93" font-size="8" font-weight="600" fill="#0c8383">📰 Investigative</text>
  </g>
  <g class="t4 t4b">
    <rect x="530" y="102" width="105" height="18" rx="3" fill="#3bc4a1" opacity="0.2" stroke="#3bc4a1" stroke-width="1"/>
    <text x="538" y="115" font-size="8" font-weight="600" fill="#3bc4a1">⚖️ Legal Thriller</text>
  </g>
  <g class="t4 t4c">
    <rect x="530" y="124" width="105" height="18" rx="3" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
    <text x="538" y="137" font-size="8" font-weight="600" fill="#6366f1">🧠 Psychology</text>
  </g>
  <g class="t4 t4a">
    <rect x="530" y="146" width="105" height="18" rx="3" fill="#e5e5e4"/>
    <text x="538" y="159" font-size="8" fill="#bbb">📚 Documentary</text>
  </g>

  <g class="t4 t4a">
    <text x="582" y="180" text-anchor="middle" font-size="8" fill="#0c8383" font-weight="600">4 topics active</text>
    <text x="582" y="192" text-anchor="middle" font-size="7" fill="#888">Adjacent concepts</text>
  </g>

  <!-- Bottom: What happened -->
  <g class="t4 t4b">
    <rect x="30" y="210" width="590" height="55" rx="8" fill="white" stroke="#0c8383" stroke-width="1"/>
    <text x="325" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#0b1225">How steering fixes it</text>
    <text x="325" y="245" text-anchor="middle" font-size="8" fill="#666">Detect narrowing neuron activity → Boost adjacent concept neurons → Natural expansion</text>
    <text x="325" y="258" text-anchor="middle" font-size="8" fill="#0c8383">True crime → investigative journalism, legal thrillers, psychology</text>
  </g>
</svg>