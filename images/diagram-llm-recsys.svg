<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" width="650" height="300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#0c8383"/>
    </marker>
    <marker id="arrDark" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#0b1225"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#3bc4a1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="650" height="300" rx="12" fill="#f5f5f4"/>

  <!-- Title -->
  <text x="325" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">LLM Integration Architectures for Recommendation</text>

  <!-- ===== Architecture 1: LLM as Recommender ===== -->
  <g transform="translate(10, 44)">
    <rect x="0" y="0" width="195" height="210" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="97" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#ef4444">LLM as Recommender</text>

    <!-- User -->
    <circle cx="97" cy="52" r="14" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1.5"/>
    <text x="97" y="46" text-anchor="middle" font-size="14">&#x1F464;</text>
    <text x="97" y="56" text-anchor="middle" font-size="7" fill="#0c8383">query</text>

    <!-- Arrow down -->
    <line x1="97" y1="66" x2="97" y2="84" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- LLM box -->
    <rect x="52" y="88" width="90" height="32" rx="6" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="1.5"/>
    <text x="97" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c8383">LLM</text>

    <!-- Arrow down -->
    <line x1="97" y1="120" x2="97" y2="138" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Items -->
    <rect x="57" y="142" width="80" height="26" rx="5" fill="#3bc4a1" fill-opacity="0.15" stroke="#3bc4a1" stroke-width="1"/>
    <text x="97" y="159" text-anchor="middle" font-size="10" fill="#0b1225">Items</text>

    <!-- X mark warning -->
    <circle cx="155" cy="155" r="12" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
    <text x="155" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">&#x2717;</text>

    <text x="97" y="186" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="bold">Hallucination risk</text>
    <text x="97" y="198" text-anchor="middle" font-size="8" fill="#6b7280">No grounding in catalog</text>
  </g>

  <!-- ===== Architecture 2: LLM as Feature Extractor ===== -->
  <g transform="translate(220, 44)">
    <rect x="0" y="0" width="195" height="210" rx="8" fill="#ffffff" stroke="#0c8383" stroke-width="1.5"/>
    <text x="97" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c8383">LLM as Feature Extractor</text>

    <!-- Items input -->
    <rect x="57" y="36" width="80" height="26" rx="5" fill="#3bc4a1" fill-opacity="0.15" stroke="#3bc4a1" stroke-width="1"/>
    <text x="97" y="53" text-anchor="middle" font-size="10" fill="#0b1225">Items</text>

    <!-- Arrow down -->
    <line x1="97" y1="62" x2="97" y2="76" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- LLM box -->
    <rect x="52" y="80" width="90" height="28" rx="6" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="1.5"/>
    <text x="97" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c8383">LLM</text>

    <!-- Arrow down -->
    <line x1="97" y1="108" x2="97" y2="118" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Embeddings -->
    <rect x="47" y="122" width="100" height="22" rx="4" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="97" y="137" text-anchor="middle" font-size="9" fill="#b45309">Embeddings</text>

    <!-- Arrow down -->
    <line x1="97" y1="144" x2="97" y2="154" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- RecSys -->
    <rect x="47" y="158" width="100" height="26" rx="6" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5"/>
    <text x="97" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#0b1225">RecSys</text>

    <text x="97" y="200" text-anchor="middle" font-size="8" fill="#6b7280">LLM enriches features,</text>
    <text x="97" y="210" text-anchor="middle" font-size="8" fill="#6b7280">RecSys ranks items</text>
  </g>

  <!-- ===== Architecture 3: Hybrid (Production Standard) ===== -->
  <g transform="translate(430, 44)">
    <rect x="0" y="0" width="210" height="210" rx="8" fill="#3bc4a1" fill-opacity="0.08" stroke="#3bc4a1" stroke-width="2"/>
    <text x="105" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#0b1225">LLM + RecSys Hybrid</text>

    <!-- User top -->
    <circle cx="105" cy="46" r="14" fill="#0c8383" fill-opacity="0.15" stroke="#0c8383" stroke-width="1.5"/>
    <text x="105" y="40" text-anchor="middle" font-size="14">&#x1F464;</text>
    <text x="105" y="50" text-anchor="middle" font-size="7" fill="#0c8383">User</text>

    <!-- Arrow down-left to LLM intent -->
    <line x1="91" y1="58" x2="55" y2="76" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- LLM intent box -->
    <rect x="15" y="80" width="80" height="26" rx="5" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="1.5"/>
    <text x="55" y="93" text-anchor="middle" font-size="8" font-weight="bold" fill="#0c8383">LLM</text>
    <text x="55" y="103" text-anchor="middle" font-size="7" fill="#6b7280">intent parsing</text>

    <!-- Arrow right to RecSys -->
    <line x1="95" y1="93" x2="112" y2="93" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- RecSys box -->
    <rect x="116" y="80" width="80" height="26" rx="5" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1.5"/>
    <text x="156" y="93" text-anchor="middle" font-size="8" font-weight="bold" fill="#0b1225">RecSys</text>
    <text x="156" y="103" text-anchor="middle" font-size="7" fill="#6b7280">retrieval</text>

    <!-- Arrow down from RecSys -->
    <line x1="156" y1="106" x2="156" y2="122" stroke="#3bc4a1" stroke-width="1.5" marker-end="url(#arrGreen)"/>

    <!-- LLM response box -->
    <rect x="66" y="126" width="100" height="26" rx="5" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="1.5"/>
    <text x="116" y="139" text-anchor="middle" font-size="8" font-weight="bold" fill="#0c8383">LLM</text>
    <text x="116" y="149" text-anchor="middle" font-size="7" fill="#6b7280">response generation</text>

    <!-- Arrow up back to user area -->
    <line x1="116" y1="152" x2="116" y2="168" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Result -->
    <rect x="66" y="172" width="100" height="22" rx="4" fill="#3bc4a1" fill-opacity="0.2" stroke="#3bc4a1" stroke-width="1"/>
    <text x="116" y="186" text-anchor="middle" font-size="9" font-weight="bold" fill="#0b1225">Grounded response</text>

    <!-- Production standard badge -->
    <rect x="40" y="198" width="130" height="16" rx="8" fill="#3bc4a1" fill-opacity="0.3" stroke="#3bc4a1" stroke-width="1"/>
    <text x="105" y="209" text-anchor="middle" font-size="8" font-weight="bold" fill="#0b1225">&#x2713; Production Standard</text>
  </g>

  <!-- Bottom note -->
  <text x="325" y="276" text-anchor="middle" font-size="10" fill="#6b7280">Direct LLM recommendations lack catalog grounding. Hybrid architectures combine LLM understanding with RecSys precision.</text>
  <text x="325" y="292" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">The hybrid approach is the dominant pattern in production systems.</text>
</svg>