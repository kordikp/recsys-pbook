<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="650" height="350" font-family="system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="650" height="350" rx="8" fill="#f5f5f4"/>

  <!-- Title bar -->
  <rect width="650" height="40" rx="8" fill="#0b1225"/>
  <rect y="32" width="650" height="8" fill="#0b1225"/>
  <circle cx="20" cy="20" r="5" fill="#ef4444"/>
  <circle cx="36" cy="20" r="5" fill="#f59e0b"/>
  <circle cx="52" cy="20" r="5" fill="#3bc4a1"/>
  <text x="325" y="25" text-anchor="middle" fill="#f5f5f4" font-size="14" font-weight="600">Production Monitoring Dashboard</text>

  <!-- Panel 1: Model Metrics (top-left) -->
  <rect x="15" y="52" width="300" height="135" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="30" y="72" fill="#0b1225" font-size="11" font-weight="600">Model Metrics</text>
  <text x="280" y="72" text-anchor="end" fill="#3bc4a1" font-size="9">Live</text>
  <circle cx="290" cy="69" r="3" fill="#3bc4a1"/>

  <!-- nDCG line chart -->
  <line x1="40" y1="82" x2="40" y2="170" stroke="#ddd" stroke-width="0.5"/>
  <line x1="40" y1="170" x2="300" y2="170" stroke="#ddd" stroke-width="0.5"/>
  <text x="37" y="90" text-anchor="end" fill="#999" font-size="7">0.8</text>
  <text x="37" y="110" text-anchor="end" fill="#999" font-size="7">0.6</text>
  <text x="37" y="130" text-anchor="end" fill="#999" font-size="7">0.4</text>
  <text x="37" y="150" text-anchor="end" fill="#999" font-size="7">0.2</text>
  <text x="37" y="170" text-anchor="end" fill="#999" font-size="7">0.0</text>
  <!-- Grid lines -->
  <line x1="40" y1="90" x2="300" y2="90" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="40" y1="110" x2="300" y2="110" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="40" y1="130" x2="300" y2="130" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="40" y1="150" x2="300" y2="150" stroke="#f0f0f0" stroke-width="0.5"/>
  <!-- nDCG line: steady around 0.65, then dip -->
  <polyline points="45,100 75,98 105,99 135,97 165,98 195,99 210,102 225,115 245,130 265,128 285,125" fill="none" stroke="#0c8383" stroke-width="2" stroke-linejoin="round"/>
  <!-- Dip annotation -->
  <line x1="225" y1="82" x2="225" y2="115" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="228" y="88" fill="#ef4444" font-size="7">nDCG dip</text>
  <!-- X labels -->
  <text x="45" y="178" fill="#999" font-size="6">Mon</text>
  <text x="105" y="178" fill="#999" font-size="6">Tue</text>
  <text x="165" y="178" fill="#999" font-size="6">Wed</text>
  <text x="225" y="178" fill="#999" font-size="6">Thu</text>
  <text x="285" y="178" fill="#999" font-size="6">Fri</text>
  <text x="165" y="185" fill="#0b1225" font-size="7" text-anchor="middle">nDCG@10 over time</text>

  <!-- Panel 2: Latency (top-right) -->
  <rect x="330" y="52" width="305" height="135" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="345" y="72" fill="#0b1225" font-size="11" font-weight="600">Latency</text>
  <text x="600" y="72" text-anchor="end" fill="#999" font-size="8">ms</text>

  <!-- Bar chart p50/p95/p99 -->
  <line x1="370" y1="82" x2="370" y2="170" stroke="#ddd" stroke-width="0.5"/>
  <line x1="370" y1="170" x2="610" y2="170" stroke="#ddd" stroke-width="0.5"/>
  <!-- Grid -->
  <line x1="370" y1="100" x2="610" y2="100" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="370" y1="120" x2="610" y2="120" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="370" y1="140" x2="610" y2="140" stroke="#f0f0f0" stroke-width="0.5"/>
  <text x="367" y="103" text-anchor="end" fill="#999" font-size="7">200</text>
  <text x="367" y="123" text-anchor="end" fill="#999" font-size="7">150</text>
  <text x="367" y="143" text-anchor="end" fill="#999" font-size="7">100</text>
  <text x="367" y="173" text-anchor="end" fill="#999" font-size="7">0</text>

  <!-- p50 bar -->
  <rect x="410" y="145" width="40" height="25" rx="2" fill="#3bc4a1"/>
  <text x="430" y="142" text-anchor="middle" fill="#3bc4a1" font-size="8" font-weight="600">23ms</text>
  <text x="430" y="182" text-anchor="middle" fill="#666" font-size="8">p50</text>

  <!-- p95 bar -->
  <rect x="480" y="125" width="40" height="45" rx="2" fill="#f59e0b"/>
  <text x="500" y="122" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="600">87ms</text>
  <text x="500" y="182" text-anchor="middle" fill="#666" font-size="8">p95</text>

  <!-- p99 bar -->
  <rect x="550" y="105" width="40" height="65" rx="2" fill="#ef4444"/>
  <text x="570" y="102" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">195ms</text>
  <text x="570" y="182" text-anchor="middle" fill="#666" font-size="8">p99</text>

  <!-- Panel 3: Coverage (bottom-left) -->
  <rect x="15" y="200" width="300" height="138" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="30" y="220" fill="#0b1225" font-size="11" font-weight="600">Coverage</text>

  <!-- Donut chart -->
  <circle cx="120" cy="285" r="40" fill="none" stroke="#e5e7eb" stroke-width="14"/>
  <circle cx="120" cy="285" r="40" fill="none" stroke="#0c8383" stroke-width="14"
    stroke-dasharray="180 251.3" stroke-dashoffset="62.8" transform="rotate(-90 120 285)"/>
  <text x="120" y="282" text-anchor="middle" fill="#0b1225" font-size="16" font-weight="700">72%</text>
  <text x="120" y="296" text-anchor="middle" fill="#999" font-size="8">catalog</text>

  <!-- Legend -->
  <rect x="190" y="258" width="8" height="8" rx="2" fill="#0c8383"/>
  <text x="203" y="266" fill="#666" font-size="9">Recommended (72%)</text>
  <rect x="190" y="278" width="8" height="8" rx="2" fill="#e5e7eb"/>
  <text x="203" y="286" fill="#666" font-size="9">Not recommended (28%)</text>
  <text x="190" y="308" fill="#999" font-size="8">Long-tail gap: 28% items</text>
  <text x="190" y="320" fill="#999" font-size="8">never surfaced</text>

  <!-- Panel 4: Data Quality (bottom-right) -->
  <rect x="330" y="200" width="305" height="138" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="345" y="220" fill="#0b1225" font-size="11" font-weight="600">Data Quality</text>

  <!-- Status rows -->
  <circle cx="355" cy="245" r="5" fill="#3bc4a1"/>
  <text x="367" y="249" fill="#0b1225" font-size="10">Interaction pipeline</text>
  <text x="615" y="249" text-anchor="end" fill="#3bc4a1" font-size="9">OK</text>

  <circle cx="355" cy="267" r="5" fill="#3bc4a1"/>
  <text x="367" y="271" fill="#0b1225" font-size="10">Feature freshness</text>
  <text x="615" y="271" text-anchor="end" fill="#3bc4a1" font-size="9">OK</text>

  <circle cx="355" cy="289" r="5" fill="#f59e0b"/>
  <text x="367" y="293" fill="#0b1225" font-size="10">Missing ratings</text>
  <text x="615" y="293" text-anchor="end" fill="#f59e0b" font-size="9">WARN: 12%</text>

  <circle cx="355" cy="311" r="5" fill="#ef4444"/>
  <text x="367" y="315" fill="#0b1225" font-size="10">Schema violations</text>
  <text x="615" y="315" text-anchor="end" fill="#ef4444" font-size="9">ALERT: 847</text>

  <line x1="345" y1="230" x2="620" y2="230" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="345" y1="256" x2="620" y2="256" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="345" y1="278" x2="620" y2="278" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="345" y1="300" x2="620" y2="300" stroke="#f0f0f0" stroke-width="0.5"/>
</svg>