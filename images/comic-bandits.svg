<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 350" width="680" height="350" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#1C1917">The Explore-Exploit Restaurant</text>

  <!-- Panel 1: The Menu -->
  <g transform="translate(10, 38)">
    <rect x="0" y="0" width="215" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#D97706"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">1</text>

    <!-- Person at table -->
    <g transform="translate(25, 30)">
      <!-- Table -->
      <rect x="0" y="55" width="60" height="5" rx="2" fill="#78716C" opacity="0.3"/>
      <line x1="10" y1="60" x2="10" y2="75" stroke="#78716C" stroke-width="2" opacity="0.3"/>
      <line x1="50" y1="60" x2="50" y2="75" stroke="#78716C" stroke-width="2" opacity="0.3"/>

      <!-- Person -->
      <circle cx="30" cy="30" r="8" fill="#1C1917" opacity="0.15" stroke="#1C1917" stroke-width="1"/>
      <circle cx="30" cy="26" r="4" fill="#1C1917" opacity="0.3"/>
      <line x1="30" y1="34" x2="30" y2="52" stroke="#1C1917" stroke-width="1.5"/>
      <line x1="22" y1="42" x2="38" y2="42" stroke="#1C1917" stroke-width="1.5"/>

      <!-- Thought bubble -->
      <text x="42" y="18" font-size="10" fill="#D97706">?</text>
    </g>

    <!-- Menu items -->
    <g transform="translate(100, 25)">
      <text x="50" y="0" text-anchor="middle" font-size="9" font-weight="bold" fill="#1C1917">THE MENU</text>

      <!-- Dish A (tried, 4 stars) -->
      <rect x="0" y="8" width="100" height="20" rx="4" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1"/>
      <text x="8" y="22" font-size="8" fill="#059669" font-weight="bold">Dish A</text>
      <text x="68" y="22" font-size="9" fill="#D97706">★★★★</text>

      <!-- Dish B (tried, 2 stars) -->
      <rect x="0" y="33" width="100" height="20" rx="4" fill="#DC2626" fill-opacity="0.1" stroke="#DC2626" stroke-width="1"/>
      <text x="8" y="47" font-size="8" fill="#DC2626" font-weight="bold">Dish B</text>
      <text x="68" y="47" font-size="9" fill="#D97706">★★</text>

      <!-- Dish C (unknown) -->
      <rect x="0" y="58" width="100" height="20" rx="4" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="8" y="72" font-size="8" fill="#78716C">Dish C</text>
      <text x="75" y="72" font-size="9" fill="#78716C">???</text>

      <!-- Dish D (unknown) -->
      <rect x="0" y="83" width="100" height="20" rx="4" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="8" y="97" font-size="8" fill="#78716C">Dish D</text>
      <text x="75" y="97" font-size="9" fill="#78716C">???</text>

      <!-- Dish E (unknown) -->
      <rect x="0" y="108" width="100" height="20" rx="4" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="8" y="122" font-size="8" fill="#78716C">Dish E</text>
      <text x="75" y="122" font-size="9" fill="#78716C">???</text>
    </g>

    <!-- Caption -->
    <text x="107" y="155" text-anchor="middle" font-size="9" fill="#1C1917" font-weight="bold">You know Dish A is great.</text>
    <text x="107" y="167" text-anchor="middle" font-size="9" fill="#78716C">But what about the others?</text>
  </g>

  <!-- Panel 2: Two Extremes -->
  <g transform="translate(235, 38)">
    <rect x="0" y="0" width="215" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#D97706"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">2</text>

    <!-- Divider -->
    <line x1="107" y1="28" x2="107" y2="130" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- LEFT: Always Exploit -->
    <g transform="translate(10, 28)">
      <text x="48" y="12" text-anchor="middle" font-size="9" font-weight="bold" fill="#059669">Always Exploit</text>

      <!-- Bored person eating same dish -->
      <circle cx="48" cy="38" r="6" fill="#1C1917" opacity="0.3"/>
      <line x1="48" y1="44" x2="48" y2="58" stroke="#1C1917" stroke-width="1.5"/>
      <line x1="40" y1="50" x2="56" y2="50" stroke="#1C1917" stroke-width="1.5"/>

      <!-- Same dish repeated -->
      <rect x="20" y="62" width="22" height="14" rx="3" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-width="0.8"/>
      <text x="31" y="72" text-anchor="middle" font-size="6" fill="#059669">A</text>
      <rect x="44" y="62" width="22" height="14" rx="3" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-width="0.8"/>
      <text x="55" y="72" text-anchor="middle" font-size="6" fill="#059669">A</text>
      <rect x="68" y="62" width="22" height="14" rx="3" fill="#059669" fill-opacity="0.2" stroke="#059669" stroke-width="0.8"/>
      <text x="79" y="72" text-anchor="middle" font-size="6" fill="#059669">A</text>

      <!-- Bored expression -->
      <text x="48" y="92" text-anchor="middle" font-size="8" fill="#78716C">Safe but boring.</text>
      <text x="48" y="102" text-anchor="middle" font-size="8" fill="#78716C">Same thing forever.</text>
    </g>

    <!-- RIGHT: Always Explore -->
    <g transform="translate(112, 28)">
      <text x="48" y="12" text-anchor="middle" font-size="9" font-weight="bold" fill="#DC2626">Always Explore</text>

      <!-- Confused person -->
      <circle cx="48" cy="38" r="6" fill="#1C1917" opacity="0.3"/>
      <line x1="48" y1="44" x2="48" y2="58" stroke="#1C1917" stroke-width="1.5"/>
      <line x1="40" y1="50" x2="56" y2="50" stroke="#1C1917" stroke-width="1.5"/>

      <!-- Random dishes -->
      <rect x="20" y="62" width="22" height="14" rx="3" fill="#DC2626" fill-opacity="0.2" stroke="#DC2626" stroke-width="0.8"/>
      <text x="31" y="72" text-anchor="middle" font-size="6" fill="#DC2626">B</text>
      <rect x="44" y="62" width="22" height="14" rx="3" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="0.8"/>
      <text x="55" y="72" text-anchor="middle" font-size="6" fill="#D97706">D</text>
      <rect x="68" y="62" width="22" height="14" rx="3" fill="#78716C" fill-opacity="0.2" stroke="#78716C" stroke-width="0.8"/>
      <text x="79" y="72" text-anchor="middle" font-size="6" fill="#78716C">E</text>

      <!-- Chaotic expression -->
      <text x="48" y="92" text-anchor="middle" font-size="8" fill="#78716C">Chaotic. Mostly</text>
      <text x="48" y="102" text-anchor="middle" font-size="8" fill="#78716C">bad experiences.</text>
    </g>

    <!-- Caption -->
    <text x="107" y="148" text-anchor="middle" font-size="9" fill="#1C1917" font-weight="bold">Both extremes fail.</text>
    <text x="107" y="162" text-anchor="middle" font-size="9" fill="#78716C">We need a smarter balance.</text>
  </g>

  <!-- Panel 3: Smart Exploration -->
  <g transform="translate(460, 38)">
    <rect x="0" y="0" width="210" height="170" rx="8" fill="white" stroke="#E7E5E4" stroke-width="1.5"/>

    <!-- Panel number -->
    <circle cx="16" cy="16" r="10" fill="#D97706"/>
    <text x="16" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">3</text>

    <!-- Waiter (Thompson Sampling personified) -->
    <g transform="translate(25, 22)">
      <!-- Waiter with bow tie -->
      <circle cx="25" cy="18" r="7" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1"/>
      <circle cx="25" cy="14" r="4.5" fill="#7C3AED" opacity="0.3"/>
      <line x1="25" y1="25" x2="25" y2="45" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="16" y1="32" x2="25" y2="32" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="25" y1="32" x2="38" y2="28" stroke="#7C3AED" stroke-width="1.5"/>
      <!-- Bow tie -->
      <polygon points="22,26 28,26 25,29" fill="#7C3AED" opacity="0.5"/>

      <!-- Waiter holding dish -->
      <rect x="34" y="20" width="22" height="16" rx="4" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="1.5"/>
      <text x="45" y="32" text-anchor="middle" font-size="7" fill="#D97706" font-weight="bold">C</text>
    </g>

    <!-- Speech bubble -->
    <rect x="75" y="22" width="125" height="44" rx="8" fill="white" stroke="#7C3AED" stroke-width="1"/>
    <polygon points="75,45 65,52 78,48" fill="white" stroke="#7C3AED" stroke-width="1"/>
    <polygon points="76,44 67,50 77,47" fill="white"/>
    <text x="137" y="38" text-anchor="middle" font-size="8" fill="#7C3AED">"Dish C is similar to</text>
    <text x="137" y="50" text-anchor="middle" font-size="8" fill="#7C3AED">Dish A, but with a twist."</text>
    <text x="137" y="60" text-anchor="middle" font-size="7" fill="#78716C">(Thompson Sampling)</text>

    <!-- Happy person trying Dish C -->
    <g transform="translate(55, 75)">
      <circle cx="50" cy="12" r="6" fill="#1C1917" opacity="0.3"/>
      <line x1="50" y1="18" x2="50" y2="32" stroke="#1C1917" stroke-width="1.5"/>
      <line x1="42" y1="24" x2="58" y2="24" stroke="#1C1917" stroke-width="1.5"/>

      <!-- Dish -->
      <rect x="30" y="34" width="40" height="18" rx="4" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="1"/>
      <text x="50" y="46" text-anchor="middle" font-size="7" fill="#D97706" font-weight="bold">Dish C</text>

      <!-- 5 stars result -->
      <text x="50" y="65" text-anchor="middle" font-size="14" fill="#D97706">★★★★★</text>
    </g>

    <!-- Caption -->
    <text x="105" y="150" text-anchor="middle" font-size="9" fill="#1C1917" font-weight="bold">Smart exploration wins!</text>
    <text x="105" y="164" text-anchor="middle" font-size="9" fill="#78716C">Try items likely to be good.</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(40, 225)">
    <rect x="0" y="0" width="600" height="110" rx="10" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="1"/>

    <text x="300" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#D97706">Bandit Strategies for Recommender Systems</text>

    <!-- Three strategies compared -->
    <g transform="translate(20, 35)">
      <!-- Epsilon-Greedy -->
      <rect x="0" y="0" width="175" height="55" rx="6" fill="white" stroke="#E7E5E4" stroke-width="1"/>
      <text x="87" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#1C1917">Epsilon-Greedy</text>
      <text x="87" y="30" text-anchor="middle" font-size="9" fill="#78716C">Exploit 90% of the time,</text>
      <text x="87" y="42" text-anchor="middle" font-size="9" fill="#78716C">randomly explore 10%</text>

      <!-- UCB -->
      <rect x="192" y="0" width="175" height="55" rx="6" fill="white" stroke="#E7E5E4" stroke-width="1"/>
      <text x="279" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#1C1917">UCB</text>
      <text x="279" y="30" text-anchor="middle" font-size="9" fill="#78716C">Pick the item with highest</text>
      <text x="279" y="42" text-anchor="middle" font-size="9" fill="#78716C">reward + uncertainty bonus</text>

      <!-- Thompson Sampling -->
      <rect x="384" y="0" width="175" height="55" rx="6" fill="#7C3AED" fill-opacity="0.05" stroke="#7C3AED" stroke-width="1"/>
      <text x="471" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#7C3AED">Thompson Sampling</text>
      <text x="471" y="30" text-anchor="middle" font-size="9" fill="#78716C">Sample from belief distribution,</text>
      <text x="471" y="42" text-anchor="middle" font-size="9" fill="#78716C">naturally balances both</text>
    </g>

    <text x="300" y="102" text-anchor="middle" font-size="10" fill="#78716C" font-style="italic">Every recommendation is a chance to learn — if you're willing to experiment a little</text>
  </g>
</svg>