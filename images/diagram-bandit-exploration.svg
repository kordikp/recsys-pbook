<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480" font-family="system-ui, sans-serif">
  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1C1917">The Explore-Exploit Dilemma</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#78716C">Should we recommend what we know works, or try something new?</text>

  <!-- Crossroads visual -->
  <g transform="translate(340, 70)">
    <!-- Person (stick figure) at center -->
    <circle cx="0" cy="40" r="12" fill="#1C1917" opacity="0.8"/>
    <line x1="0" y1="52" x2="0" y2="82" stroke="#1C1917" stroke-width="2.5"/>
    <line x1="-15" y1="65" x2="15" y2="65" stroke="#1C1917" stroke-width="2.5"/>
    <line x1="0" y1="82" x2="-12" y2="100" stroke="#1C1917" stroke-width="2.5"/>
    <line x1="0" y1="82" x2="12" y2="100" stroke="#1C1917" stroke-width="2.5"/>

    <!-- Question mark -->
    <text x="0" y="20" text-anchor="middle" font-size="22" fill="#D97706" font-weight="bold">?</text>
  </g>

  <!-- LEFT PATH: Exploit -->
  <g transform="translate(40, 115)">
    <!-- Path arrow -->
    <path d="M300,50 C250,50 180,60 120,100" fill="none" stroke="#059669" stroke-width="3" opacity="0.6"/>

    <rect x="10" y="90" width="230" height="110" rx="12" fill="#059669" fill-opacity="0.06" stroke="#059669" stroke-width="1.5"/>
    <text x="125" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">EXPLOIT</text>
    <text x="125" y="128" text-anchor="middle" font-size="11" fill="#78716C">Recommend what we know works</text>

    <!-- Known items with ratings -->
    <g transform="translate(30, 140)">
      <rect x="0" y="0" width="50" height="40" rx="6" fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-width="1"/>
      <text x="25" y="18" text-anchor="middle" font-size="10" fill="#059669" font-weight="bold">Item A</text>
      <text x="25" y="34" text-anchor="middle" font-size="11" fill="#D97706">★★★★</text>
    </g>
    <g transform="translate(90, 140)">
      <rect x="0" y="0" width="50" height="40" rx="6" fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-width="1"/>
      <text x="25" y="18" text-anchor="middle" font-size="10" fill="#059669" font-weight="bold">Item B</text>
      <text x="25" y="34" text-anchor="middle" font-size="11" fill="#D97706">★★★★★</text>
    </g>
    <g transform="translate(150, 140)">
      <rect x="0" y="0" width="50" height="40" rx="6" fill="#059669" fill-opacity="0.15" stroke="#059669" stroke-width="1"/>
      <text x="25" y="18" text-anchor="middle" font-size="10" fill="#059669" font-weight="bold">Item C</text>
      <text x="25" y="34" text-anchor="middle" font-size="11" fill="#D97706">★★★★</text>
    </g>

    <!-- Safe label -->
    <text x="125" y="200" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">Safe but potentially missing better options</text>
  </g>

  <!-- RIGHT PATH: Explore -->
  <g transform="translate(380, 115)">
    <!-- Path arrow -->
    <path d="M-40,50 C10,50 80,60 140,100" fill="none" stroke="#D97706" stroke-width="3" opacity="0.6"/>

    <rect x="20" y="90" width="230" height="110" rx="12" fill="#D97706" fill-opacity="0.06" stroke="#D97706" stroke-width="1.5"/>
    <text x="135" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#D97706">EXPLORE</text>
    <text x="135" y="128" text-anchor="middle" font-size="11" fill="#78716C">Try items with uncertain rewards</text>

    <!-- Unknown items -->
    <g transform="translate(40, 140)">
      <rect x="0" y="0" width="50" height="40" rx="6" fill="#D97706" fill-opacity="0.1" stroke="#D97706" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="25" y="18" text-anchor="middle" font-size="10" fill="#D97706" font-weight="bold">Item X</text>
      <text x="25" y="34" text-anchor="middle" font-size="14" fill="#D97706">?</text>
    </g>
    <g transform="translate(100, 140)">
      <rect x="0" y="0" width="50" height="40" rx="6" fill="#D97706" fill-opacity="0.1" stroke="#D97706" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="25" y="18" text-anchor="middle" font-size="10" fill="#D97706" font-weight="bold">Item Y</text>
      <text x="25" y="34" text-anchor="middle" font-size="14" fill="#D97706">?</text>
    </g>
    <g transform="translate(160, 140)">
      <rect x="0" y="0" width="50" height="40" rx="6" fill="#D97706" fill-opacity="0.1" stroke="#D97706" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="25" y="18" text-anchor="middle" font-size="10" fill="#D97706" font-weight="bold">Item Z</text>
      <text x="25" y="34" text-anchor="middle" font-size="14" fill="#D97706">?</text>
    </g>

    <!-- Risky label -->
    <text x="135" y="200" text-anchor="middle" font-size="10" fill="#D97706" font-style="italic">Risky but might discover hidden gems</text>
  </g>

  <!-- UCB Bar Chart -->
  <g transform="translate(80, 330)">
    <text x="260" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#1C1917">Upper Confidence Bound (UCB) Strategy</text>
    <text x="260" y="18" text-anchor="middle" font-size="11" fill="#78716C">Pick the item with the highest optimistic estimate (reward + uncertainty)</text>

    <!-- Bar chart -->
    <g transform="translate(30, 30)">
      <!-- Axis -->
      <line x1="0" y1="100" x2="460" y2="100" stroke="#E7E5E4" stroke-width="1"/>

      <!-- Item A: high reward, low uncertainty -->
      <rect x="20" y="25" width="60" height="75" rx="4" fill="#059669" fill-opacity="0.3" stroke="#059669" stroke-width="1"/>
      <rect x="20" y="15" width="60" height="10" rx="2" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="50" y="115" text-anchor="middle" font-size="10" fill="#1C1917" font-weight="bold">Item A</text>
      <text x="50" y="70" text-anchor="middle" font-size="9" fill="#059669">4.0</text>

      <!-- Item B: high reward, low uncertainty -->
      <rect x="110" y="15" width="60" height="85" rx="4" fill="#059669" fill-opacity="0.3" stroke="#059669" stroke-width="1"/>
      <rect x="110" y="8" width="60" height="7" rx="2" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="140" y="115" text-anchor="middle" font-size="10" fill="#1C1917" font-weight="bold">Item B</text>
      <text x="140" y="60" text-anchor="middle" font-size="9" fill="#059669">4.5</text>

      <!-- Item C: medium reward, HIGH uncertainty — SELECTED -->
      <rect x="200" y="40" width="60" height="60" rx="4" fill="#D97706" fill-opacity="0.3" stroke="#D97706" stroke-width="2"/>
      <rect x="200" y="2" width="60" height="38" rx="2" fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="230" y="115" text-anchor="middle" font-size="10" fill="#D97706" font-weight="bold">Item C</text>
      <text x="230" y="70" text-anchor="middle" font-size="9" fill="#D97706">3.2</text>

      <!-- UCB winner arrow -->
      <path d="M230,-12 L230,0" stroke="#D97706" stroke-width="2"/>
      <text x="230" y="-18" text-anchor="middle" font-size="9" fill="#D97706" font-weight="bold">Highest UCB!</text>
      <text x="230" y="-8" text-anchor="middle" font-size="8" fill="#D97706">reward + uncertainty</text>

      <!-- Item D: low reward, medium uncertainty -->
      <rect x="290" y="60" width="60" height="40" rx="4" fill="#78716C" fill-opacity="0.2" stroke="#78716C" stroke-width="1"/>
      <rect x="290" y="40" width="60" height="20" rx="2" fill="#78716C" fill-opacity="0.08" stroke="#78716C" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="320" y="115" text-anchor="middle" font-size="10" fill="#1C1917" font-weight="bold">Item D</text>
      <text x="320" y="80" text-anchor="middle" font-size="9" fill="#78716C">2.5</text>

      <!-- Item E: very low reward, medium uncertainty -->
      <rect x="380" y="70" width="60" height="30" rx="4" fill="#78716C" fill-opacity="0.2" stroke="#78716C" stroke-width="1"/>
      <rect x="380" y="48" width="60" height="22" rx="2" fill="#78716C" fill-opacity="0.08" stroke="#78716C" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="410" y="115" text-anchor="middle" font-size="10" fill="#1C1917" font-weight="bold">Item E</text>
      <text x="410" y="88" text-anchor="middle" font-size="9" fill="#78716C">1.8</text>
    </g>

    <!-- Legend -->
    <g transform="translate(30, 135)">
      <rect x="0" y="0" width="14" height="10" rx="2" fill="#059669" fill-opacity="0.3" stroke="#059669" stroke-width="0.5"/>
      <text x="20" y="9" font-size="9" fill="#78716C">Estimated reward</text>
      <rect x="140" y="0" width="14" height="10" rx="2" fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-width="0.5" stroke-dasharray="3,2"/>
      <text x="160" y="9" font-size="9" fill="#78716C">Uncertainty (exploration bonus)</text>
    </g>
  </g>
</svg>