<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeSlideIn { 0% { opacity: 0; } 8% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes arrowDraw { 0% { opacity: 0; } 8% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    @keyframes barGrow {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes speedBarGrow { 0% { opacity: 0; } 8% { opacity: 1; } 65% { opacity: 1; } 75% { opacity: 0; } 100% { opacity: 0; } }
    .stage { opacity: 0; animation: fadeSlideIn 18s ease-out infinite; }
    .stage-1 { animation-delay: 0.3s; }
    .stage-2 { animation-delay: 0.8s; }
    .stage-3 { animation-delay: 1.3s; }
    .stage-4 { animation-delay: 1.8s; }
    .stage-5 { animation-delay: 2.3s; }
    .arrow { stroke-dasharray: 20; stroke-dashoffset: 20; opacity: 0; animation: arrowDraw 18s ease-out infinite; }
    .arrow-1 { animation-delay: 0.6s; }
    .arrow-2 { animation-delay: 1.1s; }
    .arrow-3 { animation-delay: 1.6s; }
    .arrow-4 { animation-delay: 2.1s; }
    .speed-bar { opacity: 0; animation: speedBarGrow 18s ease-out 3s infinite; }
    .conf-bar { opacity: 0; animation: speedBarGrow 18s ease-out 3.3s infinite; }
    .bar-label { opacity: 0; animation: fadeSlideIn 18s ease-out 3s infinite; }
  </style>


  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b1225">Evaluation Funnel</text>

  <!-- Stage boxes -->
  <g class="stage stage-1">
    <rect x="10" y="55" width="90" height="50" rx="6" fill="#0c8383" />
    <text x="55" y="77" text-anchor="middle" font-size="10" fill="#f5f5f4" font-weight="600">Offline</text>
    <text x="55" y="91" text-anchor="middle" font-size="8" fill="#f5f5f4" opacity="0.8">Eval</text>
  </g>

  <g class="stage stage-2">
    <rect x="125" y="55" width="90" height="50" rx="6" fill="#0c8383" />
    <text x="170" y="77" text-anchor="middle" font-size="9.5" fill="#f5f5f4" font-weight="600">Counter-</text>
    <text x="170" y="91" text-anchor="middle" font-size="9.5" fill="#f5f5f4" font-weight="600">factual</text>
  </g>

  <g class="stage stage-3">
    <rect x="240" y="55" width="90" height="50" rx="6" fill="#3bc4a1" />
    <text x="285" y="77" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">Inter-</text>
    <text x="285" y="91" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">leaving</text>
  </g>

  <g class="stage stage-4">
    <rect x="355" y="55" width="90" height="50" rx="6" fill="#3bc4a1" />
    <text x="400" y="83" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">A/B Test</text>
  </g>

  <g class="stage stage-5">
    <rect x="470" y="55" width="90" height="50" rx="6" fill="#0b1225" />
    <text x="515" y="83" text-anchor="middle" font-size="10" fill="#f5f5f4" font-weight="600">Deploy</text>
  </g>

  <!-- Arrows -->
  <line class="arrow arrow-1" x1="102" y1="80" x2="123" y2="80" stroke="#0b1225" stroke-width="2" marker-end="url(#arrowhead)" />
  <line class="arrow arrow-2" x1="217" y1="80" x2="238" y2="80" stroke="#0b1225" stroke-width="2" marker-end="url(#arrowhead)" />
  <line class="arrow arrow-3" x1="332" y1="80" x2="353" y2="80" stroke="#0b1225" stroke-width="2" marker-end="url(#arrowhead)" />
  <line class="arrow arrow-4" x1="447" y1="80" x2="468" y2="80" stroke="#0b1225" stroke-width="2" marker-end="url(#arrowhead)" />

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#0b1225" />
    </marker>
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3bc4a1" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <linearGradient id="confGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0c8383" />
    </linearGradient>
  </defs>

  <!-- Speed bar -->
  <g class="bar-label">
    <text x="30" y="160" font-size="11" fill="#0b1225" font-weight="600">Speed</text>
    <text x="30" y="175" font-size="9" fill="#0b1225" opacity="0.6">fast</text>
    <text x="540" y="175" font-size="9" fill="#0b1225" opacity="0.6" text-anchor="end">slow</text>
  </g>
  <rect x="30" y="180" width="510" height="12" rx="6" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.5" opacity="0.3"/>
  <rect class="speed-bar" x="30" y="180" width="510" height="12" rx="6" fill="url(#speedGrad)" />

  <!-- Confidence bar -->
  <g class="bar-label">
    <text x="30" y="220" font-size="11" fill="#0b1225" font-weight="600">Confidence</text>
    <text x="30" y="235" font-size="9" fill="#0b1225" opacity="0.6">low</text>
    <text x="540" y="235" font-size="9" fill="#0b1225" opacity="0.6" text-anchor="end">high</text>
  </g>
  <rect x="30" y="240" width="510" height="12" rx="6" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.5" opacity="0.3"/>
  <rect class="conf-bar" x="30" y="240" width="510" height="12" rx="6" fill="url(#confGrad)" />

  <!-- Funnel shape hint -->
  <text x="300" y="285" text-anchor="middle" font-size="9" fill="#0b1225" opacity="0.5">Fewer experiments pass each stage</text>
</svg>