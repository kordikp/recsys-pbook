<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="680" height="440" font-family="system-ui, sans-serif">
  <defs>
    <marker id="annArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1C1917">Finding Similar Items Fast: ANN Search</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#78716C">Approximate Nearest Neighbors trade tiny accuracy loss for massive speed gains</text>

  <!-- Divider -->
  <line x1="340" y1="60" x2="340" y2="380" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT: Brute Force -->
  <g transform="translate(20, 60)">
    <text x="150" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">Brute Force (Exact)</text>
    <text x="150" y="35" text-anchor="middle" font-size="11" fill="#78716C">Check every single point</text>

    <!-- Scatter plot area -->
    <rect x="10" y="45" width="280" height="230" rx="8" fill="#DC2626" fill-opacity="0.02" stroke="#E7E5E4" stroke-width="1"/>

    <!-- Many dots (items) -->
    <g fill="#78716C" opacity="0.4">
      <circle cx="45" cy="80" r="3.5"/>
      <circle cx="80" cy="100" r="3.5"/>
      <circle cx="120" cy="70" r="3.5"/>
      <circle cx="155" cy="95" r="3.5"/>
      <circle cx="190" cy="75" r="3.5"/>
      <circle cx="225" cy="110" r="3.5"/>
      <circle cx="260" cy="85" r="3.5"/>
      <circle cx="55" cy="140" r="3.5"/>
      <circle cx="95" cy="155" r="3.5"/>
      <circle cx="130" cy="130" r="3.5"/>
      <circle cx="170" cy="165" r="3.5"/>
      <circle cx="210" cy="145" r="3.5"/>
      <circle cx="245" cy="170" r="3.5"/>
      <circle cx="70" cy="200" r="3.5"/>
      <circle cx="110" cy="215" r="3.5"/>
      <circle cx="145" cy="190" r="3.5"/>
      <circle cx="185" cy="220" r="3.5"/>
      <circle cx="220" cy="195" r="3.5"/>
      <circle cx="255" cy="230" r="3.5"/>
      <circle cx="40" cy="250" r="3.5"/>
      <circle cx="100" cy="260" r="3.5"/>
      <circle cx="165" cy="245" r="3.5"/>
      <circle cx="235" cy="255" r="3.5"/>
      <circle cx="275" cy="150" r="3.5"/>
    </g>

    <!-- Query point -->
    <polygon points="160,180 164,191 176,191 167,198 170,210 160,203 150,210 153,198 144,191 156,191" fill="#D97706"/>

    <!-- Lines from query to ALL points (showing exhaustive) -->
    <g stroke="#DC2626" stroke-width="0.5" opacity="0.25">
      <line x1="160" y1="180" x2="45" y2="80"/>
      <line x1="160" y1="180" x2="80" y2="100"/>
      <line x1="160" y1="180" x2="120" y2="70"/>
      <line x1="160" y1="180" x2="155" y2="95"/>
      <line x1="160" y1="180" x2="190" y2="75"/>
      <line x1="160" y1="180" x2="225" y2="110"/>
      <line x1="160" y1="180" x2="260" y2="85"/>
      <line x1="160" y1="180" x2="55" y2="140"/>
      <line x1="160" y1="180" x2="95" y2="155"/>
      <line x1="160" y1="180" x2="130" y2="130"/>
      <line x1="160" y1="180" x2="170" y2="165"/>
      <line x1="160" y1="180" x2="210" y2="145"/>
      <line x1="160" y1="180" x2="245" y2="170"/>
      <line x1="160" y1="180" x2="70" y2="200"/>
      <line x1="160" y1="180" x2="110" y2="215"/>
      <line x1="160" y1="180" x2="145" y2="190"/>
      <line x1="160" y1="180" x2="185" y2="220"/>
      <line x1="160" y1="180" x2="220" y2="195"/>
      <line x1="160" y1="180" x2="255" y2="230"/>
      <line x1="160" y1="180" x2="40" y2="250"/>
      <line x1="160" y1="180" x2="100" y2="260"/>
      <line x1="160" y1="180" x2="165" y2="245"/>
      <line x1="160" y1="180" x2="235" y2="255"/>
      <line x1="160" y1="180" x2="275" y2="150"/>
    </g>

    <!-- Concentric circles -->
    <circle cx="160" cy="180" r="30" fill="none" stroke="#DC2626" stroke-width="0.8" opacity="0.3"/>
    <circle cx="160" cy="180" r="60" fill="none" stroke="#DC2626" stroke-width="0.6" opacity="0.2"/>
    <circle cx="160" cy="180" r="100" fill="none" stroke="#DC2626" stroke-width="0.4" opacity="0.15"/>
  </g>

  <!-- RIGHT: ANN (HNSW) -->
  <g transform="translate(360, 60)">
    <text x="150" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563EB">ANN / HNSW (Approximate)</text>
    <text x="150" y="35" text-anchor="middle" font-size="11" fill="#78716C">Navigate a graph, visit few points</text>

    <!-- Scatter plot area -->
    <rect x="10" y="45" width="280" height="230" rx="8" fill="#2563EB" fill-opacity="0.02" stroke="#E7E5E4" stroke-width="1"/>

    <!-- Same dots but only some connected -->
    <g fill="#78716C" opacity="0.25">
      <circle cx="45" cy="80" r="3.5"/>
      <circle cx="80" cy="100" r="3.5"/>
      <circle cx="120" cy="70" r="3.5"/>
      <circle cx="155" cy="95" r="3.5"/>
      <circle cx="190" cy="75" r="3.5"/>
      <circle cx="225" cy="110" r="3.5"/>
      <circle cx="260" cy="85" r="3.5"/>
      <circle cx="55" cy="140" r="3.5"/>
      <circle cx="95" cy="155" r="3.5"/>
      <circle cx="130" cy="130" r="3.5"/>
      <circle cx="170" cy="165" r="3.5"/>
      <circle cx="210" cy="145" r="3.5"/>
      <circle cx="245" cy="170" r="3.5"/>
      <circle cx="70" cy="200" r="3.5"/>
      <circle cx="110" cy="215" r="3.5"/>
      <circle cx="145" cy="190" r="3.5"/>
      <circle cx="185" cy="220" r="3.5"/>
      <circle cx="220" cy="195" r="3.5"/>
      <circle cx="255" cy="230" r="3.5"/>
      <circle cx="40" cy="250" r="3.5"/>
      <circle cx="100" cy="260" r="3.5"/>
      <circle cx="165" cy="245" r="3.5"/>
      <circle cx="235" cy="255" r="3.5"/>
      <circle cx="275" cy="150" r="3.5"/>
    </g>

    <!-- HNSW Graph edges (sparse, navigable) -->
    <g stroke="#2563EB" stroke-width="0.6" opacity="0.2">
      <!-- Layer 0 connections (many) -->
      <line x1="45" y1="80" x2="80" y2="100"/>
      <line x1="80" y1="100" x2="120" y2="70"/>
      <line x1="120" y1="70" x2="155" y2="95"/>
      <line x1="155" y1="95" x2="190" y2="75"/>
      <line x1="190" y1="75" x2="225" y2="110"/>
      <line x1="225" y1="110" x2="260" y2="85"/>
      <line x1="55" y1="140" x2="95" y2="155"/>
      <line x1="95" y1="155" x2="130" y2="130"/>
      <line x1="130" y1="130" x2="170" y2="165"/>
      <line x1="170" y1="165" x2="210" y2="145"/>
      <line x1="210" y1="145" x2="245" y2="170"/>
      <line x1="70" y1="200" x2="110" y2="215"/>
      <line x1="110" y1="215" x2="145" y2="190"/>
      <line x1="145" y1="190" x2="185" y2="220"/>
      <line x1="185" y1="220" x2="220" y2="195"/>
      <line x1="80" y1="100" x2="55" y2="140"/>
      <line x1="155" y1="95" x2="130" y2="130"/>
      <line x1="225" y1="110" x2="210" y2="145"/>
      <line x1="95" y1="155" x2="70" y2="200"/>
      <line x1="170" y1="165" x2="145" y2="190"/>
      <line x1="245" y1="170" x2="275" y2="150"/>
    </g>

    <!-- Query point -->
    <polygon points="160,180 164,191 176,191 167,198 170,210 160,203 150,210 153,198 144,191 156,191" fill="#D97706"/>

    <!-- HNSW search path (highlighted) -->
    <!-- Entry point (top layer) -->
    <circle cx="225" cy="110" r="5" fill="#2563EB" opacity="0.6"/>
    <!-- Hop 1 -->
    <line x1="225" y1="110" x2="210" y2="145" stroke="#2563EB" stroke-width="2.5" opacity="0.7"/>
    <circle cx="210" cy="145" r="5" fill="#2563EB" opacity="0.6"/>
    <!-- Hop 2 -->
    <line x1="210" y1="145" x2="170" y2="165" stroke="#2563EB" stroke-width="2.5" opacity="0.7"/>
    <circle cx="170" cy="165" r="5" fill="#2563EB" opacity="0.7"/>
    <!-- Hop 3 -->
    <line x1="170" y1="165" x2="145" y2="190" stroke="#2563EB" stroke-width="2.5" opacity="0.8"/>
    <circle cx="145" cy="190" r="5" fill="#059669" opacity="0.9"/>

    <!-- Found neighbors highlighted -->
    <circle cx="170" cy="165" r="6" fill="none" stroke="#059669" stroke-width="2"/>
    <circle cx="145" cy="190" r="6" fill="none" stroke="#059669" stroke-width="2"/>
    <circle cx="185" cy="220" r="5" fill="#059669" opacity="0.6"/>
    <circle cx="185" cy="220" r="6" fill="none" stroke="#059669" stroke-width="2"/>

    <!-- "Entry" label -->
    <text x="235" y="105" font-size="8" fill="#2563EB" font-weight="bold">entry</text>

    <!-- Path labels -->
    <text x="260" y="138" font-size="8" fill="#2563EB">hop 1</text>
    <text x="210" y="162" font-size="8" fill="#2563EB">hop 2</text>
    <text x="120" y="200" font-size="8" fill="#2563EB">hop 3</text>
  </g>

  <!-- Comparison stats -->
  <g transform="translate(40, 390)">
    <!-- Brute force stats -->
    <rect x="0" y="0" width="280" height="40" rx="8" fill="#DC2626" fill-opacity="0.06" stroke="#DC2626" stroke-width="1"/>
    <text x="140" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#DC2626">O(n) distance computations</text>
    <text x="140" y="32" text-anchor="middle" font-size="10" fill="#78716C">1M items = 1M comparisons (100ms+)</text>

    <!-- ANN stats -->
    <rect x="320" y="0" width="280" height="40" rx="8" fill="#2563EB" fill-opacity="0.06" stroke="#2563EB" stroke-width="1"/>
    <text x="460" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563EB">O(log n) graph hops</text>
    <text x="460" y="32" text-anchor="middle" font-size="10" fill="#78716C">1M items = ~20 hops, 99%+ recall (&lt;1ms)</text>
  </g>
</svg>