<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="system-ui,sans-serif">
  <style>
    .bar{transform-origin:bottom;animation:grow .8s ease-out infinite;transform:scaleY(0)}
    .b1{animation-delay:.3s}.b2{animation-delay:.6s}.b3{animation-delay:.9s}.b4{animation-delay:1.2s}.b5{animation-delay:1.5s}
    @keyframes grow{to{transform:scaleY(1)}}
    .label{opacity:0;animation:fadeIn .3s ease infinite}
    .l1{animation-delay:.5s}.l2{animation-delay:.8s}.l3{animation-delay:1.1s}.l4{animation-delay:1.4s}.l5{animation-delay:1.7s}
    @keyframes fadeIn{to{opacity:1}}
  </style>

  <rect width="600" height="300" fill="#f5f5f4" rx="12"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0b1225">Standard RecSys Benchmarks</text>
  <line x1="60" y1="240" x2="570" y2="240" stroke="#0b1225" stroke-width="1"/>
  <rect x="80" y="140" width="70" height="100" rx="4" fill="#0c8383" class="bar b1"/>
  <text x="115" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#0b1225" class="label l1">ML-25M</text>
  <text x="115" y="135" text-anchor="middle" font-size="9" fill="#0c8383" class="label l1">25M ratings</text>
  <rect x="170" y="80" width="70" height="160" rx="4" fill="#3bc4a1" class="bar b2"/>
  <text x="205" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#0b1225" class="label l2">Amazon</text>
  <text x="205" y="75" text-anchor="middle" font-size="9" fill="#3bc4a1" class="label l2">233M reviews</text>
  <rect x="260" y="120" width="70" height="120" rx="4" fill="#f59e0b" class="bar b3"/>
  <text x="295" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#0b1225" class="label l3">Netflix</text>
  <text x="295" y="115" text-anchor="middle" font-size="9" fill="#f59e0b" class="label l3">100M ratings</text>
  <rect x="350" y="190" width="70" height="50" rx="4" fill="#0b1225" class="bar b4"/>
  <text x="385" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#0b1225" class="label l4">Spotify</text>
  <text x="385" y="185" text-anchor="middle" font-size="9" fill="#0b1225" class="label l4">1M playlists</text>
  <rect x="440" y="200" width="70" height="40" rx="4" fill="#ef4444" class="bar b5"/>
  <text x="475" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#0b1225" class="label l5">KuaiRand</text>
  <text x="475" y="195" text-anchor="middle" font-size="9" fill="#ef4444" class="label l5">Randomized!</text>
  <text x="300" y="285" text-anchor="middle" font-size="10" fill="#666">KuaiRand is rare: randomized exposure enables unbiased evaluation</text>
</svg>
