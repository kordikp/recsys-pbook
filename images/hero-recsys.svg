  <text x="140" y="64" font-family="system-ui" font-size="8" fill="#374151">Videos</text>

  <rect x="115" y="78" width="68" height="24" rx="5" fill="#fff" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="127" y="94" font-size="11">📚</text>
  <text x="140" y="94" font-family="system-ui" font-size="8" fill="#374151">Books</text>

  <!-- Algorithm brain -->
  <rect x="205" y="38" width="65" height="44" rx="10" fill="#7C3AED" opacity=".1"/>
  <text x="237" y="58" text-anchor="middle" font-size="16">🧠</text>
  <text x="237" y="74" text-anchor="middle" font-family="system-ui" font-size="7" fill="#7C3AED" font-weight="600">Algorithm</text>

  <!-- Arrows -->
  <line x1="185" y1="60" x2="203" y2="60" stroke="#7C3AED" stroke-width="1.2" opacity=".4"/>
  <line x1="272" y1="52" x2="300" y2="35" stroke="#10B981" stroke-width="1.2" opacity=".5"/>
  <line x1="272" y1="60" x2="300" y2="60" stroke="#10B981" stroke-width="1.8"/>
  <line x1="272" y1="68" x2="300" y2="85" stroke="#10B981" stroke-width="1.2" opacity=".5"/>

  <!-- Output recommendations -->
  <rect x="305" y="22" width="80" height="24" rx="5" fill="#10B981" opacity=".1"/>
  <text x="317" y="38" font-size="10">⭐</text>
  <text x="330" y="38" font-family="system-ui" font-size="8" fill="#065F46">For you</text>

  <rect x="305" y="50" width="80" height="24" rx="5" fill="#7C3AED" opacity=".1"/>
  <text x="317" y="66" font-size="10">🔥</text>
  <text x="330" y="66" font-family="system-ui" font-size="8" fill="#4C1D95">Trending</text>

  <rect x="305" y="78" width="80" height="24" rx="5" fill="#F59E0B" opacity=".1"/>
  <text x="317" y="94" font-size="10">💡</text>
  <text x="330" y="94" font-family="system-ui" font-size="8" fill="#92400E">Discover</text>

  <!-- Final user -->
  <line x1="387" y1="35" x2="420" y2="52" stroke="#10B981" stroke-width="1.2" opacity=".4"/>
  <line x1="387" y1="62" x2="420" y2="60" stroke="#10B981" stroke-width="1.5" opacity=".5"/>
  <line x1="387" y1="90" x2="420" y2="68" stroke="#10B981" stroke-width="1.2" opacity=".4"/>
  <circle cx="435" cy="60" r="18" fill="#10B981" opacity=".1"/>
  <circle cx="435" cy="53" r="6" fill="#10B981"/>
