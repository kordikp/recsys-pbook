  <!-- Arrows from user to items -->
  <line x1="73" y1="50" x2="110" y2="30" stroke="#7C3AED" stroke-width="1.2" opacity=".3" stroke-dasharray="3 3"/>
  <line x1="73" y1="60" x2="110" y2="60" stroke="#7C3AED" stroke-width="1.8" opacity=".5"/>
  <line x1="73" y1="70" x2="110" y2="90" stroke="#7C3AED" stroke-width="1.2" opacity=".3" stroke-dasharray="3 3"/>

  <!-- Input items with icons before text -->
  <rect x="115" y="18" width="68" height="24" rx="5" fill="#fff" stroke="#10B981" stroke-width="1.2"/>
  <text x="127" y="34" font-size="11">🎵</text>
