<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" width="650" height="300" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrRight" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#0c8383"/>
    </marker>
    <marker id="arrRightAmber" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="650" height="300" rx="12" fill="#f5f5f4"/>

  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0b1225">User-Level CF vs. Session-Based Recommendations</text>

  <!-- Center divider -->
  <line x1="325" y1="48" x2="325" y2="288" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="325" y="290" text-anchor="middle" font-size="9" fill="#6b7280">vs.</text>

  <!-- ===== LEFT SIDE: User-Level CF ===== -->
  <g transform="translate(20, 55)">
    <text x="145" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c8383">User-Level CF</text>

    <!-- User icon -->
    <circle cx="30" cy="42" r="14" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="1.5"/>
    <circle cx="30" cy="37" r="5" fill="#0c8383"/>
    <path d="M20,48 Q30,55 40,48" fill="none" stroke="#0c8383" stroke-width="1.5"/>

    <!-- Long timeline -->
    <line x1="55" y1="42" x2="260" y2="42" stroke="#0c8383" stroke-width="2"/>
    <!-- Timeline items (many) -->
    <circle cx="68" cy="42" r="5" fill="#0c8383" fill-opacity="0.2" stroke="#0c8383" stroke-width="1"/>
    <circle cx="86" cy="42" r="5" fill="#0c8383" fill-opacity="0.3" stroke="#0c8383" stroke-width="1"/>
    <circle cx="104" cy="42" r="5" fill="#0c8383" fill-opacity="0.25" stroke="#0c8383" stroke-width="1"/>
    <circle cx="122" cy="42" r="5" fill="#0c8383" fill-opacity="0.35" stroke="#0c8383" stroke-width="1"/>
    <circle cx="140" cy="42" r="5" fill="#0c8383" fill-opacity="0.4" stroke="#0c8383" stroke-width="1"/>
    <circle cx="158" cy="42" r="5" fill="#0c8383" fill-opacity="0.5" stroke="#0c8383" stroke-width="1"/>
    <circle cx="176" cy="42" r="5" fill="#0c8383" fill-opacity="0.55" stroke="#0c8383" stroke-width="1"/>
    <circle cx="194" cy="42" r="5" fill="#0c8383" fill-opacity="0.65" stroke="#0c8383" stroke-width="1"/>
    <circle cx="212" cy="42" r="5" fill="#0c8383" fill-opacity="0.75" stroke="#0c8383" stroke-width="1"/>
    <circle cx="230" cy="42" r="5" fill="#0c8383" fill-opacity="0.85" stroke="#0c8383" stroke-width="1"/>
    <circle cx="248" cy="42" r="5" fill="#0c8383" fill-opacity="0.95" stroke="#0c8383" stroke-width="1"/>

    <!-- Time labels -->
    <text x="68" y="60" text-anchor="middle" font-size="7" fill="#6b7280">months ago</text>
    <text x="248" y="60" text-anchor="middle" font-size="7" fill="#6b7280">today</text>

    <!-- Arrow to stable profile -->
    <line x1="150" y1="72" x2="150" y2="95" stroke="#0c8383" stroke-width="1.5" marker-end="url(#arrRight)" transform="rotate(90, 150, 84)"/>

    <!-- Stable Profile box -->
    <rect x="65" y="100" width="170" height="38" rx="8" fill="#0c8383" fill-opacity="0.12" stroke="#0c8383" stroke-width="1.5"/>
    <text x="150" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c8383">Stable Profile</text>
    <text x="150" y="132" text-anchor="middle" font-size="9" fill="#6b7280">Long-term preferences</text>

    <!-- Properties -->
    <g transform="translate(30, 155)">
      <circle cx="5" cy="6" r="3" fill="#0c8383"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Deep personalization</text>
    </g>
    <g transform="translate(30, 172)">
      <circle cx="5" cy="6" r="3" fill="#0c8383"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Requires login / user ID</text>
    </g>
    <g transform="translate(30, 189)">
      <circle cx="5" cy="6" r="3" fill="#0c8383"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Slow to adapt to changes</text>
    </g>
    <g transform="translate(30, 206)">
      <circle cx="5" cy="6" r="3" fill="#0c8383"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Rich similarity signals</text>
    </g>
  </g>

  <!-- ===== RIGHT SIDE: Session-Based ===== -->
  <g transform="translate(345, 55)">
    <text x="145" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">Session-Based</text>

    <!-- Session window -->
    <rect x="20" y="22" width="250" height="42" rx="6" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Short sequence (just 4 items) -->
    <line x1="55" y1="42" x2="230" y2="42" stroke="#f59e0b" stroke-width="2"/>
    <rect x="65" y="32" width="28" height="20" rx="4" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="1"/>
    <text x="79" y="46" text-anchor="middle" font-size="8" fill="#0b1225">1</text>
    <line x1="93" y1="42" x2="110" y2="42" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrRightAmber)"/>
    <rect x="115" y="32" width="28" height="20" rx="4" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1"/>
    <text x="129" y="46" text-anchor="middle" font-size="8" fill="#0b1225">2</text>
    <line x1="143" y1="42" x2="158" y2="42" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrRightAmber)"/>
    <rect x="163" y="32" width="28" height="20" rx="4" fill="#f59e0b" fill-opacity="0.6" stroke="#f59e0b" stroke-width="1"/>
    <text x="177" y="46" text-anchor="middle" font-size="8" fill="#0b1225">3</text>
    <line x1="191" y1="42" x2="204" y2="42" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrRightAmber)"/>
    <rect x="207" y="32" width="28" height="20" rx="4" fill="#f59e0b" fill-opacity="0.8" stroke="#f59e0b" stroke-width="1"/>
    <text x="221" y="46" text-anchor="middle" font-size="8" fill="#0b1225">4</text>

    <!-- Time label -->
    <text x="145" y="76" text-anchor="middle" font-size="7" fill="#6b7280">current session (minutes)</text>

    <!-- Arrow to current intent -->
    <line x1="150" y1="82" x2="150" y2="95" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrRightAmber)" transform="rotate(90, 150, 89)"/>

    <!-- Current Intent box -->
    <rect x="65" y="100" width="170" height="38" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="150" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Current Intent</text>
    <text x="150" y="132" text-anchor="middle" font-size="9" fill="#6b7280">What they want right now</text>

    <!-- Properties -->
    <g transform="translate(30, 155)">
      <circle cx="5" cy="6" r="3" fill="#f59e0b"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Immediate responsiveness</text>
    </g>
    <g transform="translate(30, 172)">
      <circle cx="5" cy="6" r="3" fill="#f59e0b"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Works for anonymous users</text>
    </g>
    <g transform="translate(30, 189)">
      <circle cx="5" cy="6" r="3" fill="#f59e0b"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Captures shifting intent</text>
    </g>
    <g transform="translate(30, 206)">
      <circle cx="5" cy="6" r="3" fill="#f59e0b"/>
      <text x="14" y="10" font-size="9" fill="#0b1225">Sparse data per session</text>
    </g>
  </g>
</svg>