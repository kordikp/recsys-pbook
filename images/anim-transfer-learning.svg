<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" font-family="system-ui, sans-serif">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes bubbleGrow {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes drawArrow {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes particleFlow { 0%,100% { opacity: 0; } 30%,70% { opacity: 1; } }
    @keyframes popIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(59,196,161,0)); }
      50% { filter: drop-shadow(0 0 8px rgba(59,196,161,0.4)); }
    }

    .title { opacity: 0; animation: fadeIn 1.5s ease-out 0.1s infinite; }

    /* Source domain */
    .source-bubble { opacity: 0; animation: bubbleGrow 1.8s ease-out 0.4s infinite; }
    .source-icon { opacity: 0; animation: fadeIn 1.2s ease-out 0.7s infinite; }

    /* Target domain */
    .target-bubble { opacity: 0; animation: bubbleGrow 1.8s ease-out 1.8s infinite; }
    .target-icon { opacity: 0; animation: fadeIn 1.2s ease-out 0.9s infinite; }

    /* Bridge arrow */
    .bridge-line {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: drawArrow 1s ease-out 1.2s infinite;
    }
    .bridge-label { opacity: 0; animation: fadeIn 1.5s ease-out 1.5s infinite; }

    /* Particles flowing */
    .particle { opacity: 0; }
    .p1 { animation: particleFlow 1.5s ease-in-out 2.0s infinite; }
    .p2 { animation: particleFlow 1.5s ease-in-out 2.3s infinite; }
    .p3 { animation: particleFlow 1.5s ease-in-out 2.6s infinite; }
    .p4 { animation: particleFlow 1.5s ease-in-out 2.9s infinite; }
    .p5 { animation: particleFlow 1.5s ease-in-out 3.2s infinite; }

    /* Result label */
    .result { opacity: 0; animation: popIn 1.5s ease-out 3.5s infinite; }
    .result-glow { animation: glow 2s ease-in-out 3.5s infinite; }
  </style>


  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#0b1225" />
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b1225">Transfer Learning: Cross-Domain Knowledge</text>

  <!-- Source Domain (Movies) -->
  <g class="source-bubble">
    <ellipse cx="120" cy="125" rx="85" ry="65" fill="#0c8383" opacity="0.15" stroke="#0c8383" stroke-width="2" />
    <text x="120" y="80" text-anchor="middle" font-size="11" fill="#0c8383" font-weight="700">Source Domain</text>
  </g>
  <g class="source-icon">
    <!-- Film reel icon -->
    <rect x="80" y="100" width="30" height="22" rx="3" fill="#0c8383" />
    <rect x="82" y="104" width="26" height="14" rx="2" fill="#0b1225" />
    <polygon points="90,108 100,111 90,114" fill="#f5f5f4" />
    <text x="120" y="145" text-anchor="middle" font-size="22">&#127909;</text>
    <text x="120" y="170" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">Movies</text>
    <text x="120" y="183" text-anchor="middle" font-size="8" fill="#0b1225" opacity="0.5">Rich interaction data</text>
  </g>

  <!-- Target Domain (Books) -->
  <g class="target-bubble">
    <ellipse cx="480" cy="125" rx="85" ry="65" fill="#3bc4a1" opacity="0.15" stroke="#3bc4a1" stroke-width="2" />
    <text x="480" y="80" text-anchor="middle" font-size="11" fill="#3bc4a1" font-weight="700">Target Domain</text>
  </g>
  <g class="target-icon">
    <text x="480" y="145" text-anchor="middle" font-size="22">&#128218;</text>
    <text x="480" y="170" text-anchor="middle" font-size="10" fill="#0b1225" font-weight="600">Books</text>
    <text x="480" y="183" text-anchor="middle" font-size="8" fill="#0b1225" opacity="0.5">Sparse data (cold start)</text>
  </g>

  <!-- Bridge Arrow -->
  <line class="bridge-line" x1="210" y1="125" x2="390" y2="125" stroke="#0b1225" stroke-width="2" marker-end="url(#ah)" />

  <!-- Bridge label -->
  <g class="bridge-label">
    <rect x="255" y="100" width="90" height="22" rx="5" fill="#f5f5f4" stroke="#0b1225" stroke-width="0.5" />
    <text x="300" y="115" text-anchor="middle" font-size="9" fill="#0b1225" font-weight="600">Text Bridge</text>
  </g>

  <!-- Flowing particles -->
  <circle class="particle p1" r="3" fill="#0c8383">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="2.0s" path="M210,125 L390,125" />
  </circle>
  <circle class="particle p2" r="2.5" fill="#3bc4a1">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="2.3s" path="M210,125 L390,125" />
  </circle>
  <circle class="particle p3" r="3" fill="#0c8383">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="2.6s" path="M210,125 L390,125" />
  </circle>
  <circle class="particle p4" r="2" fill="#3bc4a1">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="2.9s" path="M210,125 L390,125" />
  </circle>
  <circle class="particle p5" r="2.5" fill="#0c8383">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="3.2s" path="M210,125 L390,125" />
  </circle>

  <!-- Result -->
  <g class="result result-glow">
    <rect x="195" y="210" width="210" height="30" rx="8" fill="#0b1225" />
    <text x="300" y="230" text-anchor="middle" font-size="11" fill="#3bc4a1" font-weight="700">+131% Recall@20 (zero-shot)</text>
  </g>
</svg>